// ── EXERCISE EXPLAINER ────────────────────────────────────────────────
// On-demand AI explanation of an exercise. Renders a small modal, fetches
// a 2-3 sentence description, and caches results in sessionStorage so
// repeat taps for the same exercise are instant. Each user only spends
// tokens on exercises they actually want to know about — much cheaper
// than pre-generating descriptions for every exercise in every plan.
function getExplainCache(){
  try{var raw=sessionStorage.getItem('peak_ex_explain');if(raw)return JSON.parse(raw);}catch(_){}
  return {};
}
function saveExplainCache(c){
  try{sessionStorage.setItem('peak_ex_explain',JSON.stringify(c));}catch(_){}
}
function closeExplainModal(){
  var m=document.getElementById('exExplainModal');
  if(m)m.remove();
}
async function explainExercise(payloadEnc){
  var de=lang==='de';
  var ex;
  try{ex=JSON.parse(decodeURIComponent(payloadEnc));}catch(e){return;}
  if(!ex||!ex.name)return;
  // Build modal shell first so the user gets immediate feedback
  closeExplainModal();
  var modal=document.createElement('div');
  modal.id='exExplainModal';
  modal.className='ex-explain-modal';
  modal.onclick=function(e){if(e.target===modal)closeExplainModal();};
  modal.innerHTML=
    '<div class="ex-explain-box" role="dialog" aria-modal="true" aria-labelledby="exExplainHead">'+
      '<div class="ex-explain-h" id="exExplainHead"><span>'+esc(ex.name)+'</span>'+
        '<button class="ex-explain-close" onclick="closeExplainModal()" aria-label="'+(de?'Schliessen':'Close')+'">×</button>'+
      '</div>'+
      '<div class="ex-explain-body" id="exExplainBody">'+
        '<div class="ex-explain-loading"><span style="width:14px;height:14px;border:2px solid var(--red);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></span>'+(de?'Erklärung wird geladen…':'Loading explanation…')+'</div>'+
      '</div>'+
    '</div>';
  document.body.appendChild(modal);

  var cache=getExplainCache();
  var cacheKey=lang+'|'+ex.name.toLowerCase().trim();
  if(cache[cacheKey]){
    var body=document.getElementById('exExplainBody');
    if(body)body.innerHTML=cache[cacheKey];
    return;
  }
  var langInstr=de
    ?'Antworte auf Deutsch in 2-3 kurzen Sätzen.'
    :'Reply in English in 2-3 short sentences.';
  var prompt='Briefly explain what this exercise is and how to perform it correctly. '+langInstr+
    ' Cover: 1) what the exercise looks like, 2) the key technique cue. '+
    'Skip safety disclaimers and motivational text. Plain text only, no headings, no lists.\n\n'+
    'Exercise: '+ex.name+(ex.detail?'\nDetail: '+ex.detail:'')+(ex.tip?'\nExisting coach tip (do not repeat verbatim): '+ex.tip:'');
  try{
    var text=await aiGen(prompt,250,'exercise_explain');
    if(!text||!text.trim())throw new Error('empty');
    var html=esc(text.trim()).replace(/\n+/g,'<br><br>');
    cache[cacheKey]=html;
    saveExplainCache(cache);
    var body2=document.getElementById('exExplainBody');
    if(body2)body2.innerHTML=html;
  }catch(e){
    var body3=document.getElementById('exExplainBody');
    if(body3)body3.innerHTML='<div style="color:var(--faint)">'+(de?'Erklärung konnte nicht geladen werden. Bitte erneut versuchen.':'Could not load explanation. Please try again.')+'</div>';
  }
}

  var unchecked=[];

async function pickMood(cuisine, mealIdx){
  var a=document.getElementById('moodA');
  if(!a)return;
  var de=lang==='de';
  var p=fp();
  if(!p||!Array.isArray(p.todayMeals)||!p.todayMeals[mealIdx]){
    a.innerHTML='';
    return;
  }
  var slot=p.todayMeals[mealIdx];
  var slotTime=slot.time||'Meal';
  var slotKcal=slot.kcal||Math.round((p.calories||2000)/4);
  var slotProtein=mealMacro(slot,'protein')||Math.round((p.protein||120)/4);
  a.innerHTML='<div class="aib" style="margin-top:8px"><div class="ailbl"><div class="aidot"></div>PEAK AI</div><p>'+(de?'Generiere '+esc(cuisine)+' '+esc(slotTime)+'…':'Generating '+esc(cuisine)+' '+esc(slotTime)+'…')+'</p><div class="spin" style="width:22px;height:22px;margin:8px 0 0;border-width:2px"></div></div>';
  // Build prompt for a SINGLE meal (not the whole day) — keeps already
  // logged meals' kcal/macros in today's tracker untouched. AI also returns
  // the ingredients for THIS meal so the shopping list can show what's
  // bought specifically for it (and strike them through when consumed).
  var prompt='Generate a single '+cuisine+' '+slotTime.toLowerCase()+' recipe. Language: '+lang+'. '+
    'Goal: '+goalStr()+'. Target: ~'+slotKcal+' kcal, ~'+slotProtein+'g protein for this single meal. '+
    'Allergies: '+(ud.al||[]).join(',')+'. Cooking level: '+ud.cook+'. '+
    'The meal must be authentic '+cuisine+' cuisine, not generic. '+
    'IMPORTANT: protein/carbs/fat MUST be numbers in grams (no units, just numbers). '+
    'IMPORTANT: ingredients MUST be objects with "item" and "qty" fields. '+
    'QUANTITY FORMAT — strictly follow: '+
    'weight in grams/kilograms (e.g. "200g", "1.5kg"); '+
    'volume in milliliters/liters (e.g. "30ml"); '+
    'spices/herbs/seasonings '+(lang==='de'?'in German abbreviations "TL" (teaspoon) and "EL" (tablespoon), e.g. "1 TL", "1/2 EL"':'in "tsp" or "tbsp", e.g. "1 tsp", "1/2 tbsp"')+'. NEVER bare numbers like "1" — the unit is mandatory. '+
    'Whole/countable items must include the counting noun INSIDE qty in the SAME language as the rest. '+(lang==='de'?'Examples in German: "3 Eier", "2 Zehen", "1 mittlere Zwiebel". DO NOT use English words like "cloves" or "medium" — use German equivalents.':'Examples: "3 eggs", "2 cloves", "1 medium onion".')+' NEVER just a bare "3". '+
    'Respond ONLY with valid JSON, no markdown:\n'+
    '{"emoji":"<emoji>","name":"<dish name>","time":"'+slotTime+'","kcal":<n>,"protein":<g>,"carbs":<g>,"fat":<g>,"macro":"<e.g. 28g protein>","ingredients":[{"item":"<ingredient1>","qty":"<qty1>"},{"item":"<ingredient2>","qty":"<qty2>"},{"item":"<ingredient3>","qty":"<qty3>"},{"item":"<ingredient4>","qty":"<qty4>"}]}';
  try{
    var meal=await aiGenJSON(prompt,700,'mood_recipe');
    if(!meal||!meal.name)throw new Error('Invalid data');
    // Replace ONLY the targeted meal slot. Other meals stay intact, and
    // mealTrack.checked indices stay aligned because we don't reshuffle.
    if(plan&&Array.isArray(plan.todayMeals)&&plan.todayMeals[mealIdx]){
      // Preserve the time slot identity (in case AI returned a different label)
      meal.time=slotTime;
      plan.todayMeals[mealIdx]=meal;
      // Reset rating for this slot only
      if(mrat&&mrat[mealIdx]!=null)delete mrat[mealIdx];
      saveSession();
    }
    peakToast((de?esc(cuisine)+' '+esc(slotTime)+' bereit ✓':esc(cuisine)+' '+esc(slotTime)+' ready ✓'),{kind:'success',duration:1400});
    // Re-render Nutrition tab to show new meal in place + remember which slot
    // was just generated so we can offer "Re-roll" without going through the
    // whole picker again.
    window.__lastMoodPick={mealIdx:mealIdx,cuisine:cuisine};
    showTab('nutrition');
  }catch(e){
    console.error('pickMood error:',e);
    if(e&&e.premiumRequired){
      a.innerHTML='';
      showUpgradePrompt('mood_recipe');
      return;
    }
    a.innerHTML='<div style="font-size:12px;color:var(--faint);margin-top:8px;padding:10px;border:1px solid var(--border)">'+(de?'Fehler. Bitte erneut versuchen.':'Could not generate. Please try again.')+'</div><button class="blog" style="margin-top:8px" onclick="pickMood(\''+esc(cuisine).replace(/'/g,"\\'")+'\','+mealIdx+')">'+(de?'Nochmal versuchen':'Try again')+'</button>';
  }
}

  if(!window.__lastMoodPick)return;
  var p=window.__lastMoodPick;

}

// ── FITNESS TAB ───────────────────────────────────────────────────────
// Module-level flag: prevents multiple parallel translation calls when
// tFi is invoked repeatedly (e.g. during navigation, race conditions).
var __weekTranslating=false;
function tFi(p){
  var de=lang==='de';
  var sport=ud.sport||'—';var level=ud.level||'—';
  var sportDisplay=sportLabel(sport);
  // DE: trigger background translation of week templates if not yet cached.
  // Robust version (Apr 2026): with guard flag, explicit logging, and a
  // direct re-render via tFi(plan) instead of relying on showTab routing —
  // showTab depends on currentView/dashTab which can momentarily desync
  // and silently skip the re-render, leaving the user with English text.
  if(de&&p&&p.week&&weekNeedsTranslation(p.week,sport,level)&&!__weekTranslating){
    __weekTranslating=true;
    console.log('[i18n] Starting DE translation of week plan…');
    translateWeekPlanToDE(p.week,sport,level).then(function(translated){
      __weekTranslating=false;
      if(plan){
        plan.week=translated;
        saveSession();
      }
      console.log('[i18n] DE translation complete — re-rendering fitness tab');
      // Direct re-render. Bypasses showTab() routing because the user may
      // have navigated away or dashTab may have desynced. We only re-render
      // if the user is still actually looking at the fitness tab.
      if(currentView==='dashboard'&&dashTab==='fitness'){
        tFi(plan);
      }
    }).catch(function(e){
      __weekTranslating=false;
      console.warn('[i18n] DE translation failed:',e&&e.message||e);
    });
  }
  var c='<div class="sg"><div class="stat"><div class="stl">'+t('sp')+'</div><div class="stv">'+sportDisplay+'</div></div><div class="stat"><div class="stl">Level</div><div class="stv">'+level+'</div></div><div class="stat"><div class="stl">'+(de?'Einheiten':'Sessions')+'</div><div class="stv">'+(ud.sessions||'—')+t('sessionsUnit')+'</div></div><div class="stat"><div class="stl">'+(de?'Dauer':'Duration')+'</div><div class="stv">'+(ud.dur||'—')+' '+t('minutesLbl')+'</div></div></div>';

  // Loading hint: if we're actively translating, show a subtle banner so
  // the user knows English text is temporary, not a bug.
  if(de&&__weekTranslating){
    c+='<div style="background:var(--s2);border-left:3px solid var(--red);padding:10px 14px;margin:0 0 10px;font-size:11px;color:var(--dim);letter-spacing:.5px;display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border:2px solid var(--red);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0"></span>Plan wird übersetzt…</div>';
  }

  // WEEKLY PLAN VIEW
  if(p&&p.week&&p.week.days&&p.week.days.length){
    c+=renderWeekPlan(p.week);
  }

  // TODAY'S SESSION — derived from the week plan when available, so the
  // "today" block respects the user's actual training schedule (rest days
  // show recovery, training days show that day's session). Falls back to
  // the legacy p.workout only for old cached plans without a week.
  var todayD=null;
  if(p&&p.week&&p.week.days&&p.week.days.length){
    var idx=todayWeekdayIndex();
    todayD=p.week.days[idx]||null;
  }

  if(todayD&&todayD.type==='rest'){
    // Rest day — show a clean recovery card instead of forcing a workout.
    // Encourages the user to actually rest rather than improvise extra work.
    c+='<div class="dst" style="margin-top:16px">'+(de?'HEUTE':'TODAY')+'</div>';
    c+='<div class="wc wc-rest"><div class="wt">'+(de?'PAUSE & REGENERATION':'REST & RECOVERY')+'</div>';
    c+='<div class="wd" style="margin-top:6px;line-height:1.5">'+(de?'Heute keine Einheit. Erholung gehört zum Plan — sie ist es, in der dein Körper sich anpasst und stärker wird.':'No session today. Recovery is part of the plan — it\'s when your body adapts and gets stronger.')+'</div>';
    c+='<div style="margin-top:10px;font-size:11px;color:var(--faint);line-height:1.6">'+(de?'Empfehlung: 7-9h Schlaf, ausreichend Wasser, leichte Bewegung wenn du magst (Spaziergang, Mobility).':'Recommended: 7-9h sleep, plenty of water, light movement if you feel like it (walk, mobility).')+'</div>';
    c+='</div>';
  } else if(todayD&&todayD.title){
    // Training day from the week plan — render its exercises in the
    // familiar "today" layout, plus the adjust + rate widgets.
    c+='<div class="dst" style="margin-top:16px">'+t('tw')+'</div>';
    var dur=todayD.duration||(ud.dur||60);
    c+='<div class="wc"><div class="wt">'+todayD.title+' · '+dur+' MIN</div>';
    if(todayD.desc)c+='<div class="wd" style="margin-bottom:5px">'+todayD.desc+'</div>';
    if(todayD.focus)c+='<div style="font-size:9px;color:var(--red);font-weight:700;letter-spacing:1px;margin-top:3px">'+(de?'FOKUS':'FOCUS')+': '+todayD.focus+'</div>';
    c+='</div>';
    (todayD.exercises||[]).forEach(function(e,i){
      var nm=typeof e==='string'?e:(e.name||'Exercise');
      var dt=typeof e==='string'?'':(e.detail||'');

// Render weekly training plan with expandable day cards
function renderWeekPlan(week){
  var de=lang==='de';
  var days=week.days||[];
  var weekNum=week.weekNum||1;
  var phase=week.phase||'foundation';
  var phaseLabels={
    foundation:{en:'Foundation',de:'Grundlage'},
    build:{en:'Build Phase',de:'Aufbauphase'},
    peak:{en:'Peak Phase',de:'Leistungsphase'}
  };
  var phaseLabel=(phaseLabels[phase]||phaseLabels.foundation)[lang==='de'?'de':'en'];
  var dayNamesEN=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var dayNamesDE=['Mo','Di','Mi','Do','Fr','Sa','So'];
  var dayNames=de?dayNamesDE:dayNamesEN;

  var sessionCount=days.filter(function(d){return d.type&&d.type!=='rest';}).length;
  var completedCount=days.filter(function(d,i){
    return d.type&&d.type!=='rest'&&trainState.completed['w'+weekNum+'-d'+i];
  }).length;

  var c='<div class="dst" style="margin-top:4px">'+(de?'Wochenplan':'Weekly Plan')+'</div>';
  c+='<div class="wk-meta">'+(de?'Woche':'Week')+' '+weekNum+'/12 · '+phaseLabel+' · '+completedCount+'/'+sessionCount+(de?' abgeschlossen':' done')+'</div>';
  c+='<div class="wk-grid">';
  days.forEach(function(d,i){
    var dayLabel=dayNames[i]||d.day||('D'+(i+1));
    var isRest=!d.type||d.type==='rest';
    var isDone=!isRest&&trainState.completed['w'+weekNum+'-d'+i];
    var fb=trainState.feedback['w'+weekNum+'-d'+i];
    var typeLabel={
      technique:{en:'TECHNIQUE',de:'TECHNIK'},
      strength:{en:'STRENGTH',de:'KRAFT'},
      endurance:{en:'ENDURANCE',de:'AUSDAUER'},
      speed:{en:'SPEED',de:'TEMPO'},
      tempo:{en:'TEMPO',de:'TEMPO'},
      recovery:{en:'RECOVERY',de:'REGENERATION'},
      match:{en:'MATCH',de:'SPIEL'},
      mobility:{en:'MOBILITY',de:'MOBILITÄT'},
      mixed:{en:'MIXED',de:'GEMISCHT'}
    };
    var tl=isRest?(de?'PAUSE':'REST'):(typeLabel[d.type]||{en:d.type.toUpperCase(),de:d.type.toUpperCase()})[de?'de':'en'];
    var cls='wk-day'+(isRest?' rest':'')+(isDone?' done':'');
    // Both training and rest days are tappable — rest days show a recovery
    // detail (lets users plan ahead, e.g. preview Friday's rest expectations
    // on a Thursday).
    c+='<div class="'+cls+'" onclick="openWkDay('+i+')">';
    c+='<div class="wk-day-lbl">'+dayLabel+(isDone?' ✓':'')+'</div>';
    c+='<div class="wk-day-type">'+tl+'</div>';
    if(!isRest){
      c+='<div class="wk-day-title">'+(d.title||'').toUpperCase()+'</div>';
      if(d.duration)c+='<div class="wk-day-dur">'+d.duration+' '+(de?'Min':'min')+'</div>';
      if(fb){
        var fbIcon={easy:'🟢',perfect:'⚡',hard:'🔴'}[fb]||'';
        c+='<div class="wk-day-fb">'+fbIcon+'</div>';
      }
    }
    c+='</div>';
  });
  c+='</div>';
  // Advance week button — show only if all sessions in current week are done
  if(completedCount>=sessionCount&&sessionCount>0&&weekNum<12){
    c+='<button class="wk-advance" onclick="advanceWeek()">'+(de?'🚀 WOCHE '+(weekNum+1)+' STARTEN':'🚀 START WEEK '+(weekNum+1))+'</button>';
  }else if(completedCount>=sessionCount&&sessionCount>0&&weekNum>=12){
    c+='<div class="wk-done-all">'+(de?'🏆 12-Wochen-Zyklus abgeschlossen!':'🏆 12-week cycle complete!')+'</div>';
  }
  c+='<div id="wkDayDetail"></div>';
  return c;
}

// Expand single day's exercises inline
function openWkDay(i){
  var p=fp();

  if(!d)return;
  var de=lang==='de';
  var el=document.getElementById('wkDayDetail');
  if(!el)return;

  if(el.getAttribute('data-day')===String(i)){
    el.innerHTML='';
    el.removeAttribute('data-day');
    return;
  }
  el.setAttribute('data-day',String(i));
  // Rest-day branch: no exercises to render, but still show a useful detail
  // card so users can "preview" their plan ahead of time and understand the
  // recovery intent for that day.
  var isRestDay=!d.type||d.type==='rest';

    restHtml+='<div class="wk-detail-f">'+(de?'FOKUS: Erholung & Adaption':'FOCUS: Recovery & adaptation')+'</div>';
    restHtml+='<div class="wk-detail-d">'+(de?'Heute keine Trainingseinheit. Erholung ist kein Ausfall — sie ist der Teil des Plans, in dem dein Körper sich anpasst und stärker wird.':'No training session. Recovery isn\'t a gap — it\'s the part of the plan where your body adapts and gets stronger.')+'</div>';
    var restItems=de
      ?[
        {n:'Schlaf',d:'7-9 Stunden, möglichst gleichbleibender Rhythmus',t:'Schlaf ist der wichtigste Recovery-Hebel'},
        {n:'Hydration',d:'2-3 Liter Wasser über den Tag verteilt',t:'Auch ohne Training: gleichbleibend trinken'},
        {n:'Leichte Bewegung (optional)',d:'20-30 min Spaziergang oder Mobility-Flow',t:'Nicht intensiv — nur die Durchblutung halten'},
        {n:'Ernährung',d:'Bleibe bei deinen Tageszielen aus dem Plan',t:'Recovery ohne Nährstoffe = keine Anpassung'}
      ]
      :[
        {n:'Sleep',d:'7-9 hours, keep a consistent rhythm',t:'Sleep is the single biggest recovery lever'},
        {n:'Hydration',d:'2-3 liters of water spread across the day',t:'Even without training — stay consistent'},
        {n:'Light movement (optional)',d:'20-30 min walk or mobility flow',t:'Not intense — just keep blood flowing'},
        {n:'Nutrition',d:'Stick to your daily targets from the plan',t:'Recovery without fuel = no adaptation'}
      ];
    restItems.forEach(function(it,idx){
      restHtml+='<div class="ex-row"><div class="ex-num">'+(idx+1)+'</div><div style="flex:1;min-width:0"><div class="ex-name">'+it.n+'</div>';
      restHtml+='<div class="ex-detail">'+it.d+'</div>';
      restHtml+='<div class="ex-tip">💡 '+it.t+'</div>';
      restHtml+='</div></div>';
    });
    restHtml+='</div>';
    el.innerHTML=restHtml;
    // Scroll detail into view so users see what changed when tapping another
    // day from the grid above. Uses smooth scrolling on supported browsers.
    setTimeout(function(){
      try{el.scrollIntoView({behavior:'smooth',block:'nearest'});}catch(_){el.scrollIntoView();}
    },50);
    return;
  }
  // DE: if this session looks English (template not yet translated), kick
  // off a translation so the detail view doesn't stay in English when the
  // user opens it before tFi's bulk translate finished or for sessions the
  // bulk pass missed. Re-render this detail block once the translation
  // returns. Cache hits are instant; a real translate adds ~1-2s.
  //
  // DEFENSIVE: This branch had a pathological case where a failed AI call
  // returned the original (still-English) session, the re-render saw it
  // still looked English, kicked off translation again — endless loop that
  // froze the app. Three guards now:
  //   1. Per-day in-flight lock (don't fire a second call while one is pending)
  //   2. Per-day failed-attempt counter (give up after 2 failures so the user
  //      can at least see the English version)
  //   3. Equality check (only re-render if the translation actually changed)
  if(de&&d&&d.title&&(looksEnglish(d.title)||looksEnglish(d.focus)||looksEnglish(d.desc))){
    var lk=levelKey(ud.level);
    var sport=ud.sport||'';
    var transKey=sport+'|'+d.type+'|'+lk+'|'+d.title;
    window.__pkTransInFlight=window.__pkTransInFlight||{};
    window.__pkTransFailed=window.__pkTransFailed||{};
    if(!window.__pkTransInFlight[transKey]&&(window.__pkTransFailed[transKey]||0)<2){
      window.__pkTransInFlight[transKey]=true;
      var origTitle=d.title;
      translateSessionToDE(d,transKey).then(function(translated){
        window.__pkTransInFlight[transKey]=false;
        // Did the translation actually change anything? If not, the AI either
        // failed silently or returned the same content — either way, no point
        // re-rendering and risking a loop.
        var changed=translated&&translated.title&&translated.title!==origTitle;
        if(!changed){
          window.__pkTransFailed[transKey]=(window.__pkTransFailed[transKey]||0)+1;
          return;
        }
        // Persist the translated session in the plan so future renders use it
        if(plan&&plan.week&&plan.week.days&&plan.week.days[i]){
          plan.week.days[i]=Object.assign({},plan.week.days[i],translated);
          saveSession();
        }
        // Re-render this detail if still open on the same day
        var el2=document.getElementById('wkDayDetail');
        if(el2&&el2.getAttribute('data-day')===String(i)){
          el2.removeAttribute('data-day');
          openWkDay(i);
        }
      }).catch(function(e){
        window.__pkTransInFlight[transKey]=false;
        window.__pkTransFailed[transKey]=(window.__pkTransFailed[transKey]||0)+1;
        console.warn('[i18n] detail translate failed:',e&&e.message||e);
      });
    }
  }
  var weekNum=(p.week.weekNum||trainState.currentWeek||1);
  var key='w'+weekNum+'-d'+i;
  var isCompleted=!!trainState.completed[key];
  var currentFb=trainState.feedback[key];

  if(d.desc)html+='<div class="wk-detail-d">'+d.desc+'</div>';
  (d.exercises||[]).forEach(function(e,idx){
    var nm=typeof e==='string'?e:(e.name||'Exercise');
    var dt=typeof e==='string'?'':(e.detail||'');
    var tip=typeof e==='object'?(e.tip||''):'';
    var exJson=encodeURIComponent(JSON.stringify({name:nm,detail:dt,tip:tip}));
    html+='<div class="ex-row"><div class="ex-num">'+(idx+1)+'</div><div style="flex:1;min-width:0"><div class="ex-name" style="display:flex;align-items:center;gap:6px"><span style="flex:1">'+nm+'</span><button class="ex-info-btn" onclick="explainExercise(\''+exJson+'\')" title="'+(de?'Was ist das?':'What is this?')+'" aria-label="'+(de?'Übung erklären':'Explain exercise')+'">ⓘ</button></div>';
    if(dt)html+='<div class="ex-detail">'+dt+'</div>';
    if(tip)html+='<div class="ex-tip">💡 '+tip+'</div>';
    html+='</div></div>';
  });

  // Completion section
  html+='<div class="wk-complete">';
  if(!isCompleted){
    html+='<button class="wk-complete-btn" onclick="completeSession('+i+')">'+(de?'✓ SESSION ABSCHLIESSEN':'✓ COMPLETE SESSION')+'</button>';
  }else{
    html+='<div class="wk-done">'+(de?'✓ Erledigt':'✓ Completed')+'</div>';
    // Estimated kcal burned — based on MET tables, body weight, duration.
    // Skip on rest days (no workout to estimate). Only show when we can produce
    // a sensible number (weight + duration must be present in user data).
    if(d.type!=='rest'){
      var burnedKcal=estimateBurnedKcal(ud.sport,ud.level,d.duration||ud.dur,ud.weight);
      if(burnedKcal!==null&&burnedKcal>0){
        // Range hint: ±20% so users understand this isn't a measurement.
        var lo=Math.round(burnedKcal*0.8);
        var hi=Math.round(burnedKcal*1.2);
        html+='<div class="wk-burned">'+
          '<div class="wk-burned-lbl">'+(de?'Geschätzt verbrannt':'Estimated burn')+'</div>'+
          '<div class="wk-burned-val">~'+burnedKcal+' kcal</div>'+
          '<div class="wk-burned-range">'+(de?'Spanne: ':'Range: ')+lo+'–'+hi+' kcal</div>'+
          '<div class="wk-burned-note">'+(de?'Schätzung basierend auf Sportart, Dauer und Körpergewicht. Für genaue Werte: Pulsmesser nutzen.':'Estimate based on sport, duration and body weight. For accurate numbers, use a heart-rate monitor.')+'</div>'+
        '</div>';
      }
    }
    html+='<div class="wk-fb-lbl">'+(de?'Wie war\'s?':'How was it?')+'</div>';
    html+='<div class="wk-fb-btns">';
    html+='<button class="wk-fb '+(currentFb==='easy'?'sel':'')+'" onclick="rateFeedback('+i+',\'easy\')">'+(de?'🟢 Zu leicht':'🟢 Too easy')+'</button>';
    html+='<button class="wk-fb '+(currentFb==='perfect'?'sel':'')+'" onclick="rateFeedback('+i+',\'perfect\')">'+(de?'⚡ Perfekt':'⚡ Perfect')+'</button>';
    html+='<button class="wk-fb '+(currentFb==='hard'?'sel':'')+'" onclick="rateFeedback('+i+',\'hard\')">'+(de?'🔴 Zu schwer':'🔴 Too hard')+'</button>';
    html+='</div>';
  }
  html+='</div></div>';
  el.innerHTML=html;
  // Scroll detail into view so users see what changed when tapping another
  // day from the grid above.
  setTimeout(function(){
    try{el.scrollIntoView({behavior:'smooth',block:'nearest'});}catch(_){el.scrollIntoView();}
  },50);

// Mark session as completed
function completeSession(dayIdx){
  if(gateFree('session_complete'))return;
  var p=fp();
  if(!p||!p.week)return;
  var weekNum=p.week.weekNum||trainState.currentWeek||1;
  var key='w'+weekNum+'-d'+dayIdx;
  trainState.completed[key]=true;
  saveSession();
  peakToast(lang==='de'?'Session abgeschlossen ✓':'Session completed ✓',{kind:'success',duration:1500});
  // Re-render detail to show feedback buttons
  var el=document.getElementById('wkDayDetail');
  if(el)el.removeAttribute('data-day'); // force re-open
  openWkDay(dayIdx);
}

// Record feedback for a session
function rateFeedback(dayIdx,rating){
  if(gateFree('session_complete'))return;
  var p=fp();
  if(!p||!p.week)return;
  var weekNum=p.week.weekNum||trainState.currentWeek||1;
  var key='w'+weekNum+'-d'+dayIdx;
  trainState.feedback[key]=rating;
  saveSession();
  // Update UI only — no need to rebuild whole view
  var el=document.getElementById('wkDayDetail');
  if(el)el.removeAttribute('data-day');
  openWkDay(dayIdx);
}

// Advance to next week: regenerate plan with incremented week number
async function advanceWeek(){
  if(gateFree('training_progression'))return;
  var de=lang==='de';
  var current=trainState.currentWeek||1;
  if(current>=12){
    peakToast(de?'🎉 12-Wochen-Zyklus abgeschlossen!':'🎉 12-week cycle complete!',{kind:'success',duration:3000});
    return;
  }
  var ok=await peakConfirm(de?('Weiter zu Woche '+(current+1)+'? Dein Plan wird angepasst.'):('Move to Week '+(current+1)+'? Plan will adjust to your progress.'));
  if(!ok)return;
  trainState.currentWeek=current+1;
  // Decay adjustBias by 50% — last week's feedback still influences, but fades
  if(trainState.adjustBias)trainState.adjustBias=trainState.adjustBias*0.5;
  saveSession();
  // Rebuild week plan with new progression
  if(plan){
    var sport=ud.sport||'Running';
    var level=ud.level||'Intermediate';
    plan.week=synthWeekPlan(sport,level,parseInt(ud.sessions||3),parseInt(ud.dur||60),plan.workout);
    saveSession();
    enrichWeekWithAI();
  }
  peakToast(de?('Woche '+(current+1)+' gestartet 💪'):('Week '+(current+1)+' started 💪'),{kind:'success'});
  showTab('fitness');
}

// Feedback bias lives in trainState.adjustBias and stacks with the
// auto-progression multiplier. 4 discrete steps:
//   way_too_easy   → +0.30  (significantly harder next time)
//   just_right     → +0.05  (slight upward nudge — you're ready for more)
//   slightly_hard  → -0.10  (small dial-back)
//   way_too_hard   → -0.25  (meaningful dial-back)
async function adjustWorkout(type){
  if(gateFree('workout_adjustment'))return;
  var el=document.getElementById('adj');
  var de=lang==='de';
  var biasMap={
    way_too_easy:  0.30,
    just_right:    0.05,
    slightly_hard:-0.10,
    way_too_hard: -0.25
  };
  var msgMap={
    way_too_easy:{
      en:'Noted — next session will push you harder.',
      de:'Notiert — die nächste Session wird deutlich fordernder.'
    },
    just_right:{
      en:'Perfect. We\'ll add a small challenge next session to keep you progressing.',
      de:'Top. Wir steigern nächste Session leicht, damit du weiter wächst.'
    },
    slightly_hard:{
      en:'Got it — we\'ll dial the next session back a bit.',
      de:'Verstanden — nächste Session wird etwas leichter.'
    },
    way_too_hard:{
      en:'Noted — next session will be noticeably easier so you can rebuild.',
      de:'Notiert — nächste Session wird spürbar leichter zum Auftanken.'
    }
  };
  var bias=biasMap[type];
  if(bias===undefined)return;
  // Store feedback bias (stacks across sessions up to ±0.5 clamp)
  if(!trainState.adjustBias)trainState.adjustBias=0;
  trainState.adjustBias=Math.max(-0.5,Math.min(0.5,(trainState.adjustBias||0)+bias));
  saveSession();
  if(el){

// ── BARCODE SCANNER ───────────────────────────────────────────────────
var __zxingReader=null;
var __zxingControls=null;
var __zxingLoaded=false;

function loadZXing(){
  if(__zxingLoaded)return Promise.resolve(window.ZXingBrowser);
  return new Promise(function(resolve,reject){
    // Load @zxing/library first — it provides BarcodeFormat + DecodeHintType
    // constants that @zxing/browser doesn't expose on its own in UMD.
    var s1=document.createElement('script');
    s1.src='https://unpkg.com/@zxing/library@0.21.3';
    s1.onload=function(){
      var s2=document.createElement('script');
      s2.src='https://unpkg.com/@zxing/browser@0.1.5';
      s2.onload=function(){__zxingLoaded=true;resolve(window.ZXingBrowser);};
      s2.onerror=function(){reject(new Error('Scanner library (browser) failed to load'));};
      document.head.appendChild(s2);
    };
    s1.onerror=function(){reject(new Error('Scanner library (core) failed to load'));};
    document.head.appendChild(s1);
  });
}

async function openBarcodeScanner(){
  var de=lang==='de';
  // Create overlay
  var ov=document.createElement('div');
  ov.id='scanOverlay';
  ov.className='scan-overlay';
  ov.innerHTML=
    '<video id="scanVideo" playsinline muted autoplay></video>'+
    '<div class="scan-ui">'+
      '<button class="scan-close" onclick="closeBarcodeScanner()" aria-label="close">✕</button>'+
      '<div class="scan-frame"><div class="scan-frame-line"></div></div>'+
      '<div class="scan-hint" id="scanHint">'+(de?'Barcode ins Rechteck halten':'Center the barcode in the frame')+'</div>'+
      '<div class="scan-err" id="scanErr" style="display:none"></div>'+
      '<button class="scan-manual" id="scanManualBtn" onclick="fallbackToManual()" style="display:none">'+(de?'Barcode manuell eingeben':'Enter barcode manually')+' →</button>'+
    '</div>';
  document.body.appendChild(ov);
  try{
    var ZX=await loadZXing();
    var video=document.getElementById('scanVideo');
    // Request camera with continuous autofocus + good resolution for barcode sharpness
    // Fallback chain: back camera with focus mode → back camera → any camera
    var stream;
    try{
      stream=await navigator.mediaDevices.getUserMedia({
        video:{
          facingMode:{ideal:'environment'},
          width:{ideal:1920},
          height:{ideal:1080},
          focusMode:{ideal:'continuous'},
          advanced:[{focusMode:'continuous'}]
        }
      });
    }catch(_){
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
      }catch(_2){
        stream=await navigator.mediaDevices.getUserMedia({video:true});
      }
    }
    video.srcObject=stream;
    await video.play().catch(function(){});

    // Try to apply focus/torch constraints post-stream-start (some Android/iOS versions allow this)
    try{
      var track=stream.getVideoTracks()[0];
      if(track&&track.applyConstraints){
        var caps=track.getCapabilities?track.getCapabilities():{};
        var constraints={};
        if(caps.focusMode&&caps.focusMode.indexOf('continuous')!==-1)constraints.focusMode='continuous';
        if(Object.keys(constraints).length)await track.applyConstraints({advanced:[constraints]}).catch(function(){});
      }
    }catch(_){}

    // Configure ZXing hints: only scan product barcode formats (EAN/UPC/Code128)
    // instead of all possible formats. This is ~10-20x faster and more reliable
    // for food products. TRY_HARDER spends more cycles for better accuracy.
    // BarcodeFormat + DecodeHintType live on window.ZXing (@zxing/library), not on
    // ZXingBrowser.
    var hints=null;
    try{
      var LibNS=window.ZXing||ZX; // @zxing/library namespace if loaded
      if(LibNS&&LibNS.BarcodeFormat&&LibNS.DecodeHintType){
        hints=new Map();
        var formats=[
          LibNS.BarcodeFormat.EAN_13,
          LibNS.BarcodeFormat.EAN_8,
          LibNS.BarcodeFormat.UPC_A,
          LibNS.BarcodeFormat.UPC_E,
          LibNS.BarcodeFormat.CODE_128
        ].filter(function(f){return f!==undefined;});
        if(formats.length)hints.set(LibNS.DecodeHintType.POSSIBLE_FORMATS,formats);
        hints.set(LibNS.DecodeHintType.TRY_HARDER,true);
      }
    }catch(_){hints=null;}

    var reader=hints?new ZX.BrowserMultiFormatReader(hints):new ZX.BrowserMultiFormatReader();
    __zxingReader=reader;
    // Use decodeFromStream so we pass our already-configured stream
    __zxingControls=await reader.decodeFromStream(stream,video,function(result,err){
      if(result){
        var code=result.getText();
        handleBarcodeDetected(code);
      }
    });

    // After 20 seconds without a result, hint that manual entry is available
    setTimeout(function(){
      if(document.getElementById('scanOverlay')){
        var hint=document.getElementById('scanHint');
        var btn=document.getElementById('scanManualBtn');
        if(hint)hint.textContent=de?'Barcode schwer lesbar? Mehr Licht oder näher halten':'Barcode not reading? Try more light or move closer';
        if(btn)btn.style.display='block';
      }
    },20000);
  }catch(err){
    var msg;
    if(err&&err.name==='NotAllowedError'){
      msg=de?'Kamerazugriff verweigert. Bitte in den Browser-Einstellungen erlauben.':'Camera access denied. Please allow in browser settings.';
    }else if(err&&err.name==='NotFoundError'){
      msg=de?'Keine Kamera gefunden.':'No camera found.';
    }else{
      msg=err.message||(de?'Kamera nicht verfügbar.':'Camera unavailable.');
    }
    var errEl=document.getElementById('scanErr');
    if(errEl){errEl.textContent=msg;errEl.style.display='block';}
    var btn=document.getElementById('scanManualBtn');
    if(btn)btn.style.display='block';
    console.error('Barcode scanner error:',err);
  }
}

function fallbackToManual(){
  closeBarcodeScanner();
  openManualBarcode();
}

function closeBarcodeScanner(){
  try{if(__zxingControls&&__zxingControls.stop)__zxingControls.stop();}catch(e){}
  try{if(__zxingReader&&__zxingReader.reset)__zxingReader.reset();}catch(e){}
  // Stop all video tracks on the <video> element in case the ZXing cleanup missed them
  try{
    var v=document.getElementById('scanVideo');
    if(v&&v.srcObject){
      v.srcObject.getTracks().forEach(function(t){try{t.stop();}catch(_){}});
      v.srcObject=null;
    }
  }catch(_){}
  __zxingReader=null;__zxingControls=null;
  var ov=document.getElementById('scanOverlay');
  if(ov)ov.remove();
}

async function handleBarcodeDetected(code){
  // Prevent double-fire while navigating away
  if(!document.getElementById('scanOverlay'))return;
  closeBarcodeScanner();
  await lookupBarcode(code);
}

function openManualBarcode(){
  var de=lang==='de';
  var code=window.prompt(de?'Barcode eingeben (6–14 Ziffern):':'Enter barcode (6–14 digits):','');
  if(!code)return;
  code=code.trim().replace(/\D/g,'');
  if(!/^\d{6,14}$/.test(code)){
    alert(de?'Ungültiger Barcode.':'Invalid barcode.');
    return;
  }
  lookupBarcode(code);
}

async function lookupBarcode(code){
  var de=lang==='de';
  var el=document.getElementById('sr');
  if(!el)return;
  el.innerHTML='<div class="aib"><div class="ailbl"><div class="aidot"></div>'+(de?'Suche Produkt…':'Looking up product…')+'</div><div class="lw" style="padding:14px"><div class="spin"></div></div></div>';
  try{
    var sess=await window.sb.auth.getSession();
    var token=sess?.data?.session?.access_token;
    var res=await fetch(BACKEND+'/ai/scan-barcode',{
      method:'POST',
      headers:Object.assign({'Content-Type':'application/json'},token?{Authorization:'Bearer '+token}:{}),
      body:JSON.stringify({barcode:code,userGoal:ud.goal||'',userLang:lang})
    });
    if(res.status===404){
      el.innerHTML='<div class="aib"><div class="ailbl"><div class="aidot"></div>'+(de?'Nicht gefunden':'Not found')+'</div><p style="font-size:12px;color:var(--dim);margin:6px 0">'+(de?'Barcode ':'Barcode ')+esc(code)+(de?' ist nicht in unserer Datenbank. Du kannst den Eintrag manuell hinzufügen.':' is not in our database. You can add it manually.')+'</p><button class="bnx" style="width:100%;font-size:11px;padding:9px" onclick="openManualFoodEntry()">'+(de?'+ Manuell eintragen':'+ Add manually')+'</button></div>';
      return;
    }
    var data=await res.json().catch(function(){return{};});
    if(!res.ok||!data.product){
      throw new Error(data.error||(de?'Fehler beim Nachschlagen.':'Lookup error.'));
    }
    renderProductResult(data.product);
  }catch(err){
    el.innerHTML='<div class="aib" style="border-color:var(--red)"><div class="ailbl" style="color:var(--red)"><div class="aidot"></div>'+(de?'Fehler':'Error')+'</div><p style="font-size:12px;color:var(--dim);margin:6px 0">'+esc(err.message||String(err))+'</p></div>';
  }
}

function renderProductResult(p){
  var de=lang==='de';
  var el=document.getElementById('sr');
  if(!el)return;
  // ─── XSS hardening: data comes from OpenFoodFacts API, must be escaped ──
  // Numeric fields are coerced to safe Number first; string fields use esc().
  var fitClass=p.fit==='fit'?'fgood':(p.fit==='avoid'?'fbad':'fwarn');
  var fitLabel=p.fit==='fit'?(de?'✓ Passt zum Plan':'✓ Fits plan'):(p.fit==='avoid'?(de?'⚠ Eher meiden':'⚠ Best avoided'):(de?'◉ In Maßen':'◉ In moderation'));
  var warningsHtml=(p.warnings&&p.warnings.length)?'<div style="font-size:10px;color:var(--faint);margin-top:4px">'+p.warnings.map(esc).join(' · ')+'</div>':'';
  // Image URL: only allow http(s), reject javascript: and data: URIs.
  var safeImg=(typeof p.image==='string'&&/^https?:\/\//i.test(p.image))?p.image:'';
  var imgHtml=safeImg?'<img src="'+esc(safeImg)+'" alt="" style="width:48px;height:48px;object-fit:cover;margin-right:10px;flex-shrink:0">':'';
  var brandLine=p.brand?(esc(p.brand)+' — '):'';
  var nameEsc=esc(p.name||'');
  var kcal=Number(p.kcal)||0;
  var protein=Number(p.protein)||0;
  var carbs=Number(p.carbs)||0;
  var servingG=Number(p.serving_g)||0;
  var nutriScore=p.nutri_score?esc(p.nutri_score):'';
  // logFood is called via JSON.stringify which is safe for JS strings, but
  // the resulting fragment is then placed inside an HTML attribute — so we
  // also need to encode quotes for the attribute context. Stick with the
  // existing pattern (JSON.stringify + &quot;) since it's already correct.
  var logArg=JSON.stringify((p.brand?p.brand+' ':'')+p.name).replace(/"/g,'&quot;');
  el.innerHTML=
    '<div class="sres">'+
      '<div style="display:flex;align-items:flex-start">'+imgHtml+
        '<div style="flex:1;min-width:0">'+
          '<div class="srn">'+brandLine+nameEsc+'</div>'+
          '<div class="srm">~'+kcal+' kcal · '+protein+'g '+(de?'Eiweiß':'protein')+' · '+carbs+'g '+(de?'Kohlenh.':'carbs')+'</div>'+
          '<div style="font-size:10px;color:var(--faint);margin-top:2px">'+(de?'pro Portion':'per serving')+' (~'+servingG+'g)'+(nutriScore?' · Nutri-Score '+nutriScore:'')+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="fbdg '+fitClass+'" style="margin-top:8px">'+fitLabel+'</div>'+
      warningsHtml+
      '<div style="display:flex;gap:7px;margin-top:10px">'+
        '<button class="bnx" style="flex:1;font-size:10px;padding:7px;letter-spacing:1px" onclick="logFood('+logArg+','+kcal+')">LOG</button>'+
        '<button class="bnx" style="flex:1;font-size:10px;padding:7px;letter-spacing:1px;background:var(--s3);color:var(--dim)" onclick="openBarcodeScanner()">'+(de?'NÄCHSTER SCAN':'SCAN AGAIN')+' →</button>'+
      '</div>'+
    '</div>';
}

function openManualFoodEntry(){
  var de=lang==='de';
  var name=window.prompt(de?'Produktname:':'Product name:','');
  if(!name)return;
  var kcalStr=window.prompt(de?'Geschätzte Kalorien:':'Estimated calories:','');
  var kcal=parseInt(kcalStr,10);
  if(!isFinite(kcal)||kcal<=0){alert(de?'Bitte gültige Kalorienzahl eingeben.':'Please enter a valid calorie number.');return;}

function openMenuScanner(){
  var de=lang==='de';
  // Use a file input with capture hint so mobile devices open camera directly
  var input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.capture='environment';
  input.style.display='none';
  input.addEventListener('change',function(e){
    var file=e.target.files&&e.target.files[0];
    if(!file)return;
    handleMenuPhoto(file);
  });
  document.body.appendChild(input);
  input.click();
  // Auto-cleanup after 60s just in case
  setTimeout(function(){try{input.remove();}catch(_){}},60000);
}

async function handleMenuPhoto(file){
  var de=lang==='de';
  var el=document.getElementById('sr');
  if(!el)return;
  if(!file.type||!file.type.startsWith('image/')){
    el.innerHTML='<div class="aib" style="border-color:var(--red)"><div class="ailbl" style="color:var(--red)"><div class="aidot"></div>'+(de?'Bitte ein Foto wählen':'Please choose a photo')+'</div></div>';
    return;
  }
  el.innerHTML='<div class="aib"><div class="ailbl"><div class="aidot"></div>'+(de?'Analysiere Speisekarte…':'Analyzing menu…')+'</div><div class="lw" style="padding:14px"><div class="spin"></div><p style="font-size:11px;color:var(--faint);margin-top:8px">'+(de?'Das dauert 5–15 Sekunden':'This takes 5–15 seconds')+'</p></div></div>';
  try{
    // Downscale to max 1280px to keep payload small + faster upload
    var dataUrl=await resizeImageFile(file,1280,0.82);
    // Split "data:image/jpeg;base64,AAAA..." into mediaType + base64
    var m=dataUrl.match(/^data:([^;]+);base64,(.+)$/);
    if(!m)throw new Error('Image encoding failed');
    var mediaType=m[1];var b64=m[2];
    var sess=await window.sb.auth.getSession();
    var token=sess?.data?.session?.access_token;
    var res=await fetch(BACKEND+'/ai/scan-menu',{
      method:'POST',
      headers:Object.assign({'Content-Type':'application/json'},token?{Authorization:'Bearer '+token}:{}),
      body:JSON.stringify({image:b64,mediaType:mediaType,userGoal:ud.goal||'',userLang:lang})
    });
    var data=await res.json().catch(function(){return{};});
    if(!res.ok){
      // Surface the real error for debugging: 413 = payload too big, 502 = AI error, etc.
      var errMsg=data.error||('HTTP '+res.status);
      if(res.status===413)errMsg=de?'Bild zu groß. Bitte kleineres Foto.':'Image too large. Please use a smaller photo.';
      throw new Error(errMsg);
    }
    if(data.error==='no_menu'||!data.dishes||!data.dishes.length){
      el.innerHTML='<div class="aib" style="border-color:var(--red)"><div class="ailbl" style="color:var(--red)"><div class="aidot"></div>'+(de?'Keine Speisekarte erkannt':'No menu detected')+'</div><p style="font-size:12px;color:var(--dim);margin:6px 0">'+(de?'Versuch es mit einem schärferen Foto der Karte.':'Try again with a clearer photo of the menu.')+'</p><button class="bnx" style="width:100%;font-size:11px;padding:9px;margin-top:6px" onclick="openMenuScanner()">'+(de?'Neues Foto':'New photo')+' →</button></div>';
      return;
    }
    renderMenuResult(data.dishes);
  }catch(err){
    console.error('Menu scan error:',err);
    el.innerHTML='<div class="aib" style="border-color:var(--red)"><div class="ailbl" style="color:var(--red)"><div class="aidot"></div>'+(de?'Fehler':'Error')+'</div><p style="font-size:12px;color:var(--dim);margin:6px 0">'+esc(err.message||String(err))+'</p><button class="bnx" style="width:100%;font-size:11px;padding:9px;margin-top:6px" onclick="openMenuScanner()">'+(de?'Nochmal versuchen':'Try again')+' →</button></div>';
  }
}

function resizeImageFile(file,maxDim,quality){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onerror=function(){reject(new Error('File read failed'));};
    reader.onload=function(){
      var img=new Image();
      img.onload=function(){
        var w=img.naturalWidth,h=img.naturalHeight;
        if(w>maxDim||h>maxDim){
          if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
          else{w=Math.round(w*maxDim/h);h=maxDim;}
        }
        var canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        var ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        try{resolve(canvas.toDataURL('image/jpeg',quality));}
        catch(e){reject(e);}
      };
      img.onerror=function(){reject(new Error('Image load failed'));};
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── QUICK-LOG: real AI-powered calorie+macro estimation ───────────────
// Replaces the old Math.random() dummy. Two-phase flow:
//   1. First call → AI either estimates or asks for clarification
//   2. If clarification needed → show question, user responds → second call
var logClarify=null; // {originalText, question} when clarification pending
var logBusy=false;

async function addLog(){
  if(logBusy)return;
  var inp=document.getElementById('li');
  if(!inp||!inp.value.trim())return;
  var v=inp.value.trim();
  var de=lang==='de';

  // Determine if this is a fresh entry or a clarification response
  var isFollowup=!!logClarify;
  var payload={
    text:v,
    userLang:lang
  };
  if(isFollowup){
    payload.originalText=logClarify.originalText;
    payload.clarification=v;
  }

  // UI: lock button + show spinner
  logBusy=true;
  var btn=document.querySelector('button[onclick="addLog()"]');
  var originalLabel=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.style.opacity='0.6';btn.textContent=de?'Analysiere...':'Analysing...';}

  try{
    var sess=await window.sb.auth.getSession();
    var token=sess&&sess.data&&sess.data.session&&sess.data.session.access_token;
    if(!token){peakToast(de?'Nicht eingeloggt.':'Not signed in.');return;}

    var res=await fetch(BACKEND+'/ai/quick-log',{
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    if(res.status===403){
      var e403={};try{e403=await res.json();}catch(_){}
      if(e403.error==='premium_required'){peakToast(de?'Protokoll ist Premium-exklusiv.':'Log is Premium-only.');}
      else{peakToast(de?'Zugriff verweigert.':'Access denied.');}
      return;
    }
    if(!res.ok){throw new Error('HTTP '+res.status);}

    var data=await res.json();

    // Branch 1: AI needs clarification
    if(data.needsClarification){
      logClarify={originalText:data.originalText||v,question:data.question};
      // Show question inline above input
      inp.value='';
      inp.placeholder=de?'Deine Antwort...':'Your answer...';
      var existing=document.getElementById('logClarifyBox');
      if(existing)existing.remove();
      var box=document.createElement('div');
      box.id='logClarifyBox';
      box.style.cssText='background:var(--s1);border-left:3px solid var(--red);padding:12px 14px;margin:0 0 10px;font-size:12px;color:var(--ink);line-height:1.5;display:flex;justify-content:space-between;align-items:flex-start;gap:10px';
      box.innerHTML='<div><strong style="display:block;margin-bottom:4px;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-size:10px;color:var(--red)">'+(de?'Bitte präzisieren':'Please clarify')+'</strong>'+data.question+'</div><button onclick="cancelClarify()" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>';
      inp.parentNode.insertBefore(box,inp);
      inp.focus();
      return;
    }

    // Branch 2: We got an estimate
    flog.push({
      text:data.label||v,
      emoji:data.emoji||'🍽️',
      kcal:data.kcal||0,
      protein:data.protein||0,
      carbs:data.carbs||0,
      fat:data.fat||0,
      time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    });
    // Reset clarify state
    logClarify=null;
    logEditIdx=-1;
    tLg();
  }catch(err){
    console.error('Quick-log error:',err);
    peakToast(de?'Fehler bei der Analyse. Bitte manuell eintragen.':'Analysis failed. Please enter manually.');
  }finally{
    logBusy=false;
    // Button is re-rendered by tLg() on success, so only restore label on failure
    if(btn&&document.body.contains(btn)){btn.disabled=false;btn.style.opacity='1';btn.textContent=originalLabel;}
  }
}

function cancelClarify(){
  logClarify=null;
  var box=document.getElementById('logClarifyBox');
  if(box)box.remove();
  var inp=document.getElementById('li');
  if(inp){inp.value='';inp.placeholder=t('lp');}
}

function editLog(idx){
  logEditIdx=idx;

}

function cancelLog(){

function saveLog(idx){
  var t2=document.getElementById('eTxt'+idx);
  var k=document.getElementById('eKcal'+idx);
  var em=document.getElementById('eEm'+idx);
  if(!t2||!k)return;
  var text=t2.value.trim();
  var kcal=parseInt(k.value)||0;
  var emoji=(em&&em.value.trim())||'🍽️';
  if(!text){peakToast(lang==='de'?'Text darf nicht leer sein.':'Text cannot be empty.');return;}
  if(kcal<0)kcal=0;
  flog[idx].text=text;
  flog[idx].kcal=kcal;
  flog[idx].emoji=emoji;
  logEditIdx=-1;
  tLg();
}

async function deleteLog(idx){
  var de=lang==='de';

}

async function doMagicLink(){
  // Renamed-but-kept for backwards compat: this now sends an OTP code
  // rather than a magic link. OTP works in any PWA/browser context.
  var em=document.getElementById('lem').value.trim();
  var de=lang==='de';
  if(!em){showE('el2',de?'Bitte E-Mail eingeben.':'Please enter your email.');return;}
  var btn=document.getElementById('magicLinkBtn');
  btn.textContent=de?'Wird gesendet...':'Sending...';
  btn.style.opacity='.6';btn.disabled=true;
  try{
    var res=await fetch(BACKEND+'/auth/send-otp',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:em,lang:lang})
    });
    var data=await res.json();
    // No account exists for this email → don't dump them in OTP screen,
    // route them directly to free signup
    if(res.status===404&&data.error==='no_account'){
      var box=document.getElementById('el2');
      if(box){
        box.innerHTML=
          '<div style="font-size:13px;line-height:1.5;color:var(--ink);margin-bottom:8px">'+
            (de?'Für <strong>'+em+'</strong> gibt es noch kein Konto.':'No account exists for <strong>'+em+'</strong> yet.')+

          '<button class="bnx" onclick="startFreeFlow()" style="width:100%;padding:10px;font-size:12px">'+
            (de?'✦ Kostenlos starten':'✦ Start free')+' →'+
          '</button>';
        box.style.display='block';
      }
      btn.textContent=de?'CODE ANFORDERN →':'SEND CODE →';
      btn.style.opacity='1';btn.disabled=false;
      return;
    }
    if(!res.ok)throw new Error(data.message||data.error||(de?'Code konnte nicht gesendet werden.':'Could not send code.'));
    ud.pendingLoginEmail=em;
    showOtpInput(em);
  }catch(err){
    showE('el2',err.message||(de?'Fehler. Erneut versuchen.':'Something went wrong. Try again.'));
    btn.textContent=de?'CODE ANFORDERN →':'SEND CODE →';
    btn.style.opacity='1';btn.disabled=false;
  }
}

async function doVerifyOtp(){
  var em=ud.pendingLoginEmail;
  var inp=document.getElementById('otpIn');
  if(!inp||!em)return;
  var code=inp.value.replace(/\D/g,'');
  var de=lang==='de';
  if(code.length!==6){
    showE('eotp',de?'Bitte 6 Ziffern eingeben.':'Please enter 6 digits.');
    return;
  }
  var btn=document.getElementById('otpVerifyBtn');
  btn.textContent=de?'Prüfe...':'Verifying...';btn.style.opacity='.6';btn.disabled=true;
  try{
    var res=await fetch(BACKEND+'/auth/verify-otp',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:em,code:code})
    });
    var data=await res.json();
    if(!res.ok){
      var msg=data.error||(de?'Falscher Code':'Wrong code');
      if(data.code==='WRONG_CODE'&&typeof data.attemptsLeft==='number'){
        msg=de?('Falscher Code. Noch '+data.attemptsLeft+' Versuche.'):('Wrong code. '+data.attemptsLeft+' tries left.');
      }else if(data.code==='CODE_EXPIRED'){
        msg=de?'Code abgelaufen. Fordere einen neuen an.':'Code expired. Request a new one.';
      }else if(data.code==='TOO_MANY_ATTEMPTS'){
        msg=de?'Zu viele Versuche. Fordere einen neuen Code an.':'Too many attempts. Request a new code.';
      }
      throw new Error(msg);
    }
    if(!data.session||!data.session.access_token){
      throw new Error(de?'Login-Fehler.':'Login error.');
    }
    // Hand the tokens to the Supabase client — it will persist them and fire
    // the SIGNED_IN event which triggers loadAuthProfile.
    var setRes=await window.sb.auth.setSession({
      access_token:data.session.access_token,
      refresh_token:data.session.refresh_token,
    });
    if(setRes.error)throw new Error(setRes.error.message);
    ud.pendingLoginEmail=null;
    saveSession();
    // Load profile + render dashboard
    var ok=await loadAuthProfile();
    if(!ok){
      peakToast(de?'Angemeldet ✓':'Signed in ✓',{kind:'success'});
    }
  }catch(err){
    showE('eotp',err.message);
    btn.textContent=de?'EINLOGGEN →':'SIGN IN →';btn.style.opacity='1';btn.disabled=false;
  }
}

// ── AUTH: profile loader + boot flow ──────────────────────────────────
// Called after Supabase session is established (via magic link, Google,
// or restored from localStorage). Loads profile row from backend and
// routes user into the dashboard (or onboarding if profile not found).

// Prevents double-calls from onAuthStateChange + bootApp racing each other
var __authLoading=false;

async function loadAuthProfile(){
  if(__authLoading)return true;
  __authLoading=true;
  var de=lang==='de';
  try{
    var sess=await window.sb.auth.getSession();
    var token=sess?.data?.session?.access_token;
    if(!token){__authLoading=false;return false;}

    var res=await fetch(BACKEND+'/user/profile',{
      headers:{Authorization:'Bearer '+token}
    });

    if(res.status===404){
      // Auth user exists but no profile row — signed in via Google without
      // going through Stripe. Show a clear "complete your signup" screen.
      var body=await res.json().catch(function(){return {};});
      if(body.email)ud.email=body.email;
      showNeedSubscription(body.email||'');
      __authLoading=false;
      return true;
    }
    if(!res.ok){
      console.error('Profile load failed:',res.status);
      __authLoading=false;
      return false;
    }

    var json=await res.json();
    var p=json.profile||{};

    // Hydrate app state from profile — all editable fields
    ud.email=p.email||'';
    ud.name=p.name||ud.name||'';
    if(p.goal)ud.goal=p.goal;
    if(Array.isArray(p.goals)&&p.goals.length)ud.goals=p.goals;
    else if(p.goal)ud.goals=[p.goal];
    if(p.sport)ud.sport=p.sport;
    if(p.age!==undefined&&p.age!==null)ud.age=p.age;
    if(p.gender)ud.gender=p.gender;
    if(p.weight!==undefined&&p.weight!==null)ud.weight=p.weight;
    if(p.dweight!==undefined&&p.dweight!==null)ud.dweight=p.dweight;
    if(p.height!==undefined&&p.height!==null)ud.height=p.height;
    if(p.sleep!==undefined&&p.sleep!==null)ud.sleep=p.sleep;
    if(p.job)ud.job=p.job;
    if(p.commute)ud.commute=p.commute;
    if(p.stress!==undefined&&p.stress!==null)ud.stress=p.stress;
    if(p.level)ud.level=p.level;
    if(p.sessions!==undefined&&p.sessions!==null)ud.sessions=p.sessions;
    if(p.dur!==undefined&&p.dur!==null)ud.dur=p.dur;
    if(p.equip)ud.equip=p.equip;
    if(Array.isArray(p.al))ud.al=p.al;
    if(Array.isArray(p.di))ud.di=p.di;
    if(Array.isArray(p.cu))ud.cu=p.cu;
    if(p.cook)ud.cook=p.cook;
    if(p.budget!==undefined&&p.budget!==null)ud.budget=p.budget;
    // Tier defaults to 'free' if backend doesn't return a value. Critical
    // security default: previous fallback was 'premium', which meant a user
    // with a missing/null tier field would see all Premium UI features
    // unlocked while the backend (which fails-closed to free in resolveAuthAndTier)
    // would reject every Premium API call. Result: confused user, support
    // ticket, and worse — a window where Frontend gating was bypassed.
    // Free is the safe default: backend will upgrade to Basic/Premium as
    // soon as the field is read correctly, but we never accidentally
    // grant elevated privileges from a missing field.
    ud.tier=(p.tier==='premium'||p.tier==='basic')?p.tier:'free';
    ud.plan_generations_used=p.plan_generations_used||0;
    updateAuthUI();

    // Load training state from backend (overrides sessionStorage stub)
    await loadTrainingStateFromBackend();

    // Restore meal-tracking state from backend if it's for today.
    // Backend wins over localStorage when both have data for today,
    // so a user switching devices sees their up-to-date checkmarks.
    if(p.meal_track&&p.meal_track.date===todayDateStr()&&p.meal_track.checked){
      // Merge: backend keys win, but local keys for today are preserved
      // in case the user toggled offline.
      var localToday=mealTrack.date===todayDateStr()?mealTrack.checked:{};
      var merged=Object.assign({},localToday,p.meal_track.checked);
      mealTrack={date:todayDateStr(),checked:merged};
      try{localStorage.setItem('peak_meal_track',JSON.stringify(mealTrack));}catch(_){}
    }

    // Merge any saved onboarding data from sessionStorage (full profile)
    try{
      var saved=sessionStorage.getItem('pk_ud');
      if(saved){
        var s=JSON.parse(saved);
        Object.keys(s).forEach(function(k){
          if(s[k]&&!ud[k])ud[k]=s[k];
        });
      }
    }catch(e){}

    // Build plan + show dashboard
    document.getElementById('pb').style.width='100%';
    document.getElementById('sl').textContent=de?'Plan wird geladen...':'Loading plan...';
    card('<div class="lw"><div class="spin"></div><div class="lt">'+(de?'Lade dein Dashboard...':'Loading your dashboard...')+'</div></div>');

    if(ud.sport&&ud.goal){
      try{await fetchPlan();}catch(e){console.error('Plan fetch failed:',e);}
    }
    showDash();
    __authLoading=false;
    return true;
  }catch(err){
    console.error('loadAuthProfile error:',err);
    __authLoading=false;
    return false;
  }
}

// Boot — decides where the user lands based on URL and session state.
async function bootApp(){
  // Update language toggle button label to reflect auto-detected language.
  // If we detected DE, the button should show "EN" (switch TO English).
  try{
    var lbEl=document.getElementById('lb');
    if(lbEl)lbEl.textContent=lang==='en'?'DE':'EN';
  }catch(_){}

  // Show loading indicator immediately — prevents blank screen / login flash
  // on reload while we check for existing session
  var de=lang==='de';
  card('<div class="lw"><div class="spin"></div><div class="lt">'+(de?'Lade...':'Loading...')+'</div></div>');

  // Ensure clean starting state — prevents stale step from previous flow
  step=0;

  // Restore onboarding draft (so interrupted users resume where they were)
  loadSession();

  // Parse voucher code from URL parameter (?code=MICHI50 or ?voucher=MICHI50)
  try{
    var urlParams=new URLSearchParams(window.location.search);
    var urlCode=urlParams.get('code')||urlParams.get('voucher');
    if(urlCode){
      ud.voucherCode=urlCode.trim().toUpperCase();
      saveSession();
    }
  }catch(e){}

  // Stripe success redirect: session_id in URL means checkout just completed
  // → show success screen (step 8), user will get magic link via email
  if(window.location.search.includes('session_id')){
    step=8;render();return;
  }

  // Check for existing Supabase session (magic link, Google, or persisted).
  // If the URL contains an auth hash (from a magic-link redirect), Supabase's
  // JS client parses it asynchronously — getSession() called too early returns
  // null, causing us to bounce the user back to the intro/onboarding even
  // though they're moments away from being signed in. Detect the hash and
  // wait briefly for the session to settle.
  //
  // Same applies on regular page reload: Supabase has to deserialize the
  // persisted session from localStorage, which is fast but not synchronous.
  // We always poll briefly to give it a chance to surface before falling
  // back to the intro screen.
  try{
    var hasAuthHash=window.location.hash&&/access_token=|refresh_token=|type=(magiclink|recovery|invite|signup)/.test(window.location.hash);
    // Look for a Supabase session token in localStorage directly. If one
    // exists, the user is logged in and we should wait for the JS client to
    // pick it up, rather than bouncing them to the intro screen.
    var hasPersistedSession=false;
    try{
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k&&k.indexOf('sb-')===0&&k.indexOf('-auth-token')>0){
          hasPersistedSession=true;break;
        }
      }
    }catch(_){}
    if(hasAuthHash||hasPersistedSession){
      // Poll up to ~3s (auth-hash) / ~1.5s (reload) for the session.
      var maxWait=hasAuthHash?3000:1500;
      var waited=0;
      while(waited<maxWait){
        var s=await window.sb.auth.getSession();
        if(s?.data?.session)break;
        await new Promise(function(r){setTimeout(r,100);});
        waited+=100;
      }
    }
    var sess=await window.sb.auth.getSession();
    if(sess?.data?.session){
      // Signed in — load profile and route appropriately
      var ok=await loadAuthProfile();
      if(ok){
        // Clean auth tokens from URL after magic link redirect
        if(window.location.hash||window.location.search.includes('code=')){
          var existingState=window.history.state||{};
          window.history.replaceState(existingState,document.title,window.location.pathname);
        }
        return;
      }
    }
  }catch(e){console.error('Session check error:',e);}

  // No session — show intro screen as entry point
  step=0;render();
}

// Listen for auth state changes (e.g., after OAuth redirect completes).
// bootApp() already handles the initial session, so we only react to
// fresh SIGNED_IN events that happen AFTER initial page load.
// Skip reload if we're already loaded (prevents tab-switch flicker).
var __bootDone=false;
window.sb.auth.onAuthStateChange(function(event,session){
  if(!__bootDone)return; // skip events fired during bootApp
  if(event==='SIGNED_IN'&&session){
    // If we already have the user's email + plan, this is just a token
    // refresh or tab-focus event — don't trigger a full reload.
    if(ud.email&&plan)return;
    loadAuthProfile();

function profValue(key){

    goal:{g1:['Lose weight','Abnehmen'],g2:['Build muscle','Muskelaufbau'],g3:['Improve performance','Performance steigern'],g4:['Eat cleaner','Gesünder essen'],g5:['Recover better','Besser regenerieren'],g6:['Daily habits','Tägliche Gewohnheiten']},

    commute:{car:['Car','Auto'],bus:['Bus/Train','Bus/Zug'],walk:['Walking','Zu Fuß'],bike:['Cycling','Fahrrad']},
    equip:{gym:['Gym','Fitnessstudio'],hm:['Home','Zuhause'],out:['Outdoors','Draußen']}
  };
  if(ENUMS[key]&&v){
    for(var k in ENUMS[key]){
      if(v===ENUMS[key][k][0]||v===ENUMS[key][k][1]){
        return lang==='de'?ENUMS[key][k][1]:ENUMS[key][k][0];
      }
    }
  }
  if(Array.isArray(v))return v.length?v.join(', '):'—';
  if(v===''||v===null||v===undefined)return '—';
  // Unit suffixes
  if(key==='weight'||key==='dweight')return v+' kg';
  if(key==='height')return v+' cm';
  if(key==='sleep')return v+' h';
  if(key==='dur')return v+' min';

  if(key==='stress')return v+'/10';
  if(key==='budget')return v?'€'+v+(lang==='de'?' / Woche':' / week'):'—';
  return String(v);
}

function toggleProfChip(key, value, el){
  var hidden=document.getElementById('pe_'+key);
  if(!hidden)return;
  var arr=hidden.value?hidden.value.split('||').filter(Boolean):[];
  var idx=arr.indexOf(value);
  if(idx>=0){
    arr.splice(idx,1);
    el.classList.remove('sel');
  }else{
    arr.push(value);
    el.classList.add('sel');
  }
  hidden.value=arr.join('||');
}

async function saveProfile(key){
  var inp=document.getElementById('pe_'+key);
  if(!inp)return;
  var raw=inp.value;
  var newVal;
  if(['age','weight','dweight','height','sleep','sessions','dur','stress','budget'].indexOf(key)>=0){
    newVal=raw===''?null:parseFloat(raw);
    if(newVal!==null&&(isNaN(newVal)||newVal<0)){
      peakToast(lang==='de'?'Bitte gültige Zahl eingeben.':'Please enter a valid number.');
      return;
    }
  }else if(key==='al'||key==='di'||key==='cu'){
    var rawArr=raw?raw.split('||').map(function(s){return s.trim();}).filter(Boolean):[];
    // Dedupe case-insensitively: keep first occurrence (normalized casing from chips)
    var seen={};
    newVal=rawArr.filter(function(v){
      var k=v.toLowerCase();
      if(seen[k])return false;
      seen[k]=true;
      return true;
    });
  }else{
    newVal=raw.trim();
  }

  try{
    var sess=await window.sb.auth.getSession();
    var tok=sess?.data?.session?.access_token;
    if(!tok){peakToast(lang==='de'?'Nicht eingeloggt.':'Not logged in.');return;}
    var body={};
    body[key]=newVal;
    var res=await fetch(BACKEND+'/user/update-profile',{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      var err=await res.json().catch(function(){return {};});
      throw new Error(err.error||'Save failed');
    }
    // Update local state
    ud[key]=newVal;
    // If the primary goal changed, keep goals[0] in sync so AI prompts see
    // the updated primary first.
    if(key==='goal'){
      if(!Array.isArray(ud.goals))ud.goals=[];
      if(ud.goals.length===0)ud.goals.push(newVal);
      else ud.goals[0]=newVal;
      // Persist updated goals array to backend
      try{
        await fetch(BACKEND+'/user/update-profile',{
          method:'POST',
          headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok},
          body:JSON.stringify({goals:ud.goals})
        });
      }catch(_){}
    }
    saveSession();
    if(key==='name')updateAuthUI(); // Initials might change
    profEditing=null;
    peakToast(lang==='de'?'Gespeichert ✓':'Saved ✓',{kind:'success',duration:1800});
    showProfile();
  }catch(e){
    console.error('saveProfile error:',e);
    peakToast(lang==='de'?'Fehler beim Speichern.':'Could not save.');
  }
}

async function logout(){
  try{await window.sb.auth.signOut();}catch(e){}
  // Note: tier MUST be in the initial state — without it, ud.tier remains the
  // previous value briefly and isFree() returns the wrong answer between
  // logout and the next loadAuthProfile (e.g. if User B logs in on the same
  // device, they'd inherit User A's tier for a few hundred ms).
  plan=null;ud={name:'',age:'',gender:'',weight:'',dweight:'',height:'',sleep:'',job:'',commute:'',stress:'5',sport:'',level:'',sessions:'',dur:'',equip:'',al:[],di:[],cu:[],cook:'',budget:'',goal:'',tier:'free'};
  flog=[];mrat={};wrat={};
  trainState={completed:{},feedback:{},currentWeek:1,adjustBias:0};
  // Critical: meal-track lives in BOTH state + localStorage. Without clearing
  // both, the next user on the same device would see the previous user's
  // checkmarks ghosting in until midnight rollover.
  mealTrack={date:null,checked:{}};
  try{sessionStorage.clear();}catch(e){}
  try{localStorage.removeItem('peak_meal_track');}catch(e){}
  step=0;
  updateAuthUI();
  render();
}

async function exportMyData(){

    var token=sess&&sess.data&&sess.data.session&&sess.data.session.access_token;

    var blob=await res.blob();
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='peak-data-export-'+Date.now()+'.json';
    document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},100);
    peakToast(de?'✓ Daten heruntergeladen.':'✓ Data downloaded.');
  }catch(err){
    console.error('Export error:',err);
    peakToast(de?'Fehler beim Export. Bitte später erneut versuchen.':'Export failed. Please try again later.');
  }
}

  var typed=prompt(de

    :'To confirm, type the word: '+confirmWord);
  if(!typed||typed.trim().toUpperCase()!==confirmWord){

  // Execute
  try{

    if(!token){peakToast(de?'Nicht eingeloggt.':'Not signed in.');return;}

      throw new Error(errJson.error||('HTTP '+res.status));
    }
    peakToast(de?'✓ Konto gelöscht. Bis bald.':'✓ Account deleted. Goodbye.');

    setTimeout(function(){logout();},1500);

    console.error('Delete account error:',err);

// ── PULL-TO-REFRESH (Apr 2026) ───────────────────────────────────────
// Touch-driven gesture: drag the page down at the top to reload data.
// We don't reload the entire HTML (would lose React-style state); instead
// we re-fetch profile + training-state from Supabase and re-render the
// current dashboard tab, which gives users the "fresh" feeling without
// a full page reload.
//
// Available to all tiers — pure UX, no AI cost. Disabled inside dialogs
// and when scrolled past the top so it doesn't interfere with normal
// scrolling.
(function setupPullToRefresh(){
  var TRIGGER_DISTANCE=72;       // px the user has to drag before refresh fires
  var MAX_PULL=140;              // visual cap on how far the indicator moves
  var startY=null;
  var pulling=false;
  var indicator=null;

  function ensureIndicator(){
    if(indicator)return indicator;
    indicator=document.createElement('div');
    indicator.id='ptr-indicator';
    indicator.innerHTML='<div class="ptr-ico"></div><span id="ptr-label">'+(lang==='de'?'Ziehen zum Aktualisieren':'Pull to refresh')+'</span>';
    document.body.appendChild(indicator);
    return indicator;
  }
  function updateIndicator(distance, armed){
    var el=ensureIndicator();
    var visible=distance>10;
    el.classList.toggle('visible',visible);
    el.classList.toggle('armed',armed);
    var translate=Math.min(distance,MAX_PULL)-60; // start at -60 (off-screen)
    el.style.transform='translateX(-50%) translateY('+translate+'px)';
    var lbl=el.querySelector('#ptr-label');
    if(lbl){
      lbl.textContent=armed
        ?(lang==='de'?'Loslassen zum Aktualisieren':'Release to refresh')
        :(lang==='de'?'Ziehen zum Aktualisieren':'Pull to refresh');
    }
  }
  function hideIndicator(){
    var el=ensureIndicator();
    el.classList.remove('visible','armed');
    el.style.transform='translateX(-50%) translateY(-60px)';
  }
  function showSpinning(){
    var el=ensureIndicator();
    el.classList.add('visible','spinning');
    el.classList.remove('armed');
    el.style.transform='translateX(-50%) translateY(20px)';
    var lbl=el.querySelector('#ptr-label');
    if(lbl)lbl.textContent=lang==='de'?'Wird aktualisiert…':'Refreshing…';
  }
  function stopSpinning(){
    var el=ensureIndicator();
    el.classList.remove('spinning');
    hideIndicator();
  }

  // Don't trigger if user is interacting with a modal, dialog, or input
  function isInActiveDialog(target){
    if(!target)return false;
    var node=target;
    while(node&&node!==document.body){
      if(node.tagName==='INPUT'||node.tagName==='TEXTAREA'||node.tagName==='SELECT')return true;
      // peakConfirm / peakToast modals
      if(node.classList&&(node.classList.contains('pkconf')||node.classList.contains('pktoast')||node.classList.contains('modal')))return true;
      node=node.parentNode;
    }
    return false;
  }

  document.addEventListener('touchstart',function(ev){
    if(window.scrollY>0)return;
    if(ev.touches.length!==1)return;
    if(isInActiveDialog(ev.target))return;
    startY=ev.touches[0].clientY;
    pulling=false;
  },{passive:true});

  document.addEventListener('touchmove',function(ev){
    if(startY===null)return;
    if(window.scrollY>0){startY=null;hideIndicator();return;}
    var dy=ev.touches[0].clientY-startY;
    if(dy<=0){startY=null;hideIndicator();return;}
    pulling=true;
    var armed=dy>=TRIGGER_DISTANCE;
    updateIndicator(dy,armed);
  },{passive:true});

  document.addEventListener('touchend',function(ev){
    if(!pulling||startY===null){startY=null;return;}
    var lastTouch=ev.changedTouches[0];
    var dy=lastTouch.clientY-startY;
    startY=null;
    pulling=false;
    if(dy>=TRIGGER_DISTANCE){
      doRefresh();
    }else{
      hideIndicator();
    }
  },{passive:true});

  async function doRefresh(){
    showSpinning();
    var minDuration=new Promise(function(r){setTimeout(r,500);}); // ensure spinner is visible
    try{
      // Reload profile from backend (pulls fresh tier, training-state, meal-track)
      if(window.sb&&ud&&ud.email){
        await loadAuthProfile().catch(function(e){console.warn('[ptr] reload profile failed:',e);});
      }
      // Re-render current view
      if(currentView==='dashboard'&&dashTab){
        showTab(dashTab);
      }else if(currentView==='profile'){
        showProfile();
      }
      await minDuration;
      peakToast(lang==='de'?'Aktualisiert ✓':'Refreshed ✓',{kind:'success',duration:1500});
    }catch(e){
      console.error('[ptr] refresh failed:',e);
      peakToast(lang==='de'?'Aktualisierung fehlgeschlagen':'Refresh failed');
    }finally{
      stopSpinning();
    }
  }
})();

// ── HISTORY-BASED NAVIGATION (Apr 2026, for Android TWA Back-Button) ────
// Without explicit history-stack management, the Android system Back-Button
// in a Trusted Web Activity drops users straight out of the app on the very
// first tap — Google Play guidelines require Back to navigate within the
// app first, only exiting from the entry screen.
//
// Strategy:
// 1. Whenever the user moves to a "new" logical screen (onboarding step,
//    dashboard tab, profile, recovery detail), pushHistory(state) records
//    it via history.pushState. The current screen lives at history index N,
//    the previous at N-1, etc.
// 2. The popstate handler reads state.view + state.payload and routes to
//    the matching screen WITHOUT pushing again — this prevents infinite
//    loops on browser back.
// 3. The intro screen is the bottom of the stack: Back from there exits
//    the app (TWA) or goes to the previous browser page (web).
// 4. A guard flag __ignoreNextPop suppresses popstate during programmatic
//    history mutations (e.g. URL cleanup after magic-link login).
var __historyReady=false;
var __ignoreNextPop=false;
var __lastHistoryView=null;

function pushHistory(view, payload){
  // Don't push duplicates of the same view back-to-back; otherwise Back
  // would feel "sticky" (user has to tap twice to actually navigate).
  if(__lastHistoryView===view&&!payload)return;
  __lastHistoryView=view;
  try{
    history.pushState({view:view,payload:payload||null,t:Date.now()},'',window.location.pathname+window.location.search);
  }catch(e){/* private mode / iframe edge cases — silently no-op */}
}

function initHistoryNav(){
  if(__historyReady)return;
  __historyReady=true;
  // Anchor the very first state so the FIRST back press has somewhere to
  // pop to — without this, the browser's Back goes to the previous site
  // (or exits TWA) on the very first tap inside the app.
  try{history.replaceState({view:'__root',payload:null,t:Date.now()},'',window.location.pathname+window.location.search);}catch(_){}

  window.addEventListener('popstate',function(ev){
    if(__ignoreNextPop){__ignoreNextPop=false;return;}
    var st=ev.state;
    // Empty state = user popped past our root → let browser handle it
    // (in TWA this exits the app, which is the desired behaviour).
    if(!st||st.view==='__root'){
      // Re-anchor root so the user can keep using the app if they navigate
      // forward again instead of exiting.
      try{history.replaceState({view:'__root',payload:null,t:Date.now()},'',window.location.pathname+window.location.search);}catch(_){}
      // If they're mid-app and accidentally hit back at the root, send them
      // to a sensible landing screen rather than a blank page.
      if(currentView==='dashboard'||currentView==='profile'){
        // Already at a stable place — keep them there, don't re-render.
        return;
      }
      return;
    }

    // Route to the requested view. We do NOT call pushHistory from inside
    // these branches — popstate already moved the cursor in history.
    try{
      switch(st.view){
        case 'intro':
          step=0; render(); break;
        case 'onboarding':
          if(typeof st.payload==='number'){step=st.payload; render();}
          break;
        case 'login':
          showLogin(); break;
        case 'dashboard':
          showDash(); break;
        case 'tab':
          if(st.payload&&typeof st.payload==='string'){
            currentView='dashboard';
            showTab(st.payload);
          }
          break;
        case 'profile':
          showProfile(); break;
        case 'meal-detail':
          if(typeof st.payload==='number')showMealDetail(st.payload);
          break;
        default:
          // Unknown state — fall back to dashboard if logged in
          if(ud&&ud.email)showDash();
      }
    }catch(e){console.warn('[history] popstate routing failed:',e);}
  });
}

// Wrap the existing navigation entry points so they push history without
// us having to thread pushHistory calls through every onclick. This keeps
// the change small and reversible. The originals are preserved on _orig.
(function patchNavForHistory(){
  var origRender=null;
  var origShowTab=null;
  var origShowProfile=null;
  var origShowDash=null;
  var origShowLogin=null;

  function wrap(){
    if(typeof render==='function'&&!origRender){
      origRender=render;
      window.render=function(){
        var r=origRender.apply(this,arguments);
        if(__historyReady&&currentView==='onboarding'){
          pushHistory('onboarding',step);
        }else if(__historyReady&&currentView==='intro'){
          pushHistory('intro',null);
        }
        return r;
      };
    }
    if(typeof showTab==='function'&&!origShowTab){
      origShowTab=showTab;
      window.showTab=function(tab){
        var r=origShowTab.apply(this,arguments);
        if(__historyReady)pushHistory('tab',tab);
        return r;
      };
    }
    if(typeof showProfile==='function'&&!origShowProfile){
      origShowProfile=showProfile;
      window.showProfile=function(){
        var r=origShowProfile.apply(this,arguments);
        if(__historyReady)pushHistory('profile',null);
        return r;
      };
    }
    if(typeof showDash==='function'&&!origShowDash){
      origShowDash=showDash;
      window.showDash=function(){
        var r=origShowDash.apply(this,arguments);
        if(__historyReady)pushHistory('dashboard',null);
        return r;
      };
    }
    if(typeof showLogin==='function'&&!origShowLogin){
      origShowLogin=showLogin;
      window.showLogin=function(){
        var r=origShowLogin.apply(this,arguments);
        if(__historyReady)pushHistory('login',null);
        return r;
      };
    }
  }
  // Wait until DOM + scripts are ready before wrapping
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(wrap,0);
  }else{
    document.addEventListener('DOMContentLoaded',wrap);
  }
})();
