.intro-s{font-size:14px;line-height:1.5;color:var(--ink2);max-width:340px;margin:14px auto 30px}
.intro-cta{width:100%;max-width:340px;margin:0 auto;display:block;background:var(--red);color:var(--white);border:none;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;padding:15px;cursor:pointer;letter-spacing:3px;text-transform:uppercase}
.intro-meta{font-size:11px;color:var(--faint);margin-top:10px;letter-spacing:.5px}
.intro-login{background:none;border:none;color:var(--dim);font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer;margin-top:18px;padding:6px;text-decoration:underline;text-underline-offset:3px}
/* PEAK Toast — replaces native alerts */
.pk-toast-wrap{position:fixed;top:16px;left:16px;right:16px;z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:8px;align-items:center}
.pk-toast{background:var(--s1);border:1px solid var(--red);border-left:3px solid var(--red);padding:12px 14px;max-width:420px;width:100%;pointer-events:auto;font-family:'Barlow',sans-serif;font-size:13px;color:var(--white);line-height:1.4;box-shadow:0 6px 24px rgba(0,0,0,.5);opacity:0;transform:translateY(-6px);transition:opacity .18s ease,transform .18s ease}
.pk-toast.show{opacity:1;transform:translateY(0)}
.pk-toast-t{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.pk-toast-m{color:var(--ink2);font-size:13px}
.pk-toast.info{border-color:var(--border);border-left-color:var(--red)}
.pk-toast.success{border-color:var(--red);border-left-color:var(--red)}
/* Tier selection (Basic/Premium) */
.tsec-t{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--white);letter-spacing:2px;text-transform:uppercase;text-align:center;margin:14px 0 10px}
.tier-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.tier{border:1.5px solid var(--ibd);background:var(--ibg);padding:14px;cursor:pointer;transition:all .15s;position:relative}
.tier.sel{border-color:var(--red);background:var(--rbg)}
.tier.sel{border-width:2px;padding:13px}
.tier-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.tier-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--white);letter-spacing:1.5px;text-transform:uppercase}
.tier-prices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0 10px}
.tprice{border:1px solid var(--border);background:var(--s2);padding:8px;cursor:pointer;text-align:center;transition:all .1s;position:relative}
.tprice.sel{border-color:var(--red)}
.tprice.sel{background:var(--rbg)}
.tpl{font-size:9px;color:var(--dim);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.tpa{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--white);margin-top:2px}
.tpa span{font-size:10px;font-family:'Barlow',sans-serif;font-weight:500;color:var(--dim)}
.tper{font-size:9px;color:var(--red);font-weight:700;margin-top:2px;letter-spacing:.5px}
.tfl{list-style:none;margin-top:8px}
.tfl li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2);padding:2px 0}
.tfl li::before{content:'→';color:var(--red);font-weight:900;font-size:11px;flex-shrink:0}
.tier-bdg{position:absolute;top:-8px;right:10px;background:var(--red);color:var(--white);font-size:8px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px}
.tplus{font-size:10px;color:var(--red);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
/* Upgrade-Overlay für Basic-User */
.upg-box{background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--red);padding:20px;margin:12px;text-align:center}
.upg-lock{font-size:28px;margin-bottom:8px}
.upg-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.upg-t{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--white);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.upg-d{font-size:12px;color:var(--ink2);line-height:1.5;margin-bottom:14px}
.upg-btn{background:var(--red);color:var(--white);border:none;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;padding:11px 22px;cursor:pointer;letter-spacing:2px;text-transform:uppercase}
/* DASHBOARD */
.dhead{background:var(--s1);border-bottom:2px solid var(--red);padding:18px 20px 14px}
.dgreet{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:1px;text-transform:uppercase}
.dsub{font-size:11px;color:var(--dim);margin-top:2px}
/* Tier status row — lives inside .dhead, shares its background, no borders */
.tier-bar{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:10px;border-top:1px dashed var(--border);font-family:Barlow,sans-serif}
.tier-label{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:2px;color:var(--red);padding:2px 8px;border:1px solid var(--red);text-transform:uppercase;flex-shrink:0}
.tier-usage{flex:1;font-size:11px;color:var(--dim);letter-spacing:.3px;min-width:0}
.tier-cta{background:var(--red);color:var(--white);border:none;padding:5px 11px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background .15s;flex-shrink:0}
.dnav{display:flex;gap:2px;padding:7px 14px;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto}
.dnav::-webkit-scrollbar{display:none}
.ntab{padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--faint);border:none;background:none;font-family:'Barlow',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:color .15s}
.ntab.act{color:var(--white);border-bottom:2px solid var(--red)}
.dbody{padding:16px 18px}
.dst{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--faint);margin-bottom:7px;margin-top:14px}
.dst:first-child{margin-top:0}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:var(--s2);border:1px solid var(--border);padding:9px 11px}
.stl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);margin-bottom:2px}
.stv{font-size:14px;font-weight:700;color:var(--white)}
.mc{background:var(--s2);border:1px solid var(--b2);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .15s}
.me{font-size:20px}.mi{flex:1}.mn{font-size:12px;font-weight:700;color:var(--white)}.mm{font-size:10px;color:var(--dim);margin-top:1px}
.mk{font-size:11px;font-weight:700;color:var(--red)}
.rrow{display:flex;gap:3px;margin-top:4px}
.star{font-size:14px;cursor:pointer;opacity:.2;transition:opacity .12s}.star.on{opacity:1}
.wc{background:var(--rbg);border:1px solid var(--rbd);border-left:3px solid var(--red);padding:12px 14px;margin-bottom:6px}
.wc-rest{background:var(--ibg);border:1px solid var(--ibd);padding:12px 14px;margin-bottom:6px}
.wc-rest .wt{color:var(--ink2)}
.wt{font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.wd{font-size:13px;color:var(--ink2);line-height:1.55}
.rc{background:var(--s2);border:1px solid var(--b2);padding:11px 13px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.rt{font-size:12px;font-weight:700;color:var(--white);margin-bottom:2px;display:flex;justify-content:space-between}
.rd{font-size:11px;color:var(--faint);line-height:1.5}
.mbw{margin-bottom:8px}.mbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;color:var(--ink2)}
.mb{height:3px;background:var(--s3)}.mf{height:3px;transition:width .5s}
.sbox{background:var(--s2);border:1px solid var(--b2);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;margin-bottom:11px;cursor:pointer;overflow:hidden}
.sfr{border:2px solid var(--red);width:54%;height:54%;position:relative}
.sln{position:absolute;left:0;right:0;height:1.5px;background:var(--red);animation:scan 2s ease-in-out infinite}
@keyframes scan{0%,100%{top:0}50%{top:100%}}
.stxt{color:rgba(255,255,255,.35);font-size:10px;margin-top:9px;text-align:center;letter-spacing:1.5px;font-weight:700}
.sres{background:var(--rbg);border:1px solid var(--rbd);border-left:3px solid var(--red);padding:12px 14px;margin-bottom:11px}
.srn{font-size:13px;font-weight:700;color:var(--white);margin-bottom:2px}
.srm{font-size:11px;color:var(--dim)}
.fbdg{display:inline-flex;align-items:center;padding:2px 8px;font-size:10px;font-weight:700;margin-top:4px}
.fgood{background:rgba(0,200,100,.08);color:#00C864;border:1px solid rgba(0,200,100,.15)}.fbad{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.fwarn{background:rgba(255,170,0,.1);color:#E89A00;border:1px solid rgba(255,170,0,.25)}
.scan-overlay{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center}
.scan-overlay video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.scan-ui{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom)}
.scan-close{position:absolute;top:calc(env(safe-area-inset-top) + 14px);right:14px;width:40px;height:40px;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:20px;cursor:pointer;pointer-events:auto;border-radius:50%;display:flex;align-items:center;justify-content:center}
.scan-frame{width:min(78vw,320px);aspect-ratio:4/3;border:2px solid var(--red);position:relative;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
.scan-frame-line{position:absolute;left:0;right:0;height:2px;background:var(--red);animation:scan 2s ease-in-out infinite;box-shadow:0 0 8px var(--red)}
.scan-hint{color:#fff;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:22px;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.scan-err{margin-top:14px;max-width:80vw;padding:10px 14px;background:rgba(232,0,26,.9);color:#fff;font-size:12px;font-weight:700;pointer-events:auto;text-align:center;line-height:1.4}
.scan-manual{margin-top:16px;padding:10px 18px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;pointer-events:auto;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.le{background:var(--s2);border:1px solid var(--b2);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.lei{font-size:18px}.leinf{flex:1}.let{font-size:12px;font-weight:600;color:var(--white)}.leti{font-size:10px;color:var(--faint)}
.lek{font-size:11px;font-weight:700;color:var(--red)}
.lact{display:flex;gap:4px;margin-left:4px}
.lab{background:transparent;border:1px solid var(--border);color:var(--dim);font-size:11px;padding:4px 7px;cursor:pointer;font-weight:700;letter-spacing:.5px;font-family:inherit}
.ledit{background:var(--cbg);border:1px solid var(--red);padding:10px 12px;margin-bottom:5px;display:flex;flex-direction:column;gap:6px}
.ledit input{background:var(--s3);border:1px solid var(--border);color:var(--white);padding:6px 8px;font-family:inherit;font-size:12px;width:100%}
.ledit-row{display:flex;gap:6px}
.ledit-row input{flex:1}
.ledit-btns{display:flex;gap:6px;margin-top:2px}
.ledit-btns button{flex:1;padding:6px;font-family:inherit;font-weight:700;font-size:10px;letter-spacing:1px;cursor:pointer;border:none;text-transform:uppercase}
.ledit-btns .lsave{background:var(--red);color:var(--white)}
.ledit-btns .lcancel{background:var(--s3);color:var(--dim);border:1px solid var(--border)}
.blog{width:100%;background:none;border:1.5px solid var(--b2);color:var(--faint);font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:9px;cursor:pointer;margin-top:5px;letter-spacing:1px;text-transform:uppercase}
.ex-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ex-num{width:19px;height:19px;background:var(--red);color:var(--white);font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ex-name{font-size:13px;font-weight:700;color:var(--white)}.ex-detail{font-size:11px;color:var(--faint);margin-top:1px}
.ex-tip{font-size:11px;color:var(--ink2);margin-top:3px;font-style:italic;line-height:1.4}
.ex-info-btn{flex-shrink:0;width:22px;height:22px;border:1px solid var(--border);background:transparent;color:var(--dim);border-radius:50%;font-size:12px;font-weight:700;cursor:pointer;padding:0;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.ex-info-btn:hover,.ex-info-btn:focus{color:var(--red);border-color:var(--red);outline:none}
.ex-explain-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease-out}
.ex-explain-box{background:var(--bg);border:1px solid var(--red);max-width:420px;width:100%;max-height:80vh;overflow-y:auto;padding:20px}
.ex-explain-h{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:1px;color:var(--white);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ex-explain-close{background:transparent;border:none;color:var(--dim);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
.ex-explain-close:hover{color:var(--red)}
.ex-explain-body{font-size:13px;line-height:1.6;color:var(--ink2)}
.ex-explain-loading{display:flex;align-items:center;gap:10px;padding:14px 0;color:var(--faint);font-size:12px}
/* Weekly plan grid */
.wk-meta{font-size:11px;color:var(--faint);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;font-weight:700}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.wk-day{background:var(--s2);border:1px solid var(--border);border-top:3px solid var(--red);padding:8px 6px;cursor:pointer;transition:all .15s;min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.wk-day.rest{border-top-color:var(--border);opacity:.7;cursor:pointer}
.wk-day.rest:hover{opacity:.9}
.wk-day-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;color:var(--red);letter-spacing:1.5px;margin-bottom:4px}
.wk-day.rest .wk-day-lbl{color:var(--faint)}
.wk-day-type{font-size:8px;font-weight:700;color:var(--white);letter-spacing:1px;text-align:center;line-height:1.2;margin-bottom:3px}
.wk-day.rest .wk-day-type{color:var(--faint)}
.wk-day-title{font-size:9px;color:var(--ink2);text-align:center;line-height:1.2;font-weight:600;margin-bottom:2px}
.wk-day-dur{font-size:9px;color:var(--faint);margin-top:auto}
.wk-detail{background:var(--s2);border:1px solid var(--rbd);border-left:3px solid var(--red);padding:12px 14px;margin-top:8px}
.wk-detail-t{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--red);letter-spacing:1.5px;margin-bottom:6px}
.wk-detail-f{font-size:9px;color:var(--red);font-weight:700;letter-spacing:1px;margin-bottom:5px}
.wk-detail-d{font-size:12px;color:var(--ink2);line-height:1.5;margin-bottom:10px}
/* Completion + feedback */
.wk-complete{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.wk-complete-btn{width:100%;background:var(--red);color:var(--white);border:none;padding:12px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer}
.wk-done{text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--red);letter-spacing:2px;padding:8px;margin-bottom:8px}
.wk-burned{background:var(--s2);border-left:3px solid var(--red);padding:12px 14px;margin:0 0 12px;text-align:center}
.wk-burned-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.wk-burned-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:1px;color:var(--red);margin-bottom:3px}
.wk-burned-range{font-size:11px;color:var(--ink2);margin-bottom:6px}
.wk-burned-note{font-size:10px;color:var(--faint);line-height:1.4}
.wk-fb-lbl{font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px;text-align:center}
.wk-fb-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.wk-fb{background:var(--s3);color:var(--ink2);border:1px solid var(--border);padding:8px 4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.5px;cursor:pointer;transition:all .12s}
.wk-fb.sel{border-color:var(--red);background:var(--rbg);color:var(--red)}
/* Completed day visual in grid */
.wk-day.done{border-top-color:#4ade80;background:rgba(74,222,128,0.05)}
.wk-day.done .wk-day-lbl{color:#4ade80}
.wk-day-fb{font-size:9px;margin-top:2px}
/* Advance week button */
.wk-advance{width:100%;margin-top:12px;background:var(--red);color:var(--white);border:none;padding:14px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:3px;text-transform:uppercase;cursor:pointer}
.wk-done-all{margin-top:12px;padding:16px;text-align:center;background:var(--rbg);border:1px solid var(--red);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:2px}
@media(max-width:768px){
  .wk-grid{grid-template-columns:repeat(7,1fr);gap:3px}
  .wk-day{padding:6px 3px;min-height:70px}
  .wk-day-lbl{font-size:10px;letter-spacing:1px}
  .wk-day-type{font-size:7px}
  .wk-day-title{font-size:8px}
  .wk-day-dur{font-size:8px}
  .wk-fb{font-size:9px;padding:7px 2px}
}
/* Recovery detail */
.rdb{padding:16px 18px}
.rdb-back{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--dim);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.rdb h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:2px;text-transform:uppercase;color:var(--white);margin-bottom:8px}
.rdb p{font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:10px}
.rdb h3{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:7px;margin-top:16px}
.benefit{background:var(--s2);border:1px solid var(--b2);border-left:3px solid var(--red);padding:9px 13px;margin-bottom:5px}
.benefit-t{font-size:12px;font-weight:700;color:var(--white);margin-bottom:2px}
.benefit-d{font-size:11px;color:var(--faint);line-height:1.5}
.proto{background:var(--rbg);border:1px solid var(--rbd);padding:13px;margin-top:8px}
.proto-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--rbd);font-size:12px}
.proto-row:last-child{border-bottom:none}
.proto-l{color:var(--dim)}.proto-v{color:var(--white);font-weight:700}
@media(max-width:768px){
  .topbar{padding:0 13px;height:calc(54px + env(safe-area-inset-top))}.main{padding:28px 11px 18px}
  .ch{padding:20px 18px 0}.cb{padding:14px 18px}.cf{padding:4px 18px 20px;flex-direction:column}
  .bbk,.bnx{width:100%}
  .bbk.inline-btn,.bnx.inline-btn{width:auto}
  .irow,.tiles.c3,.tiles.c4{grid-template-columns:1fr 1fr}
  .sg{grid-template-columns:1fr 1fr}.pg{grid-template-columns:1fr 1fr}
  .dbody,.rdb{padding:13px}
}
/* ── Hover states — only on devices with real hover (desktop with mouse).

<script>
// ── STATE ─────────────────────────────────────────────────────────────
const BACKEND='https://peak-backend-u52q.onrender.com';

// AI Helper — routes all Anthropic calls through backend proxy
async function aiGen(prompt, maxTokens, purpose){
  var headers={'Content-Type':'application/json'};
  try{
    if(window.sb){
      var sess=await window.sb.auth.getSession();
      var tok=sess?.data?.session?.access_token;
      if(tok)headers.Authorization='Bearer '+tok;
    }
  }catch(_){}
  var r=await fetch(BACKEND+'/ai/generate',{
    method:'POST',headers:headers,
    body:JSON.stringify({prompt:prompt,max_tokens:maxTokens||800,purpose:purpose||null})
  });
  if(!r.ok){
    var err=await r.json().catch(function(){return {error:'AI request failed'};});
    // Propagate free-tier limit with a specific flag so callers can show upgrade UI
    if(err.code==='FREE_LIMIT_REACHED'){
      var e=new Error(err.error||'Free limit reached');
      e.freeLimitReached=true;
      e.used=err.used;
      e.max=err.max;
      throw e;
    }
    // Propagate premium-required server-side rejection so callers can show
    // the upgrade modal instead of a generic error toast (Apr 2026 hardening).
    if(err.code==='PREMIUM_REQUIRED'){
      var e2=new Error(err.error||'Premium required');
      e2.premiumRequired=true;
      throw e2;
    }
    throw new Error(err.error||'AI request failed');
  }
  var data=await r.json();
  return data.text||'';
}
async function aiGenJSON(prompt, maxTokens, purpose){
  var text=await aiGen(prompt, maxTokens, purpose);
  // Strip Markdown code fences (the AI sometimes wraps even when told not to)
  var clean=text.replace(/```json|```/g,'').trim();
  // If the AI prepended a sentence ("Here's your JSON:"), grab the first {…}
  // block. Last-resort recovery — preferred output is a clean JSON string,
  // but this is a frequent failure mode for older models / truncation.
  if(clean&&clean[0]!=='{'&&clean[0]!=='['){
    var firstBrace=clean.indexOf('{');
    var firstBracket=clean.indexOf('[');
    var start=-1;
    if(firstBrace>=0&&firstBracket>=0)start=Math.min(firstBrace,firstBracket);
    else if(firstBrace>=0)start=firstBrace;
    else if(firstBracket>=0)start=firstBracket;
    if(start>0)clean=clean.slice(start);
  }
  try{
    return JSON.parse(clean);
  }catch(e){
    // Log a snippet of the raw response so we can debug bad outputs in
    // production without surfacing raw AI text to the user.
    console.error('[aiGenJSON] parse failed for purpose='+purpose+', length='+(text||'').length+', snippet:',(text||'').slice(0,300));
    var err=new Error('AI returned invalid JSON');
    err.aiRaw=text;
    err.aiPurpose=purpose;
    throw err;
  }
}

// Build goal string for AI prompts — includes primary + secondary goals
// if user selected multiple. Format: "Primary: X | Secondary: Y, Z"
function goalStr(){
  var primary=ud.goal||'';
  if(!primary)return '';
  if(!Array.isArray(ud.goals)||ud.goals.length<=1)return primary;
  var secondary=ud.goals.slice(1).filter(function(g){return g&&g!==primary;});
  if(secondary.length===0)return primary;
  return 'Primary: '+primary+' | Also optimise for: '+secondary.join(', ');
}

// ── FREE TIER FEATURE GATES ────────────────────────────────────────────
// isFree(): true if current user is on free tier
// gateFree(featureKey): shows upgrade prompt + returns true if should block

// Fail-safe: anything other than an explicit paid tier is treated as free.
// Prevents privilege escalation if ud.tier is ever undefined/null/garbage
// (e.g. mid-render, before loadAuthProfile finishes, or after data corruption).
function isFree(){ return ud.tier!=='basic'&&ud.tier!=='premium'; }

function gateFree(featureKey){

function goUpgrade(){
  // Logged-in Free users already have a confirmed email + onboarding data.

  if(ud.tier==='free'&&ud.email){

var __upgradingExistingFree=false;

// ── HTML escaping helper — central XSS guard (Apr 2026 hardening) ──
// Use whenever inserting external/user data into innerHTML strings.
// Example: el.innerHTML = '<div>'+esc(p.name)+'</div>';
// Sources that REQUIRE escaping:
//   • Data from external APIs (OpenFoodFacts, Anthropic, etc.)
//   • User-typed input (prompts, manual food names, profile fields)
//   • Anything echoed back from server that originated from a user
// Pure app-controlled strings (i18n labels, hardcoded class names) are safe.
function esc(s){
  if(s==null)return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// PEAK-style inline toast — replaces native alert()
function peakToast(msg, opts){
  opts=opts||{};
  var kind=opts.kind||'info'; // info | success
  var title=opts.title||(lang==='de'?'Hinweis':'Heads up');
  var wrap=document.getElementById('pk-toast-wrap');
  if(!wrap){wrap=document.createElement('div');wrap.id='pk-toast-wrap';wrap.className='pk-toast-wrap';document.body.appendChild(wrap);}
  var el=document.createElement('div');
  el.className='pk-toast '+kind;
  el.innerHTML='<div class="pk-toast-t">'+esc(title)+'</div><div class="pk-toast-m">'+esc(msg)+'</div>';
  wrap.appendChild(el);
  requestAnimationFrame(function(){el.classList.add('show');});
  setTimeout(function(){
    el.classList.remove('show');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},220);
  }, opts.duration||3200);
}
// PEAK-style confirm (returns Promise<boolean>)
function peakConfirm(msg, opts){

// ═══════════════════════════════════════════════════════════════════════
// HEALTH DISCLAIMER MODAL
// ═══════════════════════════════════════════════════════════════════════
// Gatekeeper before onboarding. Collects 3 explicit consents:
//   1. GDPR Art. 9 — health data processing
//   2. Medical disclaimer — no doctor substitute
//   3. Terms & privacy policy acceptance
// Without all 3, onboarding cannot start. Decisions persist in ud object
// and sync to backend on signup via consent_health_data + consent_terms.
// ═══════════════════════════════════════════════════════════════════════
function showHealthDisclaimer(){
  var de=lang==='de';
  // If already accepted in this session, skip straight to onboarding
  if(ud.consent_health_data&&ud.consent_medical&&ud.consent_terms){
    step=1;render();return;
  }

    :'I consent to PEAK processing my health data (incl. weight, height, goals, sleep, sport, injuries) according to GDPR Art. 9(2)(a). This data is used solely to create and adapt my training, nutrition and recovery plan.';

  var c2Title=de?'Kein Ersatz für medizinischen Rat':'Not a substitute for medical advice';
  var c2Body=de
    ?'Mir ist bewusst, dass PEAK eine Trainings- und Lifestyle-App ist und keinen ärztlichen Rat, keine Diagnose oder medizinische Behandlung ersetzt. Bei Vorerkrankungen, Beschwerden, Verletzungen, Schwangerschaft oder Unsicherheiten konsultiere ich vor Trainingsbeginn einen Arzt oder qualifizierten Therapeuten.'
    :'I understand that PEAK is a training & lifestyle app and does not replace medical advice, diagnosis or treatment. In case of pre-existing conditions, symptoms, injuries, pregnancy or uncertainty, I will consult a doctor or qualified therapist before starting.';

  var c3Title=de?'AGB & Datenschutz':'Terms & privacy';

    ?'Ich akzeptiere die <a href="https://peak-mj-performance.app/datenschutz" target="_blank" style="color:var(--red);font-weight:700;text-decoration:underline">Datenschutzerklärung</a> und die Nutzungsbedingungen von PEAK.'
    :'I accept the <a href="https://peak-mj-performance.app/datenschutz" target="_blank" style="color:var(--red);font-weight:700;text-decoration:underline">privacy policy</a> and terms of service of PEAK.';

  var okBtn=de?'AKZEPTIEREN & WEITER →':'ACCEPT & CONTINUE →';
  var caBtn=de?'Abbrechen':'Cancel';
  var needAll=de?'Alle drei Punkte müssen bestätigt werden, um fortzufahren.':'All three points must be confirmed to continue.';

  function chk(id,ti,bo){
    return '<label for="'+id+'" style="display:flex;gap:12px;padding:14px;margin-bottom:10px;background:var(--s0);border:1px solid var(--border);border-left:3px solid var(--border);cursor:pointer;transition:border-color .15s">'+
      '<input type="checkbox" id="'+id+'" style="margin-top:3px;flex-shrink:0;width:18px;height:18px;accent-color:var(--red);cursor:pointer">'+
      '<div>'+
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--white);margin-bottom:5px">'+ti+'</div>'+

var ud={name:'',age:'',gender:'',weight:'',dweight:'',height:'',sleep:'',job:'',commute:'',stress:'5',sport:'',level:'',sessions:'',dur:'',equip:'',al:[],di:[],cu:[],cook:'',budget:'',goal:''};

// checks don't leak into today's totals when meals refresh).
//
// Persistence is hybrid: written to localStorage immediately for instant
// UI feedback + offline support, then synced to Supabase in the background
// so it follows the user across devices.
var mealTrack={date:null,checked:{}};

function todayDateStr(){
  var d=new Date();
  // Use local YYYY-MM-DD so reset happens at the user's midnight, not UTC
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Index into week.days for today's session. The training week starts Monday
// (index 0). JS Date.getDay() returns Sunday=0..Saturday=6, so we remap to
// Mo=0, Tu=1, ... Su=6 to match the week-template ordering used everywhere
// else in the app (see renderWeekPlan, openWkDay).
function todayWeekdayIndex(){
  var d=(new Date()).getDay();
  return (d+6)%7;
}

function loadMealTrack(){
  try{
    var raw=localStorage.getItem('peak_meal_track');
    if(raw){
      var parsed=JSON.parse(raw);
      // Roll over if it's stale from a previous day
      if(parsed&&parsed.date===todayDateStr()){
        mealTrack=parsed;
      }else{
        mealTrack={date:todayDateStr(),checked:{}};
        saveMealTrack();
      }
    }else{
      mealTrack={date:todayDateStr(),checked:{}};
    }
  }catch(_){
    mealTrack={date:todayDateStr(),checked:{}};
  }
}

function saveMealTrack(){
  // Always write the current date so next load triggers correct rollover
  if(!mealTrack.date)mealTrack.date=todayDateStr();
  try{localStorage.setItem('peak_meal_track',JSON.stringify(mealTrack));}catch(_){}
  // Best-effort backend sync (don't await — UI shouldn't wait for network).
  // If user is on Free tier or not logged in, skip — this is a Basic+ feature.
  if(isFree())return;
  if(!ud||!ud.email)return;
  syncMealTrackToBackend();
}

// Debounced backend sync to avoid hammering the server on rapid taps
var __mealSyncTimer=null;
function syncMealTrackToBackend(){
  if(__mealSyncTimer)clearTimeout(__mealSyncTimer);
  __mealSyncTimer=setTimeout(async function(){
    try{
      if(!window.sb)return;
      var sess=await window.sb.auth.getSession();
      var tok=sess?.data?.session?.access_token;
      if(!tok)return;
      await fetch(BACKEND+'/user/meal-track',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
        body:JSON.stringify({date:mealTrack.date,checked:mealTrack.checked})
      });
    }catch(e){
      // Fail silently — localStorage is the source of truth on the device
      console.warn('[meal-track] backend sync failed:',e&&e.message);
    }
  },800);
}

// Toggle a single meal's checked state. Called from the meal card click.
function toggleMealCheck(idx,ev){
  if(ev)ev.stopPropagation();
  // Gate: Basic + Premium only (Free gets the upsell)
  if(isFree()){
    showUpgradePrompt('meal_tracking');
    return;
  }
  // Roll over if user crossed midnight while the tab was open
  if(mealTrack.date!==todayDateStr()){
    mealTrack={date:todayDateStr(),checked:{}};
  }
  var key=String(idx);
  if(mealTrack.checked[key]){
    delete mealTrack.checked[key];
  }else{
    mealTrack.checked[key]=true;
    // Once a meal is checked off, the "re-roll this meal" hint becomes
    // confusing — re-rolling would replace the meal we just logged. Drop
    // the lastMoodPick anchor if it points at this slot.
    if(window.__lastMoodPick&&window.__lastMoodPick.mealIdx===idx){
      window.__lastMoodPick=null;
    }
  }
  saveMealTrack();
  // Re-render Nutrition tab so totals update
  if(currentView==='dashboard'&&dashTab==='nutrition'){
    var p=fp();tNu(p);
  }
}

// ── MEAL-MACRO HELPERS ────────────────────────────────────────────────
// Per-meal macros may come from two sources:
//   1. New schema: m.protein, m.carbs, m.fat as numeric grams (set by AI)
//   2. Legacy schema: only m.macro = "28g protein" string
// These helpers handle both so cached plans don't crash after a frontend update.
function mealMacro(m,key){
  // key: 'protein' | 'carbs' | 'fat'. Returns numeric grams or 0.
  if(!m)return 0;
  // Prefer explicit numeric field (new schema)
  if(typeof m[key]==='number')return m[key];
  if(typeof m[key]==='string'){
    var n=parseFloat(m[key]);
    if(isFinite(n))return n;
  }
  // Legacy fallback: only protein is parseable from m.macro string
  if(key==='protein'){
    var match=String(m.macro||'').match(/(\d+(?:\.\d+)?)\s*g/);
    if(match)return parseFloat(match[1]);
  }
  return 0;
}

// Sum of kcal from checked planned-meals (used in Nutrition stats).
function trackedMealKcal(meals){
  if(!Array.isArray(meals))return 0;
  if(mealTrack.date!==todayDateStr())return 0;
  return meals.reduce(function(a,m,i){
    return a+(mealTrack.checked[String(i)]?(m.kcal||0):0);
  },0);
}
function trackedMealProtein(meals){
  if(!Array.isArray(meals))return 0;
  if(mealTrack.date!==todayDateStr())return 0;
  return meals.reduce(function(a,m,i){
    if(!mealTrack.checked[String(i)])return a;
    return a+mealMacro(m,'protein');
  },0);
}
function trackedMealCarbs(meals){
  if(!Array.isArray(meals))return 0;
  if(mealTrack.date!==todayDateStr())return 0;
  return meals.reduce(function(a,m,i){
    if(!mealTrack.checked[String(i)])return a;
    return a+mealMacro(m,'carbs');
  },0);
}
function trackedMealFat(meals){
  if(!Array.isArray(meals))return 0;
  if(mealTrack.date!==todayDateStr())return 0;
  return meals.reduce(function(a,m,i){
    if(!mealTrack.checked[String(i)])return a;
    return a+mealMacro(m,'fat');
  },0);
}

// ── WORKOUT KCAL ESTIMATE (MET-based) ─────────────────────────────────
// Rough estimate of energy expenditure for a completed session. Formula:
//   kcal ≈ MET × bodyweight_kg × duration_hours
// MET values are population averages from the Compendium of Physical
// Activities (Ainsworth et al.). These are CONSERVATIVE midpoints — actual
// burn varies ±25% by intensity, age, fitness level, terrain, gear, etc.
// We surface the estimate with a clear disclaimer so users don't treat it
// as a measurement. For accurate numbers, they need a heart-rate monitor.
//
// Levels modulate the base MET: Beginner -15%, Advanced +15%. This is a
// simplification — a beginner runner usually goes slower (lower MET)
// than an advanced one — but avoids over-claiming for novices.
var SPORT_MET={
  Running:9.8,           // ~10 km/h pace
  Weights:5.0,           // moderate-vigorous resistance training
  Football:8.0,          // soccer, casual play
  Cycling:7.5,           // ~20-22 km/h leisure pace
  Swimming:8.0,          // freestyle, moderate effort
  Yoga:3.0,              // hatha-style
  'Martial Arts':10.0,   // moderate-vigorous sparring
  Basketball:6.5,        // game play, half-court
  Tennis:7.3,            // singles
  Volleyball:4.0,        // recreational
  Skiing:7.0,            // downhill, moderate
  Golf:4.8,              // walking with clubs
  Gymnastics:5.5,        // moderate
  Rowing:7.0,            // moderate vigorous
  Equestrian:5.5,        // general riding
  Other:6.0,             // generic moderate exercise
};
function estimateBurnedKcal(sport,level,durationMin,weightKg){
  var baseMet=SPORT_MET[sport];
  if(typeof baseMet!=='number')baseMet=SPORT_MET.Other;
  // Level adjustment — match against both EN and DE labels (level is a
  // translated string). T.en.beg etc. would be cleaner but the level field
  // currently stores the rendered label, not a key.
  var lvlAdj=1.0;
  var lvlStr=String(level||'').toLowerCase();
  if(/(beginner|anfänger)/.test(lvlStr))lvlAdj=0.85;
  else if(/(advanced|fortgeschritten)/.test(lvlStr))lvlAdj=1.15;
  var kg=parseFloat(weightKg);
  var min=parseFloat(durationMin);
  if(!isFinite(kg)||kg<=0||!isFinite(min)||min<=0)return null;
  var kcal=baseMet*lvlAdj*kg*(min/60);
  return Math.round(kcal);
}

// Update the <meta name="theme-color"> to match the in-app theme so the
// browser chrome / iOS status bar matches the app's top bar color.
// Media-query-bound theme-colors only react to system scheme, not our toggle.
function updateThemeColorMeta(theme){
  var color=theme==='light'?'#FFFFFF':'#0E0E0E';
  var existing=document.querySelector('meta[name="theme-color"]:not([media])');
  if(existing){existing.setAttribute('content',color);return;}
  var m=document.createElement('meta');
  m.setAttribute('name','theme-color');
  m.setAttribute('content',color);
  document.head.appendChild(m);
}
function rerenderCurrent(){
  // Use explicit view tracking — DOM-sniffing was unreliable
  if(currentView==='profile'&&ud.email){showProfile();return;}
  if(currentView==='dashboard'){showTab(dashTab);return;}
  if(currentView==='login'){showLogin();return;}
  if(currentView==='intro'||currentView==='onboarding'){
    if(step>=0&&step<=8){
      ({0:s0,1:s1,2:s2,3:s3,4:s4,5:s5,6:s6,7:s7,8:s8})[step]();
    }
    return;
  }
  // Fallback
  if(step>=0&&step<=8){
    ({0:s0,1:s1,2:s2,3:s3,4:s4,5:s5,6:s6,7:s7,8:s8})[step]();
  }
}

function setP(s,tot){
  var pbEl=document.getElementById('pb');
  var slEl=document.getElementById('sl');
  var pbw=document.querySelector('.pbw');
  // Always show progress bar & step label during render() — showDash() hides them
  if(pbw)pbw.style.visibility='';
  if(slEl)slEl.style.visibility='';
  if(s===0){pbEl.style.width='0%';slEl.textContent=lang==='de'?'Willkommen':'Welcome';return;}
  // Free signup steps (70=form, 71=inbox-check) map to end of onboarding
  if(s>=70){
    pbEl.style.width=s===70?'90%':'100%';
    slEl.textContent=lang==='de'?(s===70?'Fast fertig':'Check deine E-Mails'):(s===70?'Almost done':'Check your inbox');
    return;
  }
  pbEl.style.width=((s-1)/(tot-1)*100)+'%';
  slEl.textContent=s<=tot?(lang==='de'?'Schritt '+s+' von '+tot:'Step '+s+' of '+tot):(lang==='de'?'Fast geschafft!':'Almost there!');
}
// Track last rendered step so we can decide whether to scroll-to-top.
// Re-rendering the SAME step (e.g. user toggling plan radio buttons) should
// keep the scroll position; navigating to a NEW step resets it. This was a
// reported friction point: clicking "Annual" vs "Monthly" on the plan
// selector jumped the user back to the page top.
var __lastRenderedStep=null;
function render(){
  // Safety: if step is out of range, reset to intro (prevents blank screen)
  var handlers={0:s0,1:s1,2:s2,3:s3,4:s4,5:s5,6:s6,7:s7,8:s8,70:s7f,71:s7fi};
  if(!handlers[step]){step=0;}
  currentView=step===0?'intro':'onboarding';
  setP(step,TOTAL);
  var c=document.getElementById('mc');
  c.style.animation='none';c.offsetHeight;c.style.animation='up .32s ease';
  handlers[step]();
  // Only reset scroll on actual step transitions, not on same-step re-renders.
  if(__lastRenderedStep!==step){
    try{window.scrollTo({top:0,behavior:'instant'});}catch(e){window.scrollTo(0,0);}
    __lastRenderedStep=step;
  }
}
function card(h){document.getElementById('mc').innerHTML=h;}
function foot(lbl,fn,bk){bk=bk===undefined;return '<div class="cf">'+((!bk)&&step>1?'<button class="bbk" onclick="step--;render()">← Back</button>':'')+'<button class="bnx" onclick="('+fn.toString()+')()">'+lbl+' →</button></div>';}

// Sport name translation. Internal key stays English, DE label is display-only.
var SPORT_DE={
  'Running':'Laufen','Weights':'Krafttraining','Football':'Fußball',
  'Cycling':'Radsport','Swimming':'Schwimmen','Yoga':'Yoga',
  'Martial Arts':'Kampfsport','Basketball':'Basketball','Tennis':'Tennis',
  'Volleyball':'Volleyball','Skiing':'Skifahren','Golf':'Golf',
  'Gymnastics':'Turnen','Rowing':'Rudern','Equestrian':'Reiten','Other':'Sport'
};
function sportLabel(sport,forLang){
  if(!sport)return '—';
  var l=forLang||lang;
  if(l==='de')return SPORT_DE[sport]||sport;
  return sport;
}
// Maps a goal label in any language back to its stable key (g1..g6). This
// is the only safe way to compare goals across language toggles — comparing
// the rendered string ('Lose weight' vs 'Abnehmen') breaks the moment the
// user switches DE/EN mid-onboarding.
function goalKeyOf(label){
  if(!label)return null;
  for(var i=1;i<=6;i++){
    var k='g'+i;
    if(T.en[k]===label||T.de[k]===label)return k;
  }
  return null;
}
// True if the user's primary goal corresponds to the given key, regardless
// of the language the label was stored in.
function isGoal(k){
  return goalKeyOf(ud.goal)===k;
}

function selGoal(el,k){
  // Multi-select: toggle. Keep ud.goal as primary (first), ud.goals as array.
  if(!Array.isArray(ud.goals))ud.goals=[];
  var val=t(k);
  // Match by goal key (language-independent), not the rendered label —
  // otherwise a user who selected 'Lose weight' in EN and then switched to
  // DE before clicking would push 'Abnehmen' as a SECOND goal.
  var idx=-1;
  for(var i=0;i<ud.goals.length;i++){
    if(goalKeyOf(ud.goals[i])===k){idx=i;break;}
  }
  if(idx>=0){
    ud.goals.splice(idx,1);
    el.classList.remove('sel');
  }else{
    ud.goals.push(val);
    el.classList.add('sel');
  }
  // Primary goal = first selected (for backwards compatibility with KI prompts)
  ud.goal=ud.goals[0]||'';
}
function tc(el,key,val){if(!ud[key])ud[key]=[];if(ud[key].includes(val)){ud[key]=ud[key].filter(function(v){return v!==val;});el.classList.remove('sel');}else{ud[key].push(val);el.classList.add('sel');}}

function loadSession(){try{var d=sessionStorage.getItem('pk_ud');if(d){var saved=JSON.parse(d);Object.keys(saved).forEach(function(k){if(k in saved)ud[k]=saved[k];});}var p=sessionStorage.getItem('pk_plan');if(p)plan=JSON.parse(p);var ts=sessionStorage.getItem('pk_train');if(ts){var t=JSON.parse(ts);if(t.completed)trainState.completed=t.completed;if(t.feedback)trainState.feedback=t.feedback;if(t.currentWeek)trainState.currentWeek=t.currentWeek;}}catch(e){}loadMealTrack();}

// Debounced backend sync for trainState. Waits 1.5s after last change
// so rapid actions (abhaken + feedback) only fire one request.
var __trainSyncTimer=null;
function scheduleTrainSync(){
  if(__trainSyncTimer)clearTimeout(__trainSyncTimer);
  __trainSyncTimer=setTimeout(syncTrainingState,1500);
}
async function syncTrainingState(){
  try{
    var sess=await window.sb.auth.getSession();
    var tok=sess?.data?.session?.access_token;
    if(!tok)return;
    await fetch(BACKEND+'/user/training-state',{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok},
      body:JSON.stringify({training_state:trainState})
    });
  }catch(e){console.error('trainState sync failed:',e);}
}
async function loadTrainingStateFromBackend(){
  try{
    var sess=await window.sb.auth.getSession();
    var tok=sess?.data?.session?.access_token;
    if(!tok)return;
    var res=await fetch(BACKEND+'/user/training-state',{headers:{Authorization:'Bearer '+tok}});
    if(!res.ok)return;
    var json=await res.json();
    if(json.training_state){
      trainState.completed=json.training_state.completed||{};
      trainState.feedback=json.training_state.feedback||{};
      trainState.currentWeek=json.training_state.currentWeek||1;
      // Update sessionStorage so next render uses backend data
      try{sessionStorage.setItem('pk_train',JSON.stringify(trainState));}catch(e){}
    }
  }catch(e){console.error('trainState load failed:',e);}
}

// Translate one session object. Returns cached copy if available,
// otherwise asks KI for a full-object translation and caches it.
async function translateSessionToDE(session, cacheKey){
  if(!session||!session.title)return session;
  var cache=getSesCache();
  if(cache[cacheKey]){
    var c=cache[cacheKey];
    return {
      type:session.type,
      title:c.title||session.title,
      focus:c.focus||session.focus,
      desc:c.desc||session.desc,
      duration:session.duration,
      exercises:(session.exercises||[]).map(function(ex,i){
        if(typeof ex==='string')return ex;
        var ct=c.exercises&&c.exercises[i];
        return {
          name:(ct&&ct.name)||ex.name,
          detail:(ct&&ct.detail)||ex.detail,
          tip:(ct&&ct.tip)||ex.tip||''
        };
      })
    };
  }
  var payload={
    title:session.title||'',
    focus:session.focus||'',
    desc:session.desc||'',
    exercises:(session.exercises||[]).map(function(ex){
      if(typeof ex==='string')return {name:ex,detail:'',tip:''};
      return {name:ex.name||'',detail:ex.detail||'',tip:ex.tip||''};
    })
  };
  try{
    var prompt='Translate this fitness training session to natural German. '+
      'Rules:\n'+

      '- Technical terms common in DE fitness: keep (Core, Plank, Rondo, Fartlek, Tempo, 1RM, FTP, VO2max)\n'+
      '- Translate tip sentences naturally\n\n'+
      'Respond ONLY with valid JSON matching this exact structure (same keys):\n'+
      JSON.stringify(payload)+'\n\n'+
      'Input to translate:\n'+JSON.stringify(payload);
    var translated=await aiGenJSON(prompt,1400,'session_translate');
    if(translated&&translated.title){
      // Post-processing: AI sometimes leaves English words even with explicit
      // instructions. This deterministic dictionary sweep catches the most
      // common cases so the dashboard never shows English in DE mode.
      translated.title=deCleanup(translated.title);
      translated.focus=deCleanup(translated.focus);
      translated.desc=deCleanup(translated.desc);
      if(Array.isArray(translated.exercises)){
        translated.exercises=translated.exercises.map(function(ex){
          if(!ex||typeof ex!=='object')return ex;
          return {
            name:deCleanup(ex.name),
            detail:deCleanup(ex.detail),
            tip:deCleanup(ex.tip),
          };
        });
      }
      cache[cacheKey]=translated;
      saveSesCache();
      return {
        type:session.type,
        title:translated.title,
        focus:translated.focus||session.focus,
        desc:translated.desc||session.desc,
        duration:session.duration,
        exercises:(session.exercises||[]).map(function(ex,i){

            detail:(ct&&ct.detail)||ex.detail,
            tip:(ct&&ct.tip)||ex.tip||''
          };
        })

  return session; // Silent fallback: English stays
}

// Translate every non-rest session in a week plan in parallel.
async function translateWeekPlanToDE(week, sport, level){
  if(!week||!week.days)return week;
  var lk=levelKey(level);
  var tasks=week.days.map(function(d){
    if(!d||d.type==='rest'||!d.title)return Promise.resolve(d);
    // Cache-key includes the title, so AI-generated sessions with different
    // titles (e.g. "Explosive Lower Body" vs "Match-Specific Conditioning")
    // don't overwrite each other's translations.
    var key=sport+'|'+d.type+'|'+lk+'|'+d.title;
    return translateSessionToDE(d,key);
  });
  var translated=await Promise.all(tasks);
  return {days:translated, weekNum:week.weekNum, phase:week.phase};
}

// Check if any non-rest session in week still needs DE translation
function weekNeedsTranslation(week, sport, level){
  if(!week||!week.days)return false;
  var lk=levelKey(level);
  var cache=getSesCache();
  return week.days.some(function(d){
    if(!d||d.type==='rest'||!d.title)return false;
    // Cache-key uses the title itself so each unique AI-generated session
    // gets its own cached translation (previously cache hit by sport|type|level
    // only, which incorrectly reused translations across different sessions).
    var key=sport+'|'+d.type+'|'+lk+'|'+d.title;
    if(cache[key])return false;
    // Also detect English text in an existing session that was never translated
    // (e.g. "Advanced Ball Mastery", "Explosive Lower Body").
    if(looksEnglish(d.title)||looksEnglish(d.focus)||looksEnglish(d.desc))return true;
    return true; // no cache entry → need translation
  });
}

// Simple heuristic: title is likely English if it contains common English
// words that don't exist in German (or lacks German-specific characters).
function looksEnglish(s){
  if(!s||typeof s!=='string')return false;
  // Common English fitness words we never want to see in a German plan
  var enWords=/\b(advanced|mastery|explosive|lower|upper|body|match|specific|conditioning|strength|power|speed|endurance|session|workout|ball|control|sprint|interval|recovery|foundation|build|peak|phase|elite|beginner|intermediate|focus)\b/i;
  return enWords.test(s);
}

// Find template for sport (case-insensitive, fuzzy)
function getTpl(sport){
  if(!sport)return null;
  if(TPL[sport])return TPL[sport];
  var key=Object.keys(TPL).find(function(k){return k.toLowerCase()===sport.toLowerCase();});
  return key?TPL[key]:null;
}

// Map onboarding level string to template key
function levelKey(level){
  if(!level)return 'int';
  var l=String(level).toLowerCase();
  if(l.indexOf('beg')>=0||l.indexOf('anfäng')>=0||l.indexOf('anfang')>=0)return 'beg';
  if(l.indexOf('adv')>=0||l.indexOf('profi')>=0||l.indexOf('pro')>=0||l.indexOf('elite')>=0)return 'adv';
  return 'int';
}

// Build a sport-specific session from template
// ─── Progression helpers ───
// Week → phase mapping. 12-week cycle with 3 phases.
function weekPhase(week){
  if(week<=4)return 'foundation';
  if(week<=8)return 'build';
  return 'peak';
}

// Multipliers applied to exercise sets/reps based on progression phase AND
// feedback-based adjustment from previous weeks.
function progressionMultiplier(week,feedbackBias){
  // Base phase multiplier
  var base=1.0;
  if(week>=5&&week<=8)base=1.15; // Build: +15%
  if(week>=9)base=1.30;          // Peak: +30%
  // Session-rating bias (rolling, from star-ratings)
  var mult=base+feedbackBias*0.15;
  // Live adjustment bias (explicit 4-step feedback tile) — direct additive
  var adj=(trainState&&trainState.adjustBias)||0;
  mult+=adj;
  // Clamp so progression never explodes or collapses
  return Math.max(0.7,Math.min(1.6,mult));
}

// Calculate feedback bias from stored feedback for previous weeks.
// Returns value between -1 (too hard) and +1 (too easy), rolling 3-week window.
function calcFeedbackBias(){
  var fb=trainState.feedback||{};
  var keys=Object.keys(fb).filter(function(k){return fb[k]!=='perfect';});
  if(keys.length<2)return 0;
  var recent=keys.slice(-6); // last 6 sessions
  var easy=recent.filter(function(k){return fb[k]==='easy';}).length;
  var hard=recent.filter(function(k){return fb[k]==='hard';}).length;
  return (easy-hard)/recent.length;
}

// Apply progression to a single exercise's detail string (sets/reps).
// Example: "4×6 @ 75%" becomes "5×7 @ 78%" in Build phase.
function applyProgression(exercises,mult){
  if(!exercises||mult===1.0)return exercises;
  return exercises.map(function(ex){
    if(typeof ex!=='object'||!ex.detail)return ex;
    var detail=ex.detail;
    // Scale set×rep patterns like "4×6" or "3×10"
    detail=detail.replace(/(\d+)[×x](\d+)/g,function(match,sets,reps){
      var newSets=Math.round(parseInt(sets)*Math.sqrt(mult));
      var newReps=Math.round(parseInt(reps)*Math.sqrt(mult));
      return Math.max(1,newSets)+'×'+Math.max(1,newReps);
    });
    // Scale durations like "30s" "45s" "2min" "10 min"
    detail=detail.replace(/(\d+)\s*s(?!\w)/g,function(m,n){return Math.round(parseInt(n)*mult)+'s';});
    detail=detail.replace(/(\d+)\s*min/g,function(m,n){return Math.round(parseInt(n)*mult)+' min';});
    // Scale percentages like "@ 75%" → "@ 82%"
    detail=detail.replace(/@\s*(\d+)%/g,function(m,pct){
      var newPct=Math.min(95,Math.round(parseInt(pct)+(mult-1)*30));
      return '@ '+newPct+'%';
    });
    return {name:ex.name,detail:detail,tip:ex.tip||''};
  });
}

// Build a week of training via KI for sports not in TPL.
// One API call delivers all sessions — cheaper than one per day.
async function aiBuildWeek(sport,level,sessionsPerWk,duration,typeSequence,weekNum,phase){
  var langInstr=lang==='de'
    ?'CRITICAL: Respond ENTIRELY in GERMAN (Deutsch). ALL text fields — especially "title", "focus", "desc", exercise "name", "detail", and "tip" — MUST be in natural German. Examples: "Explosive Lower Body" → "Explosive Beinkraft", "Advanced Ball Mastery" → "Fortgeschrittene Ballbeherrschung", "Match-Specific Conditioning" → "Spielspezifische Kondition", "Ball control" → "Ballkontrolle", "Sprint intervals" → "Sprint-Intervalle". Keep numbers + units unchanged (3×10min, 6×30m, @75%).'
    :'IMPORTANT: Respond ENTIRELY in ENGLISH. All text fields must be in English.';
  var phaseInstr={foundation:'Foundation phase: moderate intensity, focus on movement quality.',build:'Build phase: progressively heavier loads and higher volume (+15% vs foundation).',peak:'Peak phase: maximum intensity, sport-specific demands (+30% vs foundation).'}[phase]||'';
  // Sport-science correctness: dynamic stretching/mobility BEFORE training
  // (warm-up, prepares body), static stretching AFTER training (cooldown,
  // helps recovery and ROM). The reverse — static stretching before workout
  // — is associated with reduced power output and is widely considered
  // outdated. We instruct the AI explicitly to avoid that mistake.
  var stretchRule='STRETCHING RULE (sport science): Dynamic stretching/mobility ONLY in warm-up (start of session). Static stretching ONLY in cooldown (end of session). Never put static stretching before the main work, never put dynamic stretching as the cooldown. If a session includes a warm-up, use dynamic mobility drills. If it includes a cooldown, use static holds (30-60s).';
  var prompt='You are an expert strength & conditioning coach for '+sport+'.\n'+langInstr+'\n'+stretchRule+'\nBuild '+sessionsPerWk+' training sessions for a '+level+'-level athlete, week '+weekNum+' of a 12-week program.\n'+phaseInstr+'\nSession types (in order): '+typeSequence.join(', ')+'.\nEach session: '+duration+' minutes. 4-5 exercises with sets/reps/duration and one technique tip.\n\nRespond ONLY with valid JSON:\n{"sessions":[{"type":"<type>","title":"<session title>","focus":"<what this trains>","desc":"<1-2 sentences>","exercises":[{"name":"<exercise>","detail":"<sets/reps/duration>","tip":"<technique tip>"},{"name":"<exercise>","detail":"<detail>","tip":"<tip>"},{"name":"<exercise>","detail":"<detail>","tip":"<tip>"},{"name":"<exercise>","detail":"<detail>","tip":"<tip>"}]}]}';
  try{
    var res=await aiGenJSON(prompt,2000);
    return (res&&res.sessions)||null;
  }catch(e){console.error('aiBuildWeek failed:',e);return null;}
}


function buildSession(tpl,sessionType,level,duration){
  if(!tpl||!tpl.sessions||!tpl.sessions[sessionType])return null;
  var lk=levelKey(level);
  var session=tpl.sessions[sessionType][lk]||tpl.sessions[sessionType].int;
  if(!session)return null;
  return {
    type:sessionType,
    title:session.title,
    focus:session.focus,
    desc:session.desc,
    duration:duration,
    exercises:session.exercises.slice() // copy so templates aren't mutated
  };
}


// Synthesise a 7-day week plan. Uses sport-specific templates where available,
// falls back to generic stubs for sports the KI will handle later.
function synthWeekPlan(sport,level,sessionsPerWk,duration,todayWorkout){
  sessionsPerWk=Math.max(1,Math.min(7,sessionsPerWk||3));
  duration=duration||60;
  // Session distribution: spread evenly, avoid back-to-back for recovery
  var patterns={
    1:[true,false,false,false,false,false,false],
    2:[true,false,false,true,false,false,false],
    3:[true,false,true,false,true,false,false],
    4:[true,false,true,false,true,false,true],
    5:[true,true,false,true,true,false,true],
    6:[true,true,false,true,true,true,true],
    7:[true,true,true,true,true,true,true]
  };
  var pattern=patterns[sessionsPerWk];
  var tpl=getTpl(sport);
  // Determine the sequence of session types
  var typeSequence;
  if(tpl&&tpl.sessionOrder&&tpl.sessionOrder[sessionsPerWk]){
    typeSequence=tpl.sessionOrder[sessionsPerWk];
  }else{
    // Generic fallback: rotate through common types
    var generic=['strength','endurance','mobility','mixed','recovery','speed','technique'];
    typeSequence=[];
    for(var i=0;i<sessionsPerWk;i++)typeSequence.push(generic[i%generic.length]);
  }
  var days=[];
  var sessionIdx=0;
  // Progression: apply based on current training week
  var weekNum=(trainState&&trainState.currentWeek)||1;
  var phase=weekPhase(weekNum);
  var bias=calcFeedbackBias();
  var mult=progressionMultiplier(weekNum,bias);
  pattern.forEach(function(isSession){
    if(!isSession){
      days.push({type:'rest'});
      return;
    }
    var type=typeSequence[sessionIdx%typeSequence.length];
    sessionIdx++;
    // Try template-based session first
    var session=buildSession(tpl,type,level,duration);
    if(session){
      session.exercises=applyProgression(session.exercises,mult);
      days.push(session);
      return;
    }
    // Fallback: first session uses today's workout if provided
    if(days.filter(function(d){return d.type!=='rest';}).length===0&&todayWorkout){
      days.push({
        type:type,
        title:todayWorkout.title||(sport+' Session'),
        focus:todayWorkout.focus||'',
        desc:todayWorkout.desc||'',
        duration:duration,
        exercises:applyProgression(todayWorkout.exercises||[],mult)
      });
    }else{
      // Generic stub — will be replaced by KI-generated content via enrichWeekWithAI
      days.push({
        type:type,
        title:sport+' '+type.charAt(0).toUpperCase()+type.slice(1),
        duration:duration,
        exercises:[{name:'Coming soon',detail:'Details will be AI-generated',tip:''}],
        _needsAI:true
      });
    }
  });
  return {days:days,weekNum:weekNum,phase:phase};
}

// After synthWeekPlan: if any days are AI stubs, fetch real content.
// Fire-and-forget; updates plan.week.days in place, re-renders fitness tab.
async function enrichWeekWithAI(){
  if(!plan||!plan.week||!plan.week.days)return;
  var stubDays=plan.week.days.filter(function(d){return d._needsAI;});
  if(stubDays.length===0)return;
  var typeSequence=stubDays.map(function(d){return d.type;});
  var sport=ud.sport||'Running';
  var level=ud.level||'Intermediate';
  var duration=parseInt(ud.dur||60);
  var sessions=await aiBuildWeek(sport,level,stubDays.length,duration,typeSequence,plan.week.weekNum||1,plan.week.phase||'foundation');
  if(!sessions)return;
  // Apply progression + map AI sessions back into the week's day slots
  var bias=calcFeedbackBias();
  var mult=progressionMultiplier(plan.week.weekNum||1,bias);
  var aiIdx=0;
  plan.week.days.forEach(function(d,i){
    if(!d._needsAI)return;
    var aiSes=sessions[aiIdx];aiIdx++;
    if(!aiSes)return;
    d.title=aiSes.title||d.title;
    d.focus=aiSes.focus||'';
    d.desc=aiSes.desc||'';
    d.exercises=applyProgression(aiSes.exercises||[],mult);
    delete d._needsAI;
  });
  saveSession();
  // If user is on DE, translate the full week now (cached after first run)
  if(lang==='de'&&plan&&plan.week){
    try{
      plan.week=await translateWeekPlanToDE(plan.week, ud.sport||'Running', ud.level||'Intermediate');
      saveSession();
    }catch(e){console.warn('DE week translation failed:',e);}
  }
  // Re-render fitness tab if user is on it. Direct tFi() call is more
  // reliable than showTab() routing (Apr 2026 fix — see tFi for context).
  if(currentView==='dashboard'&&dashTab==='fitness'){
    tFi(plan);
  }
}

// Validated voucher state for the current checkout session
var __validVoucher=null;

async function checkVoucher(){
  var inp=document.getElementById('vc');
  var msg=document.getElementById('vcMsg');
  var btn=document.getElementById('vcBtn');
  var priceEl=document.getElementById('s7price');
  if(!inp||!msg)return;
  var code=inp.value.trim().toUpperCase();
  if(!code){
    __validVoucher=null;
    msg.style.display='none';
    return;
  }
  var de=lang==='de';
  inp.value=code; // normalise
  btn.textContent=de?'Prüfe...':'Checking...';
  btn.disabled=true;
  msg.style.display='block';
  msg.style.color='var(--dim)';
  msg.textContent=de?'Wird geprüft...':'Validating...';
  try{
    var emailField=document.getElementById('em');
    var currentEmail=(emailField?emailField.value.trim():'')||ud.email||'';
    var res=await fetch(BACKEND+'/voucher/validate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:code,plan:selPlan,tier:selTier,email:currentEmail})
    });
    var data=await res.json();
    btn.textContent=de?'Prüfen':'Check';
    btn.disabled=false;
    if(!data.valid){
      __validVoucher=null;
      msg.style.color='var(--red)';
      msg.textContent='✗ '+(data.error||(de?'Ungültiger Code':'Invalid code'));
      return;
    }
    __validVoucher=data;
    ud.voucherCode=code;
    saveSession();
    msg.style.color='#4ade80';
    var label=data.label||'';
    if(data.type==='trial_extend'){
      msg.textContent='✓ '+(de?(data.trialDays+' Tage kostenlos testen'):(data.trialDays+' days free trial'));
      if(priceEl)priceEl.textContent=(de?data.trialDays+' Tage kostenlos.':data.trialDays+' days free.')+' '+(selPlan==='annual'?(de?'Dann weiter im Jahresabo.':'Then annual plan.'):(de?'Dann monatlich.':'Then monthly.'));
    }else if(data.type==='trial_full'){
      msg.textContent='🎁 '+(de?(data.trialDays+' Tage Premium kostenlos'):(data.trialDays+' days Premium free'));
      if(priceEl)priceEl.textContent=de?(data.trialDays+' Tage Premium kostenlos, dann regulär.'):(data.trialDays+' days Premium free, then standard pricing.');
    }else{
      msg.textContent='✓ '+(de?'Gutschein aktiv: ':'Voucher active: ')+label;
    }
  }catch(err){
    btn.textContent=de?'Prüfen':'Check';
    btn.disabled=false;
    msg.style.color='var(--red)';
    msg.textContent='✗ '+(de?'Fehler beim Prüfen':'Could not verify');
  }
}

function updConsent(){
  var c1=document.getElementById('cc1'),c2=document.getElementById('cc2'),btn=document.getElementById('pb2');
  if(!c1||!c2||!btn)return;
  var ok=c1.checked&&c2.checked;
  btn.disabled=!ok;

  btn.style.cursor=ok?'pointer':'not-allowed';
}

async function doPay(){
  var em=document.getElementById('em').value,btn=document.getElementById('pb2');
  var c1=document.getElementById('cc1'),c2=document.getElementById('cc2');
  if(!c1||!c1.checked||!c2||!c2.checked){showE('ep',t('csE'));return;}
  if(!em){showE('ep','Please enter your email.');return;}
  // Note: snake_case keys to match showHealthDisclaimer() and the render
  // checks (e.g. cc1 checkbox state restore, fitness disclaimer modal).
  // Earlier camelCase here caused the consent state to silently drop
  // when the user navigated back or reloaded mid-flow.
  ud.email=em;ud.consent_health_data=true;ud.consent_terms=true;ud.consent_at=new Date().toISOString();saveSession();
  btn.textContent='Loading...';btn.style.opacity='.6';btn.onclick=null;
  document.getElementById('ep').style.display='none';
  try{
    // Logged-in Free user upgrading → skip check-email (account exists, but
    // it's a Free one — we WANT them to checkout). The /create-checkout backend
    // will still block if they already have an active PAID subscription.
    if(!__upgradingExistingFree){
      // First: check if an account already exists for this email
      var chk=await fetch(BACKEND+'/auth/check-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em})});
      var chkData=await chk.json();
      if(chkData.exists){
        // Account exists → show options screen instead of going to Stripe
        showAccountExists(em,chkData.hasSubscription);
        return;
      }
    }
    // No existing account (or logged-in Free upgrade) → proceed to Stripe Checkout
    var voucherCode=document.getElementById('vc')?document.getElementById('vc').value.trim().toUpperCase():'';
    var res=await fetch(BACKEND+'/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,plan:selPlan,tier:selTier,userData:{name:ud.name,age:ud.age,gender:ud.gender,weight:ud.weight,dweight:ud.dweight,height:ud.height,sleep:ud.sleep,job:ud.job,commute:ud.commute,stress:ud.stress,sport:ud.sport,level:ud.level,sessions:ud.sessions,dur:ud.dur,equip:ud.equip,al:ud.al||[],di:ud.di||[],cu:ud.cu||[],cook:ud.cook,budget:ud.budget,goal:ud.goal,goals:ud.goals||[]},consent:{healthData:true,terms:true,at:ud.consent_at},voucher:voucherCode||null,lang:lang})});
    var data=await res.json();
    // Backend detected an existing active subscription → show portal instead
    if(res.status===409&&data.code==='ALREADY_SUBSCRIBED'){
      showAccountExists(em,true);
      return;
    }
    if(data.url){__upgradingExistingFree=false;window.location.href=data.url;}
    else throw new Error(data.error||'Error');
  }catch(err){showE('ep',err.message);btn.textContent='🔒 '+t('tp')+' →';btn.style.opacity='1';btn.onclick=doPay;}
}

      // Refresh user state and show a friendly message.
      if(res.status===410&&data.code==='SUBSCRIPTION_NOT_FOUND'){
        ud.tier='free';
        ud.stripe_customer_id=null;
        var de=lang==='de';

        setTimeout(function(){window.location.reload();},1500);
        return;
      }
      throw new Error(data.error||'Error');
    }
    window.location.href=data.url;
  }catch(err){
    if(btn){showE('ep',err.message);btn.textContent='⚙️ '+t('aeC');btn.style.opacity='1';btn.onclick=doOpenPortal;}
    else peakToast(err.message);
  }

function dshell(tab,content){
  dashTab=tab;
  var p=fp();
  var tabs=[{k:'nutrition',l:t('nu')},{k:'fitness',l:t('fi')},{k:'recovery',l:t('re')},{k:'scanner',l:t('sc')},{k:'log',l:t('lg')},{k:'recipes',l:t('rp')}];
  var defaultTimeline=lang==='de'?'12 Wochen':'12 weeks';
  // Tier banner — shows monthly plan-gen usage + upgrade CTA
  var freeBanner='';
  if(isFree()||isBasic()){
    var de=lang==='de';
    var used=ud.plan_generations_used||0;
    var tierLimit=isFree()?1:5;
    var label=isFree()?(de?'GRATIS':'FREE'):(de?'BASIC':'BASIC');
    var usageTxt=(de?'Plan-Änderungen: ':'Plan changes: ')+used+'/'+tierLimit+(de?' (30 Tage)':' (30 days)');
    var cta=isFree()?(de?'Upgrade':'Upgrade'):(de?'Premium':'Premium');
    freeBanner='<div class="tier-bar">'+
      '<span class="tier-label">'+label+'</span>'+
      '<span class="tier-usage">'+usageTxt+'</span>'+
      '<button class="tier-cta" onclick="goUpgrade()">'+cta+' →</button>'+
    '</div>';
  }
  card('<div class="dhead"><div class="dgreet">'+t('gd')+' '+(ud.name||'ATHLETE').toUpperCase()+' ⚡</div><div class="dsub">'+(ud.goal||'PEAK')+' · '+(p.timeline||defaultTimeline)+' · '+(p.headline||'')+'</div>'+freeBanner+'</div><div class="dnav">'+tabs.map(function(tb){return '<button class="ntab '+(tab===tb.k?'act':'')+'" data-tab="'+tb.k+'" onclick="showTab(\''+tb.k+'\')">'+tb.l+'</button>';}).join('')+'</div><div class="dbody" id="db">'+content+'</div>');
  // After rendering, scroll the tab bar so the active tab is centered. Without
  // this, switching to a tab that's off-screen (e.g. Recipes on narrow phones,
  // since it's the 6th tab) leaves the active tab invisible while the body
  // shows its content — creating the visual illusion that the body has shifted.
  // Defer with rAF so the DOM is painted before we measure offsets.
  requestAnimationFrame(function(){
    var navEl=document.querySelector('.dnav');
    if(!navEl)return;
    var actBtn=navEl.querySelector('.ntab.act');
    if(!actBtn)return;
    // Center the active tab within the scroll viewport
    var target=actBtn.offsetLeft-(navEl.clientWidth/2)+(actBtn.offsetWidth/2);
    navEl.scrollTo({left:Math.max(0,target),behavior:'smooth'});
  });
}

  else if(tab==='log')tLg();
  else if(tab==='recipes')tRp();
}

// ── NUTRITION TAB ─────────────────────────────────────────────────────
function tNu(p){
  var de=lang==='de';
  // Logged kcal = manual flog entries + checked planned meals (Basic+ only).
  // For Free users, mealTrack.checked stays empty so trackedKcal=0.
  var manualKcal=flog.reduce(function(a,e){return a+(e.kcal||0);},0);
  var trackedKcal=trackedMealKcal(p.todayMeals);
  var lg=manualKcal+trackedKcal;
  var rm=p.calories-lg;
  // Protein progress (Basic+: includes tracked meal protein, otherwise 0)
  var trackedProt=trackedMealProtein(p.todayMeals);
  var trackedCarb=trackedMealCarbs(p.todayMeals);
  var trackedFat=trackedMealFat(p.todayMeals);
  var protPct=p.protein?Math.min(100,Math.round(trackedProt/p.protein*100)):0;
  var carbPct=p.carbs?Math.min(100,Math.round(trackedCarb/p.carbs*100)):0;
  var fatPct=p.fat?Math.min(100,Math.round(trackedFat/p.fat*100)):0;
  var c='<div class="sg"><div class="stat"><div class="stl">'+t('dt')+'</div><div class="stv">'+p.calories+' kcal</div></div><div class="stat"><div class="stl">'+(de?'Protokolliert':'Logged')+'</div><div class="stv">'+lg+'</div></div><div class="stat"><div class="stl">'+(de?'Verbleibend':'Remaining')+'</div><div class="stv" style="color:var(--red)">'+rm+'</div></div><div class="stat"><div class="stl">'+t('pg')+'</div><div class="stv">'+p.protein+'g</div></div></div>';
  c+='<div class="mbw"><div class="mbl"><span>'+(de?'Eiweiß':'Protein')+'</span><span>'+trackedProt+' / '+p.protein+'g</span></div><div class="mb"><div class="mf" style="width:'+protPct+'%;background:var(--red)"></div></div></div>';
  c+='<div class="mbw"><div class="mbl"><span>'+(de?'Kohlenhydrate':'Carbs')+'</span><span>'+trackedCarb+' / '+p.carbs+'g</span></div><div class="mb"><div class="mf" style="width:'+carbPct+'%;background:#4A90D9"></div></div></div>';
  c+='<div class="mbw"><div class="mbl"><span>'+(de?'Fette':'Fat')+'</span><span>'+trackedFat+' / '+p.fat+'g</span></div><div class="mb"><div class="mf" style="width:'+fatPct+'%;background:var(--dim)"></div></div></div>';
  c+='<div class="dst">'+t('tm')+'</div>';
  c+=p.todayMeals.map(function(m,i){
    var r=mrat[i];
    var checked=mealTrack.date===todayDateStr()&&mealTrack.checked[String(i)];
    // Checkbox: tappable square that fills with ✓ when meal is checked.
    // For Free users, tapping triggers the upgrade prompt instead of toggling.
    var checkBox='<span class="meal-check'+(checked?' on':'')+'" onclick="toggleMealCheck('+i+',event)" role="checkbox" aria-checked="'+(checked?'true':'false')+'" title="'+(de?'Mahlzeit abhaken':'Mark as eaten')+'">'+(checked?'✓':'')+'</span>';
    var rowStyle=checked?' style="opacity:0.65"':'';
    var nameStyle=checked?' style="text-decoration:line-through;text-decoration-color:var(--red);text-decoration-thickness:2px"':'';
    return '<div class="mc"'+rowStyle+'>'+checkBox+'<span class="me" onclick="showMealDetail('+i+')" style="cursor:pointer">'+m.emoji+'</span><div class="mi" onclick="showMealDetail('+i+')" style="cursor:pointer"><div class="mn"'+nameStyle+'>'+m.name+'</div><div class="mm">'+mealTimeLabel(m.time)+' · '+translateMacro(m.macro)+'</div>'+(!r?'<div class="rrow" onclick="event.stopPropagation()">'+[1,2,3,4,5].map(function(s){return '<span class="star" onclick="rateMeal('+i+','+s+',this)">⭐</span>';}).join('')+'</div>':'<div style="font-size:10px;color:var(--red);margin-top:3px">'+(de?'BEWERTET':'RATED')+' '+r+'/5 ✓</div>')+'</div><span class="mk" onclick="showMealDetail('+i+')" style="cursor:pointer">'+m.kcal+' kcal</span><span style="color:var(--faint);font-size:10px;margin-left:5px;cursor:pointer" onclick="showMealDetail('+i+')">→</span></div>';
  }).join('');
  if(!isBasic()&&!isFree()){
    var moodAiHtml='<div class="aib" style="margin-top:11px"><div class="ailbl"><div class="aidot"></div>PEAK AI</div><p>'+(de?'Nicht nach Plan? ':'Not feeling the plan? ')+'<span style="color:var(--red);cursor:pointer;font-weight:700" onclick="showMoodPicker()">'+(de?'Küche wählen →':'Pick a cuisine →')+'</span></p>';
    // If a meal was just generated via mood-pick, offer a quick "re-roll"
    // button so the user can try another dish in the same cuisine without
    // walking through the picker UI again.
    if(window.__lastMoodPick&&typeof window.__lastMoodPick.mealIdx==='number'){
      var lp=window.__lastMoodPick;
      var lpMeal=p.todayMeals&&p.todayMeals[lp.mealIdx];
      if(lpMeal){
        var slotLabel=de?({Breakfast:'Frühstück',Lunch:'Mittag',Dinner:'Abend',Snack:'Snack'}[lpMeal.time]||lpMeal.time):lpMeal.time;
        moodAiHtml+='<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-size:11px;color:var(--ink2)">'+(de?'Keine Lust auf ':'Not feeling ')+'<strong>'+esc(lpMeal.name)+'</strong>? <span style="color:var(--red);cursor:pointer;font-weight:700" onclick="rerollLastMood()">'+(de?'Anderes '+esc(lp.cuisine)+' '+esc(slotLabel)+' →':'Another '+esc(lp.cuisine)+' '+esc(slotLabel)+' →')+'</span></div>';
      }
    }
    moodAiHtml+='</div><div id="moodA"></div>';
    c+=moodAiHtml;
  }
  // SHOPPING LIST — Variant D: grouped by meal.
  // Each meal section shows its own ingredients with quantities. When a meal
  // is checked off (logged), its section is visually struck through —
  // signalling "you've eaten this, no longer needs to be shopped for".
  //
  // Roadmap (post-launch v1.1+): unify into a weekly shopping list (variant C)
  // that aggregates across the full meal week. Bigger refactor, parked until
  // launch is complete.
  //
  // Two data sources for backwards compat:
  // - NEW (per-meal): every meal has its own `ingredients` array → render groups
  // - LEGACY (global): older plans only have `plan.shopping` → render flat
  var hasPerMealIngredients=Array.isArray(p&&p.todayMeals)&&p.todayMeals.length>0&&p.todayMeals.every(function(m){
    return m&&Array.isArray(m.ingredients)&&m.ingredients.length>0;
  });
  if(hasPerMealIngredients){
    var qtyBlurred=isFree();
    var todayChecked=mealTrack.date===todayDateStr()?(mealTrack.checked||{}):{};
    var mealLabelMap=de?{Breakfast:'Frühstück',Lunch:'Mittag',Dinner:'Abend',Snack:'Snack'}:{Breakfast:'Breakfast',Lunch:'Lunch',Dinner:'Dinner',Snack:'Snack'};
    c+='<div class="dst" style="margin-top:14px">'+(de?'Einkaufsliste':'Shopping List')+'</div>';
    c+='<div class="aib">';
    p.todayMeals.forEach(function(m,mi){
      var consumed=!!todayChecked[String(mi)];
      var sectionLabel=(m.emoji||'')+' '+(mealLabelMap[m.time]||m.time||'')+' · '+esc(m.name||'');
      // Section header — meal name + time. Struck through if consumed.
      var headStyle='font-size:10px;font-weight:700;color:var(--red);letter-spacing:1.5px;text-transform:uppercase;margin:10px 0 6px;padding-top:'+(mi===0?'0':'8px')+';border-top:'+(mi===0?'none':'1px dashed var(--border)');
      if(consumed){headStyle+=';opacity:.45;text-decoration:line-through';}
      c+='<div style="'+headStyle+'">'+sectionLabel+(consumed?' ✓':'')+'</div>';
      // Ingredients for this meal
      (m.ingredients||[]).forEach(function(ing){
        var name='', qty='';
        if(typeof ing==='string'){name=ing;}
        else if(ing&&typeof ing==='object'){name=ing.item||ing.name||''; qty=ing.qty||'';}
        if(!name)return;
        var qtyHtml='';
        if(qty){
          if(qtyBlurred){
            qtyHtml='<span style="color:var(--red);font-size:11px;font-weight:700;letter-spacing:1px;filter:blur(4px);cursor:pointer;user-select:none" onclick="goUpgrade()" title="'+(de?'Mit Basic freischalten':'Unlock with Basic')+'">'+esc(qty)+'</span>';
          }else{
            qtyHtml='<span style="color:var(--red);font-size:11px;font-weight:700;letter-spacing:1px'+(consumed?';opacity:.45':'')+'">'+esc(qty)+'</span>';
          }
        }
        var itemStyle=consumed?'text-decoration:line-through;text-decoration-color:var(--faint);opacity:.5':'';
        c+='<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;color:var(--ink2)"><span style="'+itemStyle+'">→ '+esc(name)+'</span>'+qtyHtml+'</div>';
      });
    });
    if(qtyBlurred){
      c+='<div style="font-size:10px;color:var(--faint);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);text-align:center">'+(de?'🔒 Mengenangaben mit ':'🔒 Quantities with ')+'<span onclick="goUpgrade()" style="color:var(--red);cursor:pointer;font-weight:700">'+(de?'Basic freischalten →':'Basic unlock →')+'</span></div>';
    }
    c+='</div>';
  }else if(p&&p.shopping&&p.shopping.length){
    // LEGACY render path: flat global list, used only for old cached plans
    // that pre-date the per-meal ingredients schema. New plans always use
    // the grouped renderer above.
    c+='<div class="dst" style="margin-top:14px">'+(de?'Einkaufsliste':'Shopping List')+'</div>';
    var qtyBlurredL=isFree();
    var rows=p.shopping.map(function(s){
      var name='', qty='';
      if(typeof s==='string'){
        name=s;
      }else if(s&&typeof s==='object'){
        name=s.item||s.name||'';
        qty=s.qty||'';
      }
      var qtyHtml='';
      if(qty){
        if(qtyBlurredL){
          qtyHtml='<span style="color:var(--red);font-size:11px;font-weight:700;letter-spacing:1px;filter:blur(4px);cursor:pointer;user-select:none" onclick="goUpgrade()" title="'+(de?'Mit Basic freischalten':'Unlock with Basic')+'">'+qty+'</span>';
        }else{
          qtyHtml='<span style="color:var(--red);font-size:11px;font-weight:700;letter-spacing:1px">'+qty+'</span>';
        }
      }
      return '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;color:var(--ink2);border-bottom:1px solid var(--border)"><span>🛒 '+name+'</span>'+qtyHtml+'</div>';
    }).join('');
    c+='<div class="aib">'+rows;
    if(qtyBlurredL){
