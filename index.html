<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEAK — by MJ Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--s1:#111111;--s2:#181818;--s3:#222222;
  --white:#FFFFFF;--ink:#FFFFFF;--dim:#888888;--faint:#3A3A3A;
  --red:#E8001A;--red-dark:#A50013;--red-bg:#1A0004;--red-border:#3A000A;
  --border:#242424;--shadow:0 8px 40px rgba(0,0,0,0.7);
}
html,body{height:100%;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:60px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{flex-shrink:0;line-height:1;cursor:pointer}
.logo-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:5px;color:var(--white);display:block}
.logo-line{width:100%;height:2px;background:var(--red);margin:1px 0}
.logo-brand{font-size:7px;font-weight:700;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;display:block}
.pbar-wrap{flex:1;max-width:240px}
.pbar-track{height:2px;background:var(--s3)}
.pbar-fill{height:2px;background:var(--red);transition:width 0.5s}
.topbar-r{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.slbl{font-size:11px;color:var(--faint);font-weight:600;letter-spacing:1px;white-space:nowrap}
.lbtn{font-size:10px;color:var(--dim);cursor:pointer;padding:5px 8px;border:1px solid var(--border);background:none;font-family:'Barlow',sans-serif;font-weight:700;letter-spacing:1px;transition:all .15s}
.lbtn:hover{border-color:var(--red);color:var(--red)}
.loginbtn{font-size:11px;font-weight:900;cursor:pointer;padding:7px 14px;border:none;background:var(--red);color:var(--white);font-family:'Barlow Condensed',sans-serif;letter-spacing:3px;text-transform:uppercase;transition:all .15s}
.loginbtn:hover{background:var(--red-dark)}

/* LAYOUT */
.main{display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;min-height:calc(100vh - 60px)}
.card{background:var(--s1);border:1px solid var(--border);width:100%;max-width:600px;animation:up .35s ease}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.ch{padding:28px 32px 0}.cb{padding:18px 32px}.cf{padding:4px 32px 26px;display:flex;gap:8px}

/* TYPE */
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--red-bg);color:var(--red);font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--red-border);margin-bottom:10px}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;line-height:1.05;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;color:var(--white)}
.ctitle em{font-style:normal;color:var(--red)}
.csub{font-size:13px;color:var(--dim);line-height:1.6}
.slabel{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--faint);text-transform:uppercase;margin-bottom:7px;margin-top:16px}

/* FORM */
.field{margin-bottom:13px}
label{display:block;font-size:9px;font-weight:700;color:var(--faint);margin-bottom:5px;letter-spacing:2px;text-transform:uppercase}
input[type="text"],input[type="number"],input[type="email"],input[type="password"],textarea{width:100%;padding:11px 13px;border:1px solid var(--border);background:var(--s2);color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .15s;border-radius:0;appearance:none}
input:focus,textarea:focus{border-color:var(--red)}
input::placeholder,textarea::placeholder{color:var(--faint)}
textarea{resize:vertical;min-height:68px}
.irow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ui{position:relative;display:flex;align-items:center}.ui input{padding-right:40px}
.utag{position:absolute;right:12px;font-size:10px;font-weight:700;color:var(--red);pointer-events:none;letter-spacing:1px}

/* TILES */
.tiles{display:grid;gap:5px}.tiles.c2{grid-template-columns:1fr 1fr}.tiles.c3{grid-template-columns:1fr 1fr 1fr}.tiles.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.tile{border:1px solid var(--border);background:var(--s2);padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;user-select:none}
.tile:hover{border-color:var(--red);background:var(--red-bg)}.tile.sel{border-color:var(--red);background:var(--red-bg)}.tile.sel .tck{opacity:1}
.ti{font-size:16px;flex-shrink:0}.tt{flex:1}.tl{font-size:12px;font-weight:700;color:var(--white)}.td{font-size:10px;color:var(--faint);margin-top:1px}
.tck{width:14px;height:14px;background:var(--red);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:8px;opacity:0;transition:opacity .15s;flex-shrink:0;font-weight:900}
.stile{border:1px solid var(--border);background:var(--s2);padding:11px 5px;cursor:pointer;transition:all .15s;text-align:center;user-select:none}
.stile:hover{border-color:var(--red);background:var(--red-bg)}.stile.sel{border-color:var(--red);background:var(--red-bg)}
.se{font-size:20px;display:block;margin-bottom:2px}.sn{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:0.5px}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip2{padding:4px 10px;border:1px solid var(--border);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--dim);user-select:none;background:var(--s2)}
.chip2:hover{border-color:var(--red);color:var(--red)}.chip2.sel{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.chip2.dc.sel,.chip2.cc.sel{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* SLIDER */
.slabs{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-bottom:4px}
input[type="range"]{width:100%;height:2px;-webkit-appearance:none;background:var(--s3);outline:none;border:none;padding:0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--red);cursor:pointer;border:2px solid var(--s1)}
.sv{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--red);margin-top:4px;letter-spacing:2px}

/* BUTTONS */
.bbk{background:none;border:1px solid var(--border);color:var(--faint);font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:10px 14px;cursor:pointer;transition:all .15s;flex-shrink:0;letter-spacing:1.5px;text-transform:uppercase}
.bbk:hover{border-color:var(--dim);color:var(--dim)}
.bnx{flex:1;background:var(--red);color:var(--white);border:none;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;padding:13px 20px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:3px;text-transform:uppercase}
.bnx:hover{background:var(--red-dark)}
.bgoog{width:100%;background:var(--s2);color:var(--white);border:1px solid var(--border);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;padding:11px 18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:9px}
.bgoog:hover{border-color:var(--red)}
.divider{display:flex;align-items:center;gap:8px;margin:10px 0;color:var(--faint);font-size:10px;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* AI BUBBLE */
.aib{background:var(--red-bg);border:1px solid var(--red-border);border-left:3px solid var(--red);padding:12px 15px;margin-bottom:13px}
.ailbl{font-size:8px;font-weight:700;color:var(--red);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.aidot{width:5px;height:5px;background:var(--red);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.aib p{font-size:13px;line-height:1.6;color:var(--dim)}

/* GOAL CARDS */
.gc{border:1px solid var(--border);background:var(--s2);padding:11px 13px;cursor:pointer;transition:all .15s;margin-bottom:5px;display:flex;align-items:center;gap:9px}
.gc:hover{border-color:var(--red);background:var(--red-bg)}.gc.sel{border-color:var(--red);background:var(--red-bg)}.gc.sel .gr{background:var(--red);border-color:var(--red)}.gc.sel .gr::after{opacity:1}
.ge{font-size:19px}.gi{flex:1}.gt{font-size:13px;font-weight:700;color:var(--white);letter-spacing:.3px}.gd{font-size:10px;color:var(--faint);margin-top:2px}
.gr{width:15px;height:15px;border:1.5px solid var(--border);position:relative;flex-shrink:0}
.gr::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:var(--white);opacity:0;transition:opacity .15s}

/* LOADING */
.lw{padding:48px 32px;text-align:center}
.spin{width:34px;height:34px;border:2px solid var(--s3);border-top-color:var(--red);animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--white);margin-bottom:5px;letter-spacing:2px;text-transform:uppercase}
.ls2{font-size:12px;color:var(--faint)}
.lsi{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--faint);transition:color .25s;letter-spacing:.3px}
.lsi.done{color:var(--red)}.lsi.active{color:var(--white);font-weight:700}

/* PAYWALL */
.pprev{position:relative;margin-bottom:4px}
.ppblur{filter:blur(5px);pointer-events:none;user-select:none;border:1px solid var(--border);padding:14px;background:var(--s2)}
.prow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}.prow:last-child{border-bottom:none}
.prl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}.prv{font-size:13px;font-weight:700;color:var(--white)}
.pmeal{background:var(--s3);padding:8px 10px;margin-top:5px}
.pmn{font-weight:700;font-size:11px;color:var(--white)}.pmc{font-size:10px;color:var(--faint);margin-top:1px}
.pwover{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,8,8,0) 0%,rgba(8,8,8,0.94) 28%,rgba(8,8,8,1) 55%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:16px}
.pwt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;text-align:center;margin-bottom:4px;letter-spacing:2px;text-transform:uppercase;color:var(--white)}
.pws{font-size:11px;color:var(--dim);text-align:center;margin-bottom:12px;line-height:1.5}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;width:100%}
.pc{border:1px solid var(--border);background:var(--s2);padding:11px 9px;cursor:pointer;transition:all .15s;text-align:center;position:relative}
.pc:hover{border-color:var(--red)}.pc.sel{border-color:var(--red);background:var(--red-bg)}
.popbdg{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--red);color:var(--white);font-size:8px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;white-space:nowrap}
.pp{font-size:10px;color:var(--dim);font-weight:600;margin-bottom:2px;letter-spacing:1px}
.pa{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--white)}.pa span{font-size:11px;font-family:'Barlow',sans-serif;font-weight:500;color:var(--dim)}
.ps{font-size:9px;color:var(--red);font-weight:700;margin-top:2px;min-height:12px;letter-spacing:.5px}
.tbdg{background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--red);padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px;width:100%}
.tbi{font-size:16px;flex-shrink:0}.tbt{font-size:11px;color:var(--dim);line-height:1.4}.tbt strong{color:var(--white)}
.flist{list-style:none;margin-bottom:10px;width:100%}
.flist li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);padding:3px 0}
.flist li::before{content:'→';color:var(--red);font-weight:900;font-size:11px;flex-shrink:0}
.bpay{width:100%;background:var(--red);color:var(--white);border:none;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;padding:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:7px;letter-spacing:3px;text-transform:uppercase}
.bpay:hover{background:var(--red-dark)}
.sec{font-size:10px;color:var(--faint);text-align:center;letter-spacing:.5px}
.ebox{background:var(--red-bg);border:1px solid var(--red-border);border-left:3px solid var(--red);padding:10px 12px;font-size:12px;color:#ff6b6b;margin-bottom:12px;display:none}

/* DASHBOARD */
.dhead{background:var(--s1);border-bottom:2px solid var(--red);padding:22px 24px 18px}
.dgreet{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;margin-bottom:2px;letter-spacing:1px;text-transform:uppercase}
.dsub{font-size:12px;color:var(--dim)}
.dnav{display:flex;gap:2px;padding:8px 16px;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto}
.dnav::-webkit-scrollbar{display:none}
.ntab{padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--faint);transition:all .15s;border:none;background:none;font-family:'Barlow',sans-serif;letter-spacing:1px;text-transform:uppercase}
.ntab:hover{color:var(--red)}.ntab.act{color:var(--white);border-bottom:2px solid var(--red)}
.dbody{padding:18px 20px}
.dsec{margin-bottom:18px}
.dstit{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--faint);margin-bottom:8px}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.stat{background:var(--s2);border:1px solid var(--border);padding:10px 12px}
.stl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);margin-bottom:2px}
.stv{font-size:15px;font-weight:700;color:var(--white)}
.mc{background:var(--s2);border:1px solid var(--border);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:9px}
.me{font-size:20px}.mi{flex:1}.mn{font-size:12px;font-weight:700;color:var(--white)}.mm{font-size:10px;color:var(--faint);margin-top:1px}
.mk{font-size:11px;font-weight:700;color:var(--red)}
.rrow{display:flex;gap:3px;margin-top:4px}
.star{font-size:14px;cursor:pointer;opacity:0.25;transition:opacity .12s}.star.on{opacity:1}
.wc{background:var(--red-bg);border:1px solid var(--red-border);border-left:3px solid var(--red);padding:12px 14px;margin-bottom:6px}
.wt{font-size:12px;font-weight:700;color:var(--red);margin-bottom:2px;letter-spacing:.5px;text-transform:uppercase}
.wd{font-size:12px;color:var(--dim);line-height:1.5}
.rc{background:var(--s2);border:1px solid var(--border);padding:11px 13px;margin-bottom:6px}
.rt{font-size:12px;font-weight:700;color:var(--white);margin-bottom:2px}.rd{font-size:11px;color:var(--faint);line-height:1.5}
.mbar-w{margin-bottom:9px}
.mbar-l{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;color:var(--dim)}
.mbar{height:3px;background:var(--s3)}
.mfill{height:3px;transition:width .5s}
.sbox{background:var(--s2);border:1px solid var(--border);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;margin-bottom:12px;cursor:pointer;position:relative;overflow:hidden}
.sframe{border:2px solid var(--red);width:54%;height:54%;position:relative}
.sline{position:absolute;left:0;right:0;height:1.5px;background:var(--red);top:0;animation:scan 2s ease-in-out infinite}
@keyframes scan{0%,100%{top:0}50%{top:100%}}
.stxt{color:rgba(255,255,255,0.4);font-size:11px;margin-top:9px;text-align:center;letter-spacing:1px;font-weight:600}
.sres{background:var(--red-bg);border:1px solid var(--red-border);border-left:3px solid var(--red);padding:12px 14px;margin-bottom:12px}
.srn{font-size:13px;font-weight:700;margin-bottom:2px;color:var(--white)}
.srm{font-size:11px;color:var(--dim)}
.fbdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;font-size:10px;font-weight:700;margin-top:4px;letter-spacing:.5px}
.fgood{background:rgba(0,200,100,.1);color:#00C864;border:1px solid rgba(0,200,100,.2)}.fbad{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.le{background:var(--s2);border:1px solid var(--border);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.lei{font-size:18px}.leinf{flex:1}.let{font-size:12px;font-weight:600;color:var(--white)}.leti{font-size:10px;color:var(--faint);margin-top:1px}
.lek{font-size:11px;font-weight:700;color:var(--red)}
.blog{width:100%;background:none;border:1px solid var(--border);color:var(--faint);font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:9px;cursor:pointer;margin-top:5px;letter-spacing:1px;text-transform:uppercase}
.blog:hover{border-color:var(--red);color:var(--red)}
.smg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.smi{background:var(--s2);border:1px solid var(--border);padding:11px 13px}
.sml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);margin-bottom:2px}
.smv{font-size:14px;font-weight:700;color:var(--white)}
.pbox{background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--red);padding:15px}
.pbox h4{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--red);margin-bottom:10px}
.pm{background:var(--s3);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:9px}.pm:last-child{margin-bottom:0}
.pme{font-size:19px}.pmi{flex:1}.pmn2{font-size:12px;font-weight:700;color:var(--white)}.pmm{font-size:10px;color:var(--faint);margin-top:1px}
.pmk{font-size:11px;font-weight:700;color:var(--red)}
.mlist{list-style:none}
.mlist li{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.5;color:var(--dim)}.mlist li:last-child{border-bottom:none}
.mnum{width:20px;height:20px;background:var(--red);color:var(--white);font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

@media(max-width:768px){
  .topbar{padding:0 14px;height:56px}
  .main{padding:16px 12px}
  .ch{padding:22px 20px 0}.cb{padding:16px 20px}.cf{padding:4px 20px 22px;flex-direction:column}
  .bbk,.bnx{width:100%}
  .irow,.tiles.c3,.tiles.c4{grid-template-columns:1fr 1fr}
  .smg,.pgrid,.sgrid{grid-template-columns:1fr 1fr}
  .dbody{padding:14px}
  .dhead{padding:18px 18px 14px}
}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="logo" onclick="step=1;render()">
      <span class="logo-name">PEAK</span>
      <div class="logo-line"></div>
      <span class="logo-brand">by MJ Performance</span>
    </div>
    <div class="pbar-wrap"><div class="pbar-track"><div class="pbar-fill" id="pb" style="width:0%"></div></div></div>
    <div class="topbar-r">
      <span class="slbl" id="sl">Step 1 of 8</span>
      <button class="lbtn" onclick="toggleLang()" id="lb">DE</button>
      <button class="loginbtn" onclick="showLogin()">Login</button>
    </div>
  </header>
  <main class="main"><div class="card" id="mc"></div></main>
</div>
<script>
const BACKEND='https://peak-backend-u52q.onrender.com';
let step=1,TOTAL=8,ud={},plan=null,selPlan='annual',lang='en';
let flog=[],mrat={},wrat={};

const T={en:{
  s1:'Your Profile',s1t:'Let\'s start with',s1e:'YOU',s1s:'4 minutes. The more honest you are, the better your plan.',
  fn:'First name',age:'Age',gen:'Gender',wt:'Current weight',dw:'Dream weight',ht:'Height',sl:'Sleep/night',
  s2:'Lifestyle',s2t:'How do you',s2e:'SPEND YOUR DAYS?',s2s:'PEAK factors in your whole life — not just workouts.',

    var p=fp();var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:'Recipe matching "'+mood+'" for goal:'+ud.goal+', ~'+Math.round(p.calories/3)+' kcal, ~'+Math.round(p.protein/3)+'g protein, allergies:'+(ud.al||[]).join(',')+', cooking:'+ud.cook+'. JSON only: {"name":"<n>","time":<min>,"kcal":<n>,"protein":<g>,"ingredients":["<i1>","<i2>","<i3>","<i4>","<i5>"],"steps":["<s1>","<s2>","<s3>"]}'}]})});
    var d=await res.json();var rec=JSON.parse((d.content[0].text||'{}').replace(/```json|```/g,'').trim());
    if(el)el.innerHTML='<div class="sres"><div class="srn">'+rec.name+'</div><div class="srm">'+rec.kcal+' kcal · '+rec.protein+'g protein · '+rec.time+' min</div><div style="margin-top:9px"><div style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--faint);margin-bottom:6px">INGREDIENTS</div>'+rec.ingredients.map(function(i){return '<div style="font-size:11px;padding:2px 0;color:var(--dim)">→ '+i+'</div>';}).join('')+'</div><div style="margin-top:9px"><div style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--faint);margin-bottom:6px">STEPS</div>'+rec.steps.map(function(s,i){return '<div style="display:flex;gap:7px;padding:3px 0;font-size:11px"><span style="color:var(--red);font-weight:900;flex-shrink:0">'+(i+1)+'.</span><span style="color:var(--dim)">'+s+'</span></div>';}).join('')+'</div></div>';
  }catch(e){if(el)el.innerHTML='<div class="ebox" style="display:block">Could not generate. Try again.</div>';}
}

function rateMeal(idx,score,el){
  mrat[idx]=score;
  var row=el.closest('.rrow');if(row)row.querySelectorAll('.star').forEach(function(s,i){s.style.opacity=i<score?1:0.2;});
  if(score<=1){setTimeout(function(){var b=document.createElement('div');b.className='aib';b.style.marginTop='8px';b.innerHTML='<div class="ailbl"><div class="aidot"></div>PEAK AI</div><p>Noted — removed from future suggestions. Finding better alternatives for you.</p>';var db=document.getElementById('db');if(db)db.appendChild(b);},300);}
  if(score>=4){setTimeout(function(){var b=document.createElement('div');b.className='aib';b.style.marginTop='8px';b.innerHTML='<div class="ailbl"><div class="aidot"></div>PEAK AI</div><p>Added to favourites. I\'ll include more like this in your plan.</p>';var db=document.getElementById('db');if(db)db.appendChild(b);},300);}
}
function rateWk(cat,score,el){wrat[cat]=score;var row=el.parentElement;if(row)row.querySelectorAll('span').forEach(function(s,i){s.style.opacity=i<score?1:0.2;});if(score>=4&&cat==='Effort')setTimeout(function(){alert('Intensity up next session. 💪');},200);if(score<=2&&cat==='Effort')setTimeout(function(){alert('Difficulty adjusted for next session.');},200);}

function showLogin(){
  document.getElementById('pb').style.width='0%';
  document.getElementById('sl').textContent='Login';
  card('<div class="ch"><div class="chip">✦ '+t('lt')+' '+t('le2')+'</div><div class="ctitle">'+t('lt')+' <em>'+t('le2')+'</em></div><p class="csub">'+t('ls2')+'</p></div><div class="cb"><div id="el2" class="ebox"></div><button class="bgoog"><svg width="15" height="15" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>'+t('gg')+'</button><div class="divider">or</div><div class="field"><label>'+t('ef')+'</label><input type="email" id="lem" placeholder="michael@example.com"></div><div class="field"><label>'+t('pf')+'</label><input type="password" id="lpw" placeholder="••••••••"></div></div><div class="cf"><button class="bnx" onclick="doLogin()" style="flex:1;letter-spacing:3px">'+t('lb2').toUpperCase()+' →</button></div><div style="padding:0 32px 20px;text-align:center;font-size:11px;color:var(--faint);letter-spacing:.5px">'+t('na')+' <span style="color:var(--red);cursor:pointer;font-weight:700" onclick="step=1;render()">'+t('sf')+'</span></div>');
}

function doLogin(){
  var em=document.getElementById('lem').value;
  if(!em){showE('el2','Please enter your email.');return;}
  ud.email=em;loadS();
  try{var sp=sessionStorage.getItem('pk_plan');if(sp)plan=JSON.parse(sp);}catch(e){}
  if(plan)showDash(fp());else fetchPlan().then(function(){showDash(fp());});
}
function logout(){plan=null;ud={};flog=[];mrat={};wrat={};try{sessionStorage.clear();}catch(e){}step=1;render();}
function showE(id,msg){var el=document.getElementById(id);if(el){el.textContent='⚠ '+msg;el.style.display='block';}}

function sel(el,key,val){el.closest('.tiles').querySelectorAll('.tile').forEach(function(t){t.classList.remove('sel');});el.classList.add('sel');ud[key]=val;}
function selSp(el,n){el.closest('.tiles').querySelectorAll('.stile').forEach(function(t){t.classList.remove('sel');});el.classList.add('sel');ud.sport=n;}
function sg(el,k){document.querySelectorAll('.gc').forEach(function(c){c.classList.remove('sel');});el.classList.add('sel');ud.goal=t(k);}
function tc(el,key,val){if(!ud[key])ud[key]=[];if(ud[key].includes(val)){ud[key]=ud[key].filter(function(v){return v!==val;});el.classList.remove('sel');}else{ud[key].push(val);el.classList.add('sel');}}

if(window.location.search.includes('session_id')){loadS();try{var sp=sessionStorage.getItem('pk_plan');if(sp)plan=JSON.parse(sp);}catch(e){}step=8;}
render();
</script>
