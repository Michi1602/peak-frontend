<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEAK — Your AI Life Coach</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F9F9F7;--white:#FFFFFF;--ink:#1C1C1A;--ink-light:#6B6B68;--ink-faint:#BDBDB8;--accent:#2D6A4F;--accent-light:#EAF4EE;--accent-mid:#52B788;--warn:#E76F51;--gold:#C8920A;--gold-light:#FDF6E3;--border:#E8E8E3;--shadow:0 4px 32px rgba(0,0,0,0.07)}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink)}.logo span{color:var(--accent)}
.progress-bar-wrap{flex:1;max-width:320px;margin:0 24px}
.progress-bar-track{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.5s ease}
.step-label{font-size:13px;color:var(--ink-light);font-weight:500;white-space:nowrap}
.main{display:flex;align-items:center;justify-content:center;padding:48px 24px;min-height:calc(100vh - 73px)}
.card{background:var(--white);border-radius:24px;box-shadow:var(--shadow);border:1px solid var(--border);width:100%;max-width:580px;overflow:hidden;animation:slideUp 0.4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:40px 44px 0}.card-body{padding:28px 44px}.card-footer{padding:4px 44px 36px;display:flex;align-items:center;gap:12px}
.step-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;padding:5px 12px;border-radius:100px;margin-bottom:14px}
.card-title{font-family:'DM Serif Display',serif;font-size:30px;line-height:1.2;margin-bottom:8px}.card-title em{font-style:italic;color:var(--accent)}
.card-sub{font-size:15px;color:var(--ink-light);line-height:1.65}
.field{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px}
input[type="text"],input[type="number"],input[type="email"]{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);background:var(--white);outline:none;transition:border-color 0.2s;appearance:none}
input:focus{border-color:var(--accent)}input::placeholder{color:var(--ink-faint)}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.unit-input{position:relative;display:flex;align-items:center}.unit-input input{padding-right:48px}
.unit-tag{position:absolute;right:14px;font-size:13px;font-weight:500;color:var(--ink-faint);pointer-events:none}
.tiles{display:grid;gap:9px}.tiles.cols-2{grid-template-columns:1fr 1fr}.tiles.cols-3{grid-template-columns:1fr 1fr 1fr}
.tile{border:1.5px solid var(--border);border-radius:13px;padding:13px 15px;cursor:pointer;transition:all 0.17s;display:flex;align-items:center;gap:10px;user-select:none}
.tile:hover{border-color:var(--accent-mid);background:var(--accent-light)}.tile.selected{border-color:var(--accent);background:var(--accent-light)}.tile.selected .tile-check{opacity:1}
.tile-icon{font-size:20px;flex-shrink:0}.tile-text{flex:1}.tile-label{font-size:14px;font-weight:600;line-height:1.2}.tile-desc{font-size:12px;color:var(--ink-light);margin-top:2px}
.tile-check{width:19px;height:19px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;opacity:0;transition:opacity 0.2s;flex-shrink:0}
.sport-tile{border:1.5px solid var(--border);border-radius:13px;padding:14px 10px;cursor:pointer;transition:all 0.17s;text-align:center;user-select:none}
.sport-tile:hover{border-color:var(--accent-mid);background:var(--accent-light)}.sport-tile.selected{border-color:var(--accent);background:var(--accent-light)}
.sport-emoji{font-size:26px;display:block;margin-bottom:5px}.sport-name{font-size:12px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border:1.5px solid var(--border);border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.17s;color:var(--ink);user-select:none}
.chip:hover{border-color:var(--accent-mid)}.chip.selected{background:var(--warn);border-color:var(--warn);color:#fff}.chip.cuisine-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.slider-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-light);margin-bottom:6px}
input[type="range"]{width:100%;height:4px;-webkit-appearance:none;background:var(--border);border-radius:4px;outline:none;border:none;padding:0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(45,106,79,.3);border:3px solid #fff}
.slider-value{text-align:center;font-size:22px;font-weight:600;color:var(--accent);margin-top:8px;font-family:'DM Serif Display',serif}
.ai-bubble{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:16px 16px 16px 4px;padding:16px 20px;margin-bottom:20px}
.ai-bubble-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-mid);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-bubble p{font-size:14px;line-height:1.65;color:var(--ink)}
.goal-card{border:1.5px solid var(--border);border-radius:13px;padding:14px 16px;cursor:pointer;transition:all 0.17s;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.goal-card:hover{border-color:var(--accent-mid);background:var(--accent-light)}.goal-card.selected{border-color:var(--accent);background:var(--accent-light)}.goal-card.selected .goal-radio{background:var(--accent);border-color:var(--accent)}.goal-card.selected .goal-radio::after{opacity:1}
.goal-emoji{font-size:24px}.goal-info{flex:1}.goal-title{font-size:15px;font-weight:600}.goal-desc{font-size:13px;color:var(--ink-light);margin-top:2px}
.goal-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);position:relative;transition:all 0.2s;flex-shrink:0}
.goal-radio::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:#fff;opacity:0;transition:opacity 0.2s}
.btn-back{background:none;border:1.5px solid var(--border);color:var(--ink-light);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:12px 20px;border-radius:12px;cursor:pointer;transition:all 0.17s;flex-shrink:0}
.btn-back:hover{border-color:var(--ink-light);color:var(--ink)}
.btn-next{flex:1;background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:14px 24px;border-radius:12px;cursor:pointer;transition:all 0.17s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-next:hover{background:#235C41;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,106,79,.25)}
.loading-wrap{padding:60px 44px;text-align:center}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);margin-bottom:8px}.loading-sub{font-size:14px;color:var(--ink-light)}
.loading-step{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--ink-faint);transition:color 0.3s}
.loading-step.done{color:var(--accent)}.loading-step.active{color:var(--ink);font-weight:500}
.plan-preview{position:relative;margin-bottom:4px}
.plan-preview-blur{filter:blur(5px);pointer-events:none;user-select:none;border:1px solid var(--border);border-radius:16px;padding:18px;background:var(--bg)}
.preview-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}.preview-row:last-child{border-bottom:none}
.preview-label{font-size:13px;color:var(--ink-light)}.preview-val{font-size:15px;font-weight:600}
.preview-meal{background:var(--white);border-radius:10px;padding:11px 13px;margin-top:7px}
.preview-meal-name{font-weight:600;font-size:14px}.preview-meal-macro{font-size:12px;color:var(--ink-light);margin-top:2px}
.paywall-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(249,249,247,0) 0%,rgba(249,249,247,0.9) 28%,rgba(249,249,247,1) 55%);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:20px}
.lock-icon{font-size:28px;margin-bottom:10px}.paywall-title{font-family:'DM Serif Display',serif;font-size:22px;text-align:center;margin-bottom:6px}
.paywall-sub{font-size:13px;color:var(--ink-light);text-align:center;margin-bottom:18px;line-height:1.5}
.pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;width:100%}
.price-card{border:1.5px solid var(--border);border-radius:14px;padding:16px 14px;cursor:pointer;transition:all 0.2s;text-align:center;position:relative}
.price-card:hover{border-color:var(--accent-mid)}.price-card.selected{border-color:var(--accent);background:var(--accent-light)}
.popular-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 10px;border-radius:100px;white-space:nowrap}
.price-period{font-size:12px;color:var(--ink-light);font-weight:500;margin-bottom:4px}
.price-amount{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink)}.price-amount span{font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--ink-light)}
.price-saving{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px;min-height:16px}
.trial-badge{background:var(--gold-light);border:1px solid #F0D080;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;width:100%}
.trial-badge-icon{font-size:20px;flex-shrink:0}.trial-badge-text{font-size:13px;color:var(--ink);line-height:1.4}.trial-badge-text strong{color:var(--gold)}
.features-mini{list-style:none;margin-bottom:14px;width:100%}
.features-mini li{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);padding:4px 0}
.features-mini li::before{content:'✓';color:var(--accent);font-weight:700;font-size:12px;flex-shrink:0}
.btn-pay{width:100%;background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;padding:16px 24px;border-radius:14px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-pay:hover{background:#235C41;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,106,79,.3)}
.secure-note{font-size:12px;color:var(--ink-faint);text-align:center}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.summary-item{background:var(--bg);border-radius:12px;padding:14px 16px;border:1px solid var(--border)}
.summary-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:4px}.summary-value{font-size:16px;font-weight:600;color:var(--ink)}
.plan-revealed{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:16px;padding:20px}
.plan-revealed h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:14px}
.plan-meal{background:var(--white);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}.plan-meal:last-child{margin-bottom:0}
.plan-meal-emoji{font-size:22px}.plan-meal-info{flex:1}.plan-meal-name{font-size:14px;font-weight:600}.plan-meal-macro{font-size:12px;color:var(--ink-light);margin-top:2px}
.plan-meal-kcal{font-size:13px;font-weight:600;color:var(--accent)}
.milestone-list{list-style:none}.milestone-list li{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.5}.milestone-list li:last-child{border-bottom:none}
.milestone-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.error-box{background:#FEF0EC;border:1px solid #F4C5B5;border-radius:12px;padding:14px 16px;font-size:13px;color:#C0392B;margin-bottom:16px;display:none}
@media(max-width:600px){
  .topbar{padding:14px 20px}.progress-bar-wrap{max-width:140px;margin:0 12px}
  .main{padding:24px 16px}.card-header{padding:28px 24px 0}.card-body{padding:20px 24px}
  .card-footer{padding:4px 24px 28px;flex-direction:column}.btn-back,.btn-next{width:100%}
  .input-row,.tiles.cols-3{grid-template-columns:1fr 1fr}.summary-grid,.pricing-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="logo">PEAK<span>.</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div></div>
    <div class="step-label" id="stepLabel">Step 1 of 7</div>
  </header>
  <main class="main"><div class="card" id="mainCard"></div></main>
</div>
<script>
const BACKEND = 'https://peak-backend-u52q.onrender.com';
let step=1,TOTAL=7,ud={},aiPlan=null,selectedPlan='annual';

function setProgress(s,t){document.getElementById('progressFill').style.width=((s-1)/(t-1)*100)+'%';document.getElementById('stepLabel').textContent=s<=t?'Step '+s+' of '+t:'Almost there!';}
function render(){setProgress(step,TOTAL);var c=document.getElementById('mainCard');c.style.animation='none';c.offsetHeight;c.style.animation='slideUp 0.38s ease';({1:s1,2:s2,3:s3,4:s4,5:s5,6:s6,7:s7})[step]();}
function card(h){document.getElementById('mainCard').innerHTML=h;}
function footer(label,fn,back){back=back===undefined?true:back;return '<div class="card-footer">'+(back&&step>1?'<button class="btn-back" onclick="step--;render()">← Back</button>':'')+'<button class="btn-next" onclick="('+fn.toString()+')()">'+label+' →</button></div>';}

function s1(){card('<div class="card-header"><div class="step-chip">✦ Your Profile</div><h2 class="card-title">Let\'s start with <em>you</em></h2><p class="card-sub">Takes about 3 minutes. The more honest you are, the better your plan.</p></div><div class="card-body"><div class="input-row"><div class="field"><label>First name</label><input id="fname" placeholder="Alex" value="'+(ud.name||'')+'"></div><div class="field"><label>Age</label><input type="number" id="age" placeholder="28" value="'+(ud.age||'')+'"></div></div><div class="field"><label>Gender</label><div class="tiles cols-3">'+['Male','Female','Other'].map(function(g){return '<div class="tile '+(ud.gender===g?'selected':'')+'" onclick="sel(this,\'gender\',\''+g+'\')"><span class="tile-label">'+g+'</span><span class="tile-check">✓</span></div>';}).join('')+'</div></div><div class="input-row"><div class="field"><label>Current weight</label><div class="unit-input"><input type="number" id="weight" placeholder="78" value="'+(ud.weight||'')+'"><span class="unit-tag">kg</span></div></div><div class="field"><label>Dream weight</label><div class="unit-input"><input type="number" id="dreamWeight" placeholder="70" value="'+(ud.dreamWeight||'')+'"><span class="unit-tag">kg</span></div></div></div><div class="input-row"><div class="field"><label>Height</label><div class="unit-input"><input type="number" id="height" placeholder="175" value="'+(ud.height||'')+'"><span class="unit-tag">cm</span></div></div><div class="field"><label>Sleep per night</label><div class="unit-input"><input type="number" id="sleep" placeholder="7" value="'+(ud.sleep||'')+'"><span class="unit-tag">hrs</span></div></div></div></div>'+footer('Continue',function(){ud.name=document.getElementById('fname').value;ud.age=document.getElementById('age').value;ud.weight=document.getElementById('weight').value;ud.dreamWeight=document.getElementById('dreamWeight').value;ud.height=document.getElementById('height').value;ud.sleep=document.getElementById('sleep').value;if(!ud.name||!ud.age||!ud.weight){alert('Please fill in your name, age and weight.');return;}step++;render();},false));}

function s2(){card('<div class="card-header"><div class="step-chip">✦ Lifestyle</div><h2 class="card-title">How do you <em>spend your days?</em></h2><p class="card-sub">PEAK factors in your whole life — not just your workouts.</p></div><div class="card-body"><div class="field"><label>Job type</label><div class="tiles">'+[{i:'💻',l:'Desk job',d:'Mostly sitting'},{i:'🔧',l:'Physical job',d:'On your feet all day'},{i:'🔄',l:'Mixed',d:'Varies day to day'},{i:'🌙',l:'Shift work',d:'Irregular hours'}].map(function(j){return '<div class="tile '+(ud.job===j.l?'selected':'')+'" onclick="sel(this,\'job\',\''+j.l+'\')"><span class="tile-icon">'+j.i+'</span><span class="tile-text"><span class="tile-label">'+j.l+'</span><span class="tile-desc">'+j.d+'</span></span><span class="tile-check">✓</span></div>';}).join('')+'</div></div><div class="field"><label>Daily commute</label><div class="tiles cols-2">'+[{i:'🚗',l:'Car'},{i:'🚌',l:'Bus / Train'},{i:'🚶',l:'Walking'},{i:'🚲',l:'Cycling'}].map(function(c){return '<div class="tile '+(ud.commute===c.l?'selected':'')+'" onclick="sel(this,\'commute\',\''+c.l+'\')"><span class="tile-icon">'+c.i+'</span><span class="tile-label">'+c.l+'</span><span class="tile-check">✓</span></div>';}).join('')+'</div></div><div class="field"><label>Daily stress level</label><div class="slider-labels"><span>Very calm</span><span>Moderate</span><span>Very stressed</span></div><input type="range" id="stress" min="1" max="10" value="'+(ud.stress||5)+'" oninput="document.getElementById(\'sv\').textContent=this.value"><div class="slider-value" id="sv">'+(ud.stress||5)+'<span style="font-size:14px;color:var(--ink-light);font-family:\'DM Sans\'">/10</span></div></div></div>'+footer('Continue',function(){ud.stress=document.getElementById('stress').value;if(!ud.job){alert('Please select your job type.');return;}step++;render();}));}

function s3(){var sports=[{e:'🏃',n:'Running'},{e:'🏋️',n:'Weights'},{e:'⚽',n:'Football'},{e:'🚴',n:'Cycling'},{e:'🏊',n:'Swimming'},{e:'🧘',n:'Yoga'},{e:'🥊',n:'Martial Arts'},{e:'🏀',n:'Basketball'},{e:'🏌️',n:'Golf'}];card('<div class="card-header"><div class="step-chip">✦ Fitness</div><h2 class="card-title">What\'s your <em>favourite sport?</em></h2><p class="card-sub">PEAK builds workouts specifically for your chosen activity.</p></div><div class="card-body"><div class="field"><div class="tiles cols-3">'+sports.map(function(s){return '<div class="sport-tile '+(ud.sport===s.n?'selected':'')+'" onclick="selSport(this,\''+s.n+'\')"><span class="sport-emoji">'+s.e+'</span><span class="sport-name">'+s.n+'</span></div>';}).join('')+'</div></div><div class="field"><label>Current level</label><div class="tiles cols-3">'+['Beginner','Intermediate','Advanced'].map(function(l){return '<div class="tile '+(ud.level===l?'selected':'')+'" onclick="sel(this,\'level\',\''+l+'\')"><span class="tile-label">'+l+'</span><span class="tile-check">✓</span></div>';}).join('')+'</div></div><div class="input-row"><div class="field"><label>Sessions/week</label><div class="unit-input"><input type="number" id="sessions" placeholder="3" value="'+(ud.sessions||'')+'"><span class="unit-tag">×</span></div></div><div class="field"><label>Time/session</label><div class="unit-input"><input type="number" id="duration" placeholder="60" value="'+(ud.duration||'')+'"><span class="unit-tag">min</span></div></div></div><div class="field"><label>Where do you train?</label><div class="tiles cols-3">'+[{i:'🏋️',l:'Gym'},{i:'🏠',l:'Home'},{i:'🌳',l:'Outdoors'}].map(function(e){return '<div class="tile '+(ud.equipment===e.l?'selected':'')+'" onclick="sel(this,\'equipment\',\''+e.l+'\')"><span class="tile-icon">'+e.i+'</span><span class="tile-label">'+e.l+'</span><span class="tile-check">✓</span></div>';}).join('')+'</div></div></div>'+footer('Continue',function(){ud.sessions=document.getElementById('sessions').value;ud.duration=document.getElementById('duration').value;if(!ud.sport||!ud.level){alert('Please pick a sport and your level.');return;}step++;render();}));}

function s4(){var allergies=['Gluten','Dairy','Nuts','Shellfish','Eggs','Soy','Fish','Pork'];var cuisines=['🇲🇽 Mexican','🍝 Italian','🍜 Asian','🥗 Mediterranean','🍔 American','🍛 Indian','🇯🇵 Japanese','🥙 Middle Eastern'];card('<div class="card-header"><div class="step-chip">✦ Nutrition</div><h2 class="card-title">Tell me about <em>food</em></h2><p class="card-sub">PEAK never suggests anything you cannot eat or do not enjoy.</p></div><div class="card-body"><div class="field"><label>Allergies <span style="font-weight:400;color:var(--ink-faint)">(tap all that apply)</span></label><div class="chips">'+allergies.map(function(a){return '<div class="chip '+((ud.allergies||[]).includes(a)?'selected':'')+'" onclick="toggleChip(this,\'allergies\',\''+a+'\')">'+a+'</div>';}).join('')+'<div class="chip" onclick="ud.allergies=[]">✕ None</div></div></div><div class="field"><label>Favourite cuisines</label><div class="chips">'+cuisines.map(function(c){return '<div class="chip cuisine-chip '+((ud.cuisines||[]).includes(c)?'selected':'')+'" onclick="toggleChip(this,\'cuisines\',\''+c+'\')">'+c+'</div>';}).join('')+'</div></div><div class="field"><label>Cooking skill</label><div class="tiles">'+[{i:'🔰',l:'Beginner',d:'Simple recipes, quick prep'},{i:'🍳',l:'Intermediate',d:'Comfortable in the kitchen'},{i:'👨‍🍳',l:'Advanced',d:'I enjoy complex cooking'}].map(function(s){return '<div class="tile '+(ud.cook===s.l?'selected':'')+'" onclick="sel(this,\'cook\',\''+s.l+'\')"><span class="tile-icon">'+s.i+'</span><span class="tile-text"><span class="tile-label">'+s.l+'</span><span class="tile-desc">'+s.d+'</span></span><span class="tile-check">✓</span></div>';}).join('')+'</div></div></div>'+footer('Continue',function(){if(!ud.cook){alert('Please select your cooking level.');return;}step++;render();}));}

function s5(){var goals=[{e:'⚖️',t:'Lose weight',d:'Reduce body fat, reach my dream weight'},{e:'💪',t:'Build muscle',d:'Get stronger and add lean mass'},{e:'🏃',t:'Improve performance',d:'Get faster or fitter in my sport'},{e:'🥗',t:'Eat cleaner',d:'Build better nutrition habits long-term'},{e:'🔋',t:'Recover better',d:'Sleep deeper, stress less, feel amazing'},{e:'🧘',t:'Build daily habits',d:'Consistency across nutrition and movement'}];var diff=ud.weight&&ud.dreamWeight?(parseFloat(ud.weight)-parseFloat(ud.dreamWeight)).toFixed(1):null;card('<div class="card-header"><div class="step-chip">✦ Your Goal</div><h2 class="card-title">What do you want to <em>achieve?</em></h2></div><div class="card-body"><div class="ai-bubble"><div class="ai-bubble-label"><div class="ai-dot"></div>PEAK AI</div><p>Hi '+(ud.name||'there')+'! I\'ve analysed your profile'+(diff>0?' — including your goal to lose '+diff+'kg':'')+'  and I\'m ready to build your plan. What matters most to you right now?</p></div>'+goals.map(function(g){return '<div class="goal-card '+(ud.goal===g.t?'selected':'')+'" onclick="selGoal(this,\''+g.t+'\')"><span class="goal-emoji">'+g.e+'</span><div class="goal-info"><div class="goal-title">'+g.t+'</div><div class="goal-desc">'+g.d+'</div></div><div class="goal-radio"></div></div>';}).join('')+'</div>'+footer('Build my plan',function(){if(!ud.goal){alert('Please select your primary goal.');return;}showAILoading();}));}

function showAILoading(){card('<div class="loading-wrap"><div class="spinner"></div><div class="loading-title">Building your personal plan...</div><div class="loading-sub">This is unique to you — nobody else gets this exact plan.</div><div style="margin-top:28px;text-align:left">'+[['🧬','Calculating your calorie targets'],['🥗','Selecting recipes for your taste'],['💪','Building your '+(ud.sport||'fitness')+' programme'],['🔋','Designing your recovery protocol'],['✨','Finalising your roadmap']].map(function(l,i){return '<div class="loading-step" id="ls'+i+'"><span style="width:20px;text-align:center">'+l[0]+'</span> '+l[1]+'</div>';}).join('')+'</div></div>');var i=0;var t=setInterval(function(){if(i>0)document.getElementById('ls'+(i-1)).className='loading-step done';if(i<5){document.getElementById('ls'+i).className='loading-step active';i++;}else{clearInterval(t);fetchAIPlan().then(function(){step=6;render();});}},700);}

async function fetchAIPlan(){var bmr=ud.weight&&ud.height&&ud.age?Math.round(88.362+13.397*parseFloat(ud.weight)+4.799*parseFloat(ud.height)-5.677*parseFloat(ud.age)):1800;var mult=ud.job==='Physical job'?1.725:parseFloat(ud.sessions||3)>=5?1.55:1.375;var tdee=Math.round(bmr*mult);var kcal=ud.goal==='Lose weight'?tdee-400:ud.goal==='Build muscle'?tdee+250:tdee;var prompt='You are PEAK, a personal AI health coach. Generate a personalised plan.\nUSER: Name:'+ud.name+', Age:'+ud.age+', Weight:'+ud.weight+'kg→'+ud.dreamWeight+'kg, Height:'+ud.height+'cm, Sleep:'+ud.sleep+'hrs, Job:'+ud.job+', Stress:'+ud.stress+'/10, Sport:'+ud.sport+'('+ud.level+'), '+ud.sessions+'x/week at '+(ud.equipment||'gym')+'\nAllergies:'+(ud.allergies||[]).join(',')+ ', Cuisines:'+(ud.cuisines||[]).join(',')+', Cooking:'+ud.cook+', Goal:'+ud.goal+', Calories:'+kcal+'\nRespond ONLY with JSON no markdown: {"headline":"<12 word headline>","calories":'+kcal+',"protein":<g>,"timeline":"<e.g. 12 weeks>","todayMeals":[{"emoji":"🍳","name":"<n>","time":"Breakfast","kcal":<n>,"macro":"<e.g. 38g protein>"},{"emoji":"🥗","name":"<n>","time":"Lunch","kcal":<n>,"macro":"<e.g. 42g protein>"},{"emoji":"🍽️","name":"<n>","time":"Dinner","kcal":<n>,"macro":"<e.g. 35g protein>"}],"workout":"<one sentence>","recovery":"<one tip>","milestones":["<wk3-4>","<wk6-8>","<final>"]}';
try{var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});var d=await r.json();aiPlan=JSON.parse((d.content[0].text||'{}').replace(/```json|```/g,'').trim());}
catch(e){var k=ud.goal==='Lose weight'?1800:ud.goal==='Build muscle'?2400:2100;aiPlan={headline:'Your '+ud.sport+' transformation starts today',calories:k,protein:Math.round(parseFloat(ud.weight||75)*1.8),timeline:ud.goal==='Lose weight'&&ud.weight&&ud.dreamWeight?Math.ceil(Math.abs(parseFloat(ud.weight)-parseFloat(ud.dreamWeight))/0.5)+' weeks':'12 weeks',todayMeals:[{emoji:'🍳',name:'Scrambled eggs with avocado toast',time:'Breakfast',kcal:420,macro:'28g protein'},{emoji:'🥗',name:'Grilled chicken & quinoa bowl',time:'Lunch',kcal:550,macro:'45g protein'},{emoji:'🍽️',name:'Salmon with roasted vegetables',time:'Dinner',kcal:620,macro:'40g protein'}],workout:(ud.sessions||3)+' sessions this week — starting with a '+(ud.level||'beginner')+'-level '+(ud.sport||'training')+' session today.',recovery:'Prioritise 7-8hrs sleep tonight for best recovery.',milestones:['Week 3 — Habits forming. Energy improving.','Week 7 — Visible progress.','Week 12 — Goal reached.']};}}

function s6(){setProgress(7,TOTAL);document.getElementById('stepLabel').textContent='Almost there!';var p=aiPlan;card('<div class="card-header"><div class="step-chip">✦ Your Plan is Ready</div><h2 class="card-title">Your plan is ready, <em>'+(ud.name||'there')+'</em></h2><p class="card-sub">'+p.headline+'</p></div><div class="card-body"><div class="plan-preview"><div class="plan-preview-blur"><div class="preview-row"><span class="preview-label">Daily calories</span><span class="preview-val">'+p.calories+' kcal</span></div><div class="preview-row"><span class="preview-label">Daily protein</span><span class="preview-val">'+p.protein+'g</span></div><div class="preview-row"><span class="preview-label">Timeline</span><span class="preview-val">'+p.timeline+'</span></div><div style="margin-top:10px">'+p.todayMeals.map(function(m){return '<div class="preview-meal"><div class="preview-meal-name">'+m.emoji+' '+m.name+'</div><div class="preview-meal-macro">'+m.time+' · '+m.kcal+' kcal · '+m.macro+'</div></div>';}).join('')+'</div></div><div class="paywall-overlay"><div class="lock-icon">🔒</div><div class="paywall-title">Unlock your full plan</div><div class="paywall-sub">Your meals, workouts and recovery protocol are ready.<br>Start free — no charge for 7 days.</div><div class="trial-badge"><div class="trial-badge-icon">🎁</div><div class="trial-badge-text"><strong>7 days completely free.</strong> We remind you on Day 5 and Day 6. Cancel anytime.</div></div><div class="pricing-grid"><div class="price-card '+(selectedPlan==='monthly'?'selected':'')+'" onclick="selPlan(\'monthly\',this)"><div class="price-period">Monthly</div><div class="price-amount">€19<span>.99/mo</span></div><div class="price-saving" style="visibility:hidden">—</div></div><div class="price-card '+(selectedPlan==='annual'?'selected':'')+'" onclick="selPlan(\'annual\',this)"><div class="popular-badge">Most popular</div><div class="price-period">Annual</div><div class="price-amount">€9<span>.99/mo</span></div><div class="price-saving">Save 50% · €119/yr</div></div></div><ul class="features-mini"><li>Full AI meal plan + recipes + shopping list</li><li>Personalised '+(ud.sport||'fitness')+' workout programme</li><li>Recovery guide + smart daily reminders</li><li>Live shopping mode + restaurant menu scanner</li><li>Real-time adaptation from your ratings</li></ul><button class="btn-pay" onclick="showPayment()">🚀 Start 7-day free trial</button><div class="secure-note">🔒 Secure · No charge today · Cancel anytime</div></div></div></div>');}

function showPayment(){card('<div class="card-header"><div class="step-chip">✦ Start Free Trial</div><h2 class="card-title">One step from your <em>results</em></h2><p class="card-sub">7 days free. '+(selectedPlan==='annual'?'Then €119/year.':'Then €19.99/month.')+'  Cancel anytime.</p></div><div class="card-body"><div class="trial-badge" style="margin-bottom:20px"><div class="trial-badge-icon">✅</div><div class="trial-badge-text">You will <strong>not be charged today.</strong> We remind you on Day 5 and Day 6 before any charge.</div></div><div id="errorBox" class="error-box"></div><div class="field"><label>Email address</label><input type="email" id="email" placeholder="alex@example.com" value="'+(ud.email||'')+'"></div></div><div class="card-footer"><button class="btn-back" onclick="step=6;render()">← Back</button><button class="btn-next" id="payBtn" onclick="processPayment()">🔒 Continue to payment →</button></div>');}

async function processPayment(){var email=document.getElementById('email').value;if(!email){alert('Please enter your email.');return;}ud.email=email;var btn=document.getElementById('payBtn');var errBox=document.getElementById('errorBox');btn.textContent='Loading...';btn.style.opacity='0.7';btn.onclick=null;errBox.style.display='none';

function s7(){document.getElementById('progressFill').style.width='100%';document.getElementById('stepLabel').textContent='🎉 Plan unlocked!';var p=aiPlan;card('<div style="padding:44px"><div style="font-size:52px;text-align:center;margin-bottom:16px">🎉</div><div style="font-family:\'DM Serif Display\',serif;font-size:28px;text-align:center;margin-bottom:8px">Welcome to PEAK, '+(ud.name||'there')+'!</div><p style="font-size:15px;color:var(--ink-light);line-height:1.65;text-align:center;margin-bottom:24px">Your 7-day free trial has started. Here is your personalised plan for today.</p><div class="summary-grid"><div class="summary-item"><div class="summary-label">Daily Target</div><div class="summary-value">'+p.calories+' kcal</div></div><div class="summary-item"><div class="summary-label">Protein Goal</div><div class="summary-value">'+p.protein+'g</div></div><div class="summary-item"><div class="summary-label">Timeline</div><div class="summary-value">'+p.timeline+'</div></div><div class="summary-item"><div class="summary-label">Sport</div><div class="summary-value">'+ud.sport+'</div></div></div><div class="plan-revealed"><h4>🍽️ Today\'s Meals</h4>'+p.todayMeals.map(function(m){return '<div class="plan-meal"><span class="plan-meal-emoji">'+m.emoji+'</span><div class="plan-meal-info"><div class="plan-meal-name">'+m.name+'</div><div class="plan-meal-macro">'+m.time+' · '+m.macro+'</div></div><span class="plan-meal-kcal">'+m.kcal+' kcal</span></div>';}).join('')+'</div><div class="ai-bubble" style="margin-top:16px"><div class="ai-bubble-label"><div class="ai-dot"></div>PEAK AI</div><p><strong>Today\'s workout:</strong> '+p.workout+'</p><p style="margin-top:8px"><strong>Recovery tip:</strong> '+p.recovery+'</p></div><div style="margin-top:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:10px">Your milestones</div><ul class="milestone-list">'+p.milestones.map(function(m,i){return '<li><div class="milestone-num">'+(i+1)+'</div><span>'+m+'</span></li>';}).join('')+'</ul></div></div>');}

function sel(el,key,val){el.closest('.tiles').querySelectorAll('.tile').forEach(function(t){t.classList.remove('selected');});el.classList.add('selected');ud[key]=val;}
function selSport(el,n){el.closest('.tiles').querySelectorAll('.sport-tile').forEach(function(t){t.classList.remove('selected');});el.classList.add('selected');ud.sport=n;}
function selGoal(el,t){document.querySelectorAll('.goal-card').forEach(function(c){c.classList.remove('selected');});el.classList.add('selected');ud.goal=t;}
function toggleChip(el,key,val){if(!ud[key])ud[key]=[];if(ud[key].includes(val)){ud[key]=ud[key].filter(function(v){return v!==val;});el.classList.remove('selected');}else{ud[key].push(val);el.classList.add('selected');}}

// Check if returning from Stripe success
if(window.location.search.includes('session_id')){step=7;aiPlan=aiPlan||{headline:'Welcome to PEAK!',calories:2000,protein:150,timeline:'12 weeks',todayMeals:[{emoji:'🍳',name:'Scrambled eggs with avocado',time:'Breakfast',kcal:420,macro:'28g protein'},{emoji:'🥗',name:'Chicken & quinoa bowl',time:'Lunch',kcal:550,macro:'45g protein'},{emoji:'🍽️',name:'Salmon with vegetables',time:'Dinner',kcal:620,macro:'40g protein'}],workout:'Great start — check your full workout plan inside the app.',recovery:'Sleep 7-8hrs tonight to maximise your first day of recovery.',milestones:['Week 3 — Habits forming.','Week 7 — Visible progress.','Week 12 — Goal reached.']};}
render();
