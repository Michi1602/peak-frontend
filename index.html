<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEAK — Your AI Life Coach</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F9F9F7;--white:#fff;--ink:#1C1C1A;--ink-light:#6B6B68;--ink-faint:#BDBDB8;--accent:#2D6A4F;--accent-light:#EAF4EE;--accent-mid:#52B788;--warn:#E76F51;--gold:#C8920A;--gold-light:#FDF6E3;--border:#E8E8E3;--shadow:0 4px 32px rgba(0,0,0,0.07)}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;gap:12px}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);flex-shrink:0}.logo span{color:var(--accent)}
.progress-bar-wrap{flex:1;max-width:280px}
.progress-bar-track{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.5s ease}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.step-label{font-size:13px;color:var(--ink-light);font-weight:500;white-space:nowrap}
.lang-btn{font-size:12px;color:var(--ink-light);cursor:pointer;padding:5px 9px;border:1px solid var(--border);border-radius:7px;background:none;font-family:'DM Sans',sans-serif;transition:all 0.17s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.login-btn{font-size:13px;color:var(--accent);font-weight:600;cursor:pointer;padding:7px 14px;border:1.5px solid var(--accent);border-radius:9px;background:none;font-family:'DM Sans',sans-serif;transition:all 0.17s}
.login-btn:hover{background:var(--accent-light)}
.main{display:flex;align-items:flex-start;justify-content:center;padding:36px 20px;min-height:calc(100vh - 70px)}
.card{background:var(--white);border-radius:22px;box-shadow:var(--shadow);border:1px solid var(--border);width:100%;max-width:620px;overflow:hidden;animation:slideUp 0.38s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:34px 40px 0}.card-body{padding:22px 40px}.card-footer{padding:4px 40px 30px;display:flex;align-items:center;gap:10px}
.step-chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:4px 11px;border-radius:100px;margin-bottom:12px}
.card-title{font-family:'DM Serif Display',serif;font-size:27px;line-height:1.2;margin-bottom:6px}.card-title em{font-style:italic;color:var(--accent)}
.card-sub{font-size:14px;color:var(--ink-light);line-height:1.6}
.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
input[type="text"],input[type="number"],input[type="email"],input[type="password"],textarea,select{width:100%;padding:12px 15px;border:1.5px solid var(--border);border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--white);outline:none;transition:border-color 0.2s;appearance:none}
input:focus,textarea:focus{border-color:var(--accent)}input::placeholder,textarea::placeholder{color:var(--ink-faint)}
textarea{resize:vertical;min-height:72px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.unit-input{position:relative;display:flex;align-items:center}.unit-input input{padding-right:44px}
.unit-tag{position:absolute;right:13px;font-size:12px;font-weight:500;color:var(--ink-faint);pointer-events:none}
.tiles{display:grid;gap:8px}.tiles.c2{grid-template-columns:1fr 1fr}.tiles.c3{grid-template-columns:1fr 1fr 1fr}.tiles.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.tile{border:1.5px solid var(--border);border-radius:11px;padding:11px 13px;cursor:pointer;transition:all 0.16s;display:flex;align-items:center;gap:8px;user-select:none}
.tile:hover{border-color:var(--accent-mid);background:var(--accent-light)}.tile.sel{border-color:var(--accent);background:var(--accent-light)}.tile.sel .tck{opacity:1}
.ti{font-size:18px;flex-shrink:0}.tt{flex:1}.tl{font-size:13px;font-weight:600;line-height:1.2}.td{font-size:11px;color:var(--ink-light);margin-top:2px}
.tck{width:17px;height:17px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;opacity:0;transition:opacity 0.2s;flex-shrink:0}
.sport-tile{border:1.5px solid var(--border);border-radius:11px;padding:12px 8px;cursor:pointer;transition:all 0.16s;text-align:center;user-select:none}
.sport-tile:hover{border-color:var(--accent-mid);background:var(--accent-light)}.sport-tile.sel{border-color:var(--accent);background:var(--accent-light)}
.se{font-size:22px;display:block;margin-bottom:3px}.sn{font-size:11px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border:1.5px solid var(--border);border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.16s;color:var(--ink);user-select:none}
.chip:hover{border-color:var(--accent-mid)}.chip.sel{background:var(--warn);border-color:var(--warn);color:#fff}
.chip.dc.sel,.chip.cc.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-light);margin-bottom:5px}
input[type="range"]{width:100%;height:4px;-webkit-appearance:none;background:var(--border);border-radius:4px;outline:none;border:none;padding:0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(45,106,79,.3);border:3px solid #fff}
.sv{text-align:center;font-size:19px;font-weight:600;color:var(--accent);margin-top:5px;font-family:'DM Serif Display',serif}
.btn-back{background:none;border:1.5px solid var(--border);color:var(--ink-light);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 16px;border-radius:10px;cursor:pointer;transition:all 0.16s;flex-shrink:0}
.btn-back:hover{border-color:var(--ink-light);color:var(--ink)}
.btn-next{flex:1;background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:12px 20px;border-radius:10px;cursor:pointer;transition:all 0.16s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-next:hover{background:#235C41;transform:translateY(-1px);box-shadow:0 5px 18px rgba(45,106,79,.25)}
.btn-google{width:100%;background:var(--white);color:var(--ink);border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:12px 20px;border-radius:10px;cursor:pointer;transition:all 0.16s;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:10px}
.btn-google:hover{border-color:var(--accent-mid);background:var(--accent-light)}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--ink-faint);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.ai-bubble{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:14px 14px 14px 4px;padding:13px 17px;margin-bottom:16px}
.ai-lbl{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-mid);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-bubble p{font-size:13px;line-height:1.6;color:var(--ink)}
.goal-card{border:1.5px solid var(--border);border-radius:11px;padding:12px 14px;cursor:pointer;transition:all 0.16s;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.goal-card:hover{border-color:var(--accent-mid);background:var(--accent-light)}.goal-card.sel{border-color:var(--accent);background:var(--accent-light)}.goal-card.sel .gr{background:var(--accent);border-color:var(--accent)}.goal-card.sel .gr::after{opacity:1}
.ge{font-size:22px}.gi{flex:1}.gt{font-size:14px;font-weight:600}.gd{font-size:12px;color:var(--ink-light);margin-top:2px}
.gr{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);position:relative;transition:all 0.2s;flex-shrink:0}
.gr::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:#fff;opacity:0;transition:opacity 0.2s}
.loading-wrap{padding:52px 40px;text-align:center}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:'DM Serif Display',serif;font-size:21px;color:var(--ink);margin-bottom:7px}
.loading-sub{font-size:13px;color:var(--ink-light)}
.ls{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--ink-faint);transition:color 0.3s}
.ls.done{color:var(--accent)}.ls.active{color:var(--ink);font-weight:500}
.plan-preview{position:relative;margin-bottom:4px}
.ppb{filter:blur(5px);pointer-events:none;user-select:none;border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--bg)}
.pr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}.pr:last-child{border-bottom:none}
.prl{font-size:12px;color:var(--ink-light)}.prv{font-size:14px;font-weight:600}
.pm{background:var(--white);border-radius:9px;padding:10px 12px;margin-top:6px}
.pmn{font-weight:600;font-size:13px}.pmc{font-size:11px;color:var(--ink-light);margin-top:2px}
.paywall-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(249,249,247,0) 0%,rgba(249,249,247,0.92) 30%,rgba(249,249,247,1) 55%);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:18px}
.lock-icon{font-size:26px;margin-bottom:8px}
.pw-title{font-family:'DM Serif Display',serif;font-size:20px;text-align:center;margin-bottom:5px}
.pw-sub{font-size:12px;color:var(--ink-light);text-align:center;margin-bottom:15px;line-height:1.5}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;width:100%}
.pc{border:1.5px solid var(--border);border-radius:12px;padding:13px 11px;cursor:pointer;transition:all 0.2s;text-align:center;position:relative}
.pc:hover{border-color:var(--accent-mid)}.pc.sel{border-color:var(--accent);background:var(--accent-light)}
.pop-badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:2px 9px;border-radius:100px;white-space:nowrap}
.pp{font-size:11px;color:var(--ink-light);font-weight:500;margin-bottom:3px}
.pa{font-family:'DM Serif Display',serif;font-size:24px;color:var(--ink)}.pa span{font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--ink-light)}
.ps{font-size:10px;color:var(--accent);font-weight:600;margin-top:3px;min-height:13px}
.trial-badge{background:var(--gold-light);border:1px solid #F0D080;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;margin-bottom:12px;width:100%}
.tb-icon{font-size:17px;flex-shrink:0}.tb-text{font-size:12px;color:var(--ink);line-height:1.4}.tb-text strong{color:var(--gold)}
.feat-list{list-style:none;margin-bottom:12px;width:100%}
.feat-list li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink);padding:3px 0}
.feat-list li::before{content:'✓';color:var(--accent);font-weight:700;font-size:11px;flex-shrink:0}
.btn-pay{width:100%;background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;padding:14px 20px;border-radius:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px}
.btn-pay:hover{background:#235C41;transform:translateY(-1px);box-shadow:0 5px 18px rgba(45,106,79,.3)}
.secure-note{font-size:11px;color:var(--ink-faint);text-align:center}
.err-box{background:#FEF0EC;border:1px solid #F4C5B5;border-radius:10px;padding:11px 13px;font-size:13px;color:#C0392B;margin-bottom:13px;display:none}
/* DASHBOARD */
.dash{padding:0}
.dash-head{background:var(--accent);padding:26px 24px 20px;color:#fff}
.dash-greet{font-family:'DM Serif Display',serif;font-size:23px;margin-bottom:3px}
.dash-sub{font-size:13px;opacity:0.8}
.dash-nav{display:flex;gap:3px;padding:10px 16px;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto}
.dash-nav::-webkit-scrollbar{display:none}
.nav-tab{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--ink-light);transition:all 0.16s;border:none;background:none;font-family:'DM Sans',sans-serif}
.nav-tab:hover{background:var(--accent-light);color:var(--accent)}.nav-tab.active{background:var(--accent);color:#fff}
.dash-body{padding:20px 22px}
.dash-sec{margin-bottom:20px}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:9px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:16px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.stat-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:2px}
.stat-v{font-size:15px;font-weight:600;color:var(--ink)}
.meal-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.me{font-size:21px}.mi{flex:1}.mn{font-size:13px;font-weight:600}.mm{font-size:11px;color:var(--ink-light);margin-top:2px}
.mk{font-size:12px;font-weight:600;color:var(--accent)}
.rating-row{display:flex;gap:3px;margin-top:5px}
.star{font-size:15px;cursor:pointer;opacity:0.3;transition:opacity 0.15s}.star.on{opacity:1}
.workout-card{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:10px;padding:13px 15px;margin-bottom:8px}
.wt{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:3px}
.wd{font-size:12px;color:var(--ink);line-height:1.5}
.rec-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px}
.rt{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.rd{font-size:12px;color:var(--ink-light);line-height:1.5}
.macro-wrap{margin-bottom:10px}
.macro-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.macro-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.macro-fill{height:100%;border-radius:4px;transition:width 0.5s}
.scanner-box{background:var(--ink);border-radius:14px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;margin-bottom:14px;cursor:pointer;position:relative;overflow:hidden}
.scan-frame{border:3px solid var(--accent-mid);width:55%;height:55%;border-radius:7px;position:relative}
.scan-line{position:absolute;left:0;right:0;height:2px;background:var(--accent-mid);top:0;animation:scanAnim 2s ease-in-out infinite}
@keyframes scanAnim{0%,100%{top:0}50%{top:100%}}
.scan-text{color:rgba(255,255,255,0.6);font-size:12px;margin-top:10px;text-align:center}
.scan-result{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:11px;padding:13px 15px;margin-bottom:13px}
.sr-name{font-size:14px;font-weight:600;margin-bottom:3px}
.sr-macro{font-size:12px;color:var(--ink-light)}
.fit-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;margin-top:5px}
.fit-good{background:#D4EDDA;color:#155724}.fit-bad{background:#F8D7DA;color:#721C24}
.log-entry{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px}
.le-icon{font-size:19px}.le-info{flex:1}.le-text{font-size:13px;font-weight:500}.le-time{font-size:11px;color:var(--ink-light);margin-top:1px}
.le-kcal{font-size:12px;font-weight:600;color:var(--accent)}
.btn-logout{width:100%;background:none;border:1.5px solid var(--border);color:var(--ink-light);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px;border-radius:10px;cursor:pointer;margin-top:6px}
.btn-logout:hover{border-color:var(--warn);color:var(--warn)}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.sum-item{background:var(--bg);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.sum-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:3px}
.sum-v{font-size:14px;font-weight:600;color:var(--ink)}
.plan-box{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:13px;padding:17px}
.plan-box h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:12px}
.plan-meal{background:var(--white);border-radius:9px;padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px}.plan-meal:last-child{margin-bottom:0}
.pm-e{font-size:20px}.pm-i{flex:1}.pm-n{font-size:13px;font-weight:600}.pm-m{font-size:11px;color:var(--ink-light);margin-top:1px}
.pm-k{font-size:12px;font-weight:600;color:var(--accent)}
.mile-list{list-style:none}
.mile-list li{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}.mile-list li:last-child{border-bottom:none}
.mile-num{width:21px;height:21px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
@media(max-width:768px){
  .topbar{padding:12px 16px}
  .main{padding:20px 14px}
  .card-header{padding:26px 22px 0}.card-body{padding:18px 22px}.card-footer{padding:4px 22px 26px;flex-direction:column}
  .btn-back,.btn-next{width:100%}
  .input-row,.tiles.c3,.tiles.c4{grid-template-columns:1fr 1fr}
  .sum-grid,.pg,.stat-grid{grid-template-columns:1fr 1fr}
  .dash-body{padding:16px}
}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="logo">PEAK<span>.</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar-track"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div></div>
    <div class="topbar-right">
      <span class="step-label" id="slbl">Step 1 of 8</span>
      <button class="lang-btn" onclick="toggleLang()" id="lbtn">DE</button>
      <button class="login-btn" onclick="showLogin()">Login</button>
    </div>
  </header>
  <main class="main"><div class="card" id="mc"></div></main>
</div>
<script>
const BACKEND='https://peak-backend-u52q.onrender.com';
let step=1,TOTAL=8,ud={},plan=null,selPlan='annual',lang='en';
let foodLog=[],mealRatings={},wkRatings={};

// ── TRANSLATIONS ──────────────────────────────────────────────────────
const T={en:{
  s1:'Your Profile',s1t:"Let's start with",s1e:'you',s1s:'Takes 4 minutes. The more honest you are, the better your plan.',
  fname:'First name',age:'Age',gender:'Gender',weight:'Current weight',dweight:'Dream weight',height:'Height',sleep:'Sleep/night',
  s2:'Lifestyle',s2t:'How do you',s2e:'spend your days?',s2s:'PEAK factors in your whole life — not just your workouts.',
  job:'Job type',desk:'Desk job',phys:'Physical job',mixed:'Mixed',shift:'Shift work',
  commute:'Daily commute',car:'Car',bus:'Bus/Train',walk:'Walking',bike:'Cycling',stress:'Daily stress',
  s3:'Fitness',s3t:"What's your",s3e:'favourite sport?',s3s:'PEAK builds workouts for your specific activity and level.',

async function fetchPlan(){
  var bmr=ud.weight&&ud.height&&ud.age?Math.round(88.362+13.397*parseFloat(ud.weight)+4.799*parseFloat(ud.height)-5.677*parseFloat(ud.age)):1800;

  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})});

  var c='<div class="ai-bubble" style="margin-bottom:14px"><div class="ai-lbl"><div class="ai-dot"></div>'+t('recB')+'</div><p>Tell me what you\'re craving and I\'ll build a recipe that fits your macros.</p></div>';
  c+='<div class="field"><label>What are you in the mood for?</label><input id="mood" placeholder="e.g. Mexican, chicken pasta, quick breakfast..."></div>';
  c+='<button class="btn-next" style="width:100%;margin-bottom:14px" onclick="genMoodRec()">'+t('genRec')+'</button>';
  c+='<div id="recRes"></div>';
  dashShell('recipes',c);
}

async function genMoodRec(){
  var mood=document.getElementById('mood')?.value;if(!mood?.trim()){alert('Enter a mood or craving.');return;}
  var el=document.getElementById('recRes');if(el)el.innerHTML='<div class="ai-bubble"><div class="ai-lbl"><div class="ai-dot"></div>Generating...</div><p>Building a "'+mood+'" recipe for your macros...</p></div>';
  try{
    var p=plan||fallbackPlan();
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'Create a recipe matching: "'+mood+'" for goal:'+ud.goal+', ~'+Math.round(p.calories/3)+' kcal, ~'+Math.round(p.protein/3)+'g protein, allergies:'+(ud.al||[]).join(',')+', cooking:'+ud.cook+'. JSON only: {"name":"<n>","time":<min>,"kcal":<n>,"protein":<g>,"ingredients":["<i1>","<i2>","<i3>","<i4>","<i5>"],"steps":["<s1>","<s2>","<s3>"]}'}]})});
    var d=await res.json();
    var rec=JSON.parse((d.content[0].text||'{}').replace(/```json|```/g,'').trim());
    if(el)el.innerHTML='<div class="scan-result"><div class="sr-name">'+rec.name+'</div><div class="sr-macro">'+rec.kcal+' kcal · '+rec.protein+'g protein · '+rec.time+' min</div><div style="margin-top:8px"><strong style="font-size:11px">Ingredients:</strong>'+rec.ingredients.map(function(i){return '<div style="font-size:12px;padding:2px 0">• '+i+'</div>';}).join('')+'</div><div style="margin-top:7px"><strong style="font-size:11px">Steps:</strong>'+rec.steps.map(function(s,i){return '<div style="display:flex;gap:7px;padding:3px 0;font-size:12px"><span style="color:var(--accent);font-weight:700;flex-shrink:0">'+(i+1)+'.</span><span>'+s+'</span></div>';}).join('')+'</div></div>';
  }catch(e){if(el)el.innerHTML='<div class="err-box" style="display:block">Could not generate recipe. Try again.</div>';}
}

// ── RATINGS ───────────────────────────────────────────────────────────
function rateMeal(idx,score,el){
  mealRatings[idx]=score;
  var row=el.closest('.rating-row');
  if(row)row.querySelectorAll('.star').forEach(function(s,i){s.style.opacity=i<score?1:0.3;});
  if(score<=1){setTimeout(function(){var b=document.createElement('div');b.className='ai-bubble';b.style.marginTop='8px';b.innerHTML='<div class="ai-lbl"><div class="ai-dot"></div>PEAK AI</div><p>Noted — I\'ve removed this from future suggestions and found better alternatives.</p>';var db=document.getElementById('db');if(db)db.appendChild(b);},300);}
  if(score>=4){setTimeout(function(){var b=document.createElement('div');b.className='ai-bubble';b.style.marginTop='8px';b.innerHTML='<div class="ai-lbl"><div class="ai-dot"></div>PEAK AI</div><p>Great choice! Added to your favourites — I\'ll include more like this in your plan.</p>';var db=document.getElementById('db');if(db)db.appendChild(b);},300);}
}

function rateWk(cat,score,el){
  wkRatings[cat]=score;
  var row=el.parentElement;if(row)row.querySelectorAll('span').forEach(function(s,i){s.style.opacity=i<score?1:0.3;});
  if(score>=4&&cat==='Effort')setTimeout(function(){alert('Great effort! I\'ll increase intensity next session. 💪');},200);
  if(score<=2&&cat==='Effort')setTimeout(function(){alert('Noted — I\'ll adjust difficulty for your next session.');},200);
}

// ── LOGIN ─────────────────────────────────────────────────────────────
function showLogin(){
  document.getElementById('pbar').style.width='0%';
  document.getElementById('slbl').textContent='Login';
  card('<div class="card-header"><div class="step-chip">✦ '+t('loginT')+' '+t('loginE')+'</div><h2 class="card-title">'+t('loginT')+' <em>'+t('loginE')+'</em></h2><p class="card-sub">'+t('loginS')+'</p></div><div class="card-body"><div id="errL" class="err-box"></div><button class="btn-google"><svg width="15" height="15" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>'+t('google')+'</button><div class="divider">or</div><div class="field"><label>'+t('emailF')+'</label><input type="email" id="lem" placeholder="alex@example.com"></div><div class="field"><label>'+t('passF')+'</label><input type="password" id="lpw" placeholder="••••••••"></div></div><div class="card-footer"><button class="btn-next" onclick="doLogin()" style="flex:1">'+t('loginB')+' →</button></div><div style="padding:0 40px 22px;text-align:center;font-size:12px;color:var(--ink-light)">'+t('noAcc')+' <span style="color:var(--accent);cursor:pointer;font-weight:600" onclick="step=1;render()">'+t('startF')+'</span></div>');
}

function doLogin(){
  var em=document.getElementById('lem').value;
  if(!em){showErr('errL','Please enter your email.');return;}
  ud.email=em;
  loadUdFromSession();
  try{var sp=sessionStorage.getItem('peak_plan');if(sp)plan=JSON.parse(sp);}catch(e){}
  if(plan){showDash(plan);}
  else{fetchPlan().then(function(){showDash(plan);});}
}

function logout(){
  plan=null;ud={};foodLog=[];mealRatings={};wkRatings={};
  try{sessionStorage.removeItem('peak_ud');sessionStorage.removeItem('peak_plan');}catch(e){}
  step=1;render();
}

function showErr(id,msg){var el=document.getElementById(id);if(el){el.textContent='❌ '+msg;el.style.display='block';}}

// ── HELPERS ───────────────────────────────────────────────────────────
function sel(el,key,val){el.closest('.tiles').querySelectorAll('.tile').forEach(function(t){t.classList.remove('sel');});el.classList.add('sel');ud[key]=val;}
function selSport(el,n){el.closest('.tiles').querySelectorAll('.sport-tile').forEach(function(t){t.classList.remove('sel');});el.classList.add('sel');ud.sport=n;}
function selGoal(el,k){document.querySelectorAll('.goal-card').forEach(function(c){c.classList.remove('sel');});el.classList.add('sel');ud.goal=t(k);}
function toggleChip(el,key,val){if(!ud[key])ud[key]=[];if(ud[key].includes(val)){ud[key]=ud[key].filter(function(v){return v!==val;});el.classList.remove('sel');}else{ud[key].push(val);el.classList.add('sel');}}

// ── INIT ──────────────────────────────────────────────────────────────
// After Stripe redirect — restore data and show dashboard
if(window.location.search.includes('session_id')){
  loadUdFromSession();
  try{var sp=sessionStorage.getItem('peak_plan');if(sp)plan=JSON.parse(sp);}catch(e){}
  step=8;
}
render();
</script>
