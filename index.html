*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* ── DARK THEME (default) ── */
:root,

  --bg:#0E0E0E;--s1:#161616;--s2:#1E1E1E;--s3:#282828;

<script>
// ── STATE ─────────────────────────────────────────────────────────────
const BACKEND='https://peak-backend-u52q.onrender.com';

// AI Helper — routes all Anthropic calls through backend proxy
async function aiGen(prompt, maxTokens, purpose){
  var headers={'Content-Type':'application/json'};
  try{
    if(window.sb){
      var sess=await window.sb.auth.getSession();
      var tok=sess?.data?.session?.access_token;
      if(tok)headers.Authorization='Bearer '+tok;
    }
  }catch(_){}
  var r=await fetch(BACKEND+'/ai/generate',{
    method:'POST',headers:headers,
    body:JSON.stringify({prompt:prompt,max_tokens:maxTokens||800,purpose:purpose||null})
  });
  if(!r.ok){
    var err=await r.json().catch(function(){return {error:'AI request failed'};});
    // Propagate free-tier limit with a specific flag so callers can show upgrade UI
    if(err.code==='FREE_LIMIT_REACHED'){
      var e=new Error(err.error||'Free limit reached');
      e.freeLimitReached=true;
      e.used=err.used;
      e.max=err.max;
      throw e;
    }
    throw new Error(err.error||'AI request failed');
  }
  var data=await r.json();
  return data.text||'';
}
async function aiGenJSON(prompt, maxTokens, purpose){
  var text=await aiGen(prompt, maxTokens, purpose);
  var clean=text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

// Build goal string for AI prompts — includes primary + secondary goals
// if user selected multiple. Format: "Primary: X | Secondary: Y, Z"
function goalStr(){
  var primary=ud.goal||'';
  if(!primary)return '';
  if(!Array.isArray(ud.goals)||ud.goals.length<=1)return primary;
  var secondary=ud.goals.slice(1).filter(function(g){return g&&g!==primary;});
  if(secondary.length===0)return primary;
  return 'Primary: '+primary+' | Also optimise for: '+secondary.join(', ');
}

// ── FREE TIER FEATURE GATES ────────────────────────────────────────────
// isFree(): true if current user is on free tier
// gateFree(featureKey): shows upgrade prompt + returns true if should block
//                      returns false if user can proceed
// freeLimitReachedUI(): shows a specific prompt when plan-gen cap is hit
function isFree(){ return ud.tier==='free'; }

function gateFree(featureKey){
  if(!isFree())return false; // allowed
  showUpgradePrompt(featureKey);
  return true; // blocked
}

function showUpgradePrompt(featureKey){
  var de=lang==='de';
  var titles={
    training_progression: de?'Woche 2 ist Premium':'Week 2 is Premium',
    recovery_tools: de?'Recovery-Tools sind Premium':'Recovery tools are Premium',
    workout_adjustment: de?'Workout-Anpassung ist Premium':'Workout adjustments are Premium',
    session_complete: de?'Session-Tracking ist Premium':'Session tracking is Premium',
    meal_rating: de?'Bewertungen sind Premium':'Ratings are Premium',
    plan_limit: de?'Plan-Limit erreicht':'Plan limit reached',
  };
  var descs={
    training_progression: de?'Dein Gratis-Plan zeigt Woche 1. Upgrade für 12-Wochen-Progression.':'Your free plan shows Week 1. Upgrade for the 12-week progression.',

function goUpgrade(){
  // Logged-in Free users already have a confirmed email + onboarding data.
  // Skip the email-input step and jump straight to plan selection (step 6).
  // From there, doPay() will recognise the existing email and go straight to
  // Stripe Checkout — since the user is already Free (not paid), the backend
  // will NOT block with ALREADY_SUBSCRIBED (only blocks for existing paid subs).
  // We set a flag so doPay() knows to skip the check-email call for logged-in users.
  if(ud.tier==='free'&&ud.email){
    __upgradingExistingFree=true;
  }
  step=6;
  render();
}

// PEAK-style inline toast — replaces native alert()
function peakToast(msg, opts){
  opts=opts||{};
  var kind=opts.kind||'info'; // info | success
  var title=opts.title||(lang==='de'?'Hinweis':'Heads up');
  var wrap=document.getElementById('pk-toast-wrap');
  if(!wrap){wrap=document.createElement('div');wrap.id='pk-toast-wrap';wrap.className='pk-toast-wrap';document.body.appendChild(wrap);}
  var el=document.createElement('div');
  el.className='pk-toast '+kind;
  el.innerHTML='<div class="pk-toast-t">'+title+'</div><div class="pk-toast-m">'+msg+'</div>';
  wrap.appendChild(el);
  requestAnimationFrame(function(){el.classList.add('show');});
  setTimeout(function(){
    el.classList.remove('show');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},220);
  }, opts.duration||3200);
}
// PEAK-style confirm (returns Promise<boolean>)
function peakConfirm(msg, opts){
  opts=opts||{};
  return new Promise(function(resolve){
    var de=lang==='de';
    var title=opts.title||(de?'Bestätigen':'Confirm');
    var okLabel=opts.confirmLabel||(de?'Ja':'Yes');
    var caLabel=opts.cancelLabel||(de?'Abbrechen':'Cancel');
    var wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px;font-family:Barlow,sans-serif';
    var box=document.createElement('div');
    box.style.cssText='background:var(--s1);border:1px solid var(--red);border-left:3px solid var(--red);padding:20px;max-width:380px;width:100%';
    box.innerHTML='<div style="font-family:\'Barlow Condensed\';font-weight:900;font-size:11px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">'+title+'</div><div style="color:var(--white);font-size:14px;line-height:1.45;margin-bottom:14px">'+msg+'</div><div style="display:flex;gap:8px"><button id="pkCok" style="flex:1;background:var(--red);color:var(--white);border:none;padding:10px;font-family:\'Barlow Condensed\';font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">'+okLabel+'</button><button id="pkCca" style="flex:1;background:var(--s3);color:var(--dim);border:1px solid var(--border);padding:10px;font-family:\'Barlow Condensed\';font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">'+caLabel+'</button></div>';
    wrap.appendChild(box);
    document.body.appendChild(wrap);
    function close(v){if(wrap.parentNode)wrap.parentNode.removeChild(wrap);resolve(v);}
    document.getElementById('pkCok').onclick=function(){close(true);};
    document.getElementById('pkCca').onclick=function(){close(false);};
    wrap.onclick=function(e){if(e.target===wrap)close(false);};
  });
}

async function syncTrainingState(){
  try{
    var sess=await window.sb.auth.getSession();
    var tok=sess?.data?.session?.access_token;
    if(!tok)return;
    await fetch(BACKEND+'/user/training-state',{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok},
      body:JSON.stringify({training_state:trainState})
    });
  }catch(e){console.error('trainState sync failed:',e);}

async function loadTrainingStateFromBackend(){
  try{
    var sess=await window.sb.auth.getSession();
    var tok=sess?.data?.session?.access_token;
    if(!tok)return;
    var res=await fetch(BACKEND+'/user/training-state',{headers:{Authorization:'Bearer '+tok}});
    if(!res.ok)return;
    var json=await res.json();
    if(json.training_state){
      trainState.completed=json.training_state.completed||{};
      trainState.feedback=json.training_state.feedback||{};
      trainState.currentWeek=json.training_state.currentWeek||1;
      // Update sessionStorage so next render uses backend data
      try{sessionStorage.setItem('pk_train',JSON.stringify(trainState));}catch(e){}
    }
  }catch(e){console.error('trainState load failed:',e);}
}

// SESSION TRANSLATION CACHE (DE) — translates EN templates on demand
// ═══════════════════════════════════════════════════════════════════════
var __sesCache=null;
function getSesCache(){
  if(__sesCache)return __sesCache;
  try{var raw=sessionStorage.getItem('pk_ses_cache');__sesCache=raw?JSON.parse(raw):{};}
  catch(e){__sesCache={};}
  return __sesCache;
}
function saveSesCache(){
  try{sessionStorage.setItem('pk_ses_cache',JSON.stringify(__sesCache||{}));}catch(e){}
}

// Translate one session object. Returns cached copy if available,
// otherwise asks KI for a full-object translation and caches it.
async function translateSessionToDE(session, cacheKey){
  if(!session||!session.title)return session;
  var cache=getSesCache();
  if(cache[cacheKey]){
    var c=cache[cacheKey];
    return {
      type:session.type,
      title:c.title||session.title,
      focus:c.focus||session.focus,
      desc:c.desc||session.desc,
      duration:session.duration,
      exercises:(session.exercises||[]).map(function(ex,i){
        if(typeof ex==='string')return ex;
        var ct=c.exercises&&c.exercises[i];
        return {
          name:(ct&&ct.name)||ex.name,
          detail:(ct&&ct.detail)||ex.detail,
          tip:(ct&&ct.tip)||ex.tip||''
        };
      })
    };
  }
  var payload={
    title:session.title||'',
    focus:session.focus||'',
    desc:session.desc||'',
    exercises:(session.exercises||[]).map(function(ex){
      if(typeof ex==='string')return {name:ex,detail:'',tip:''};
      return {name:ex.name||'',detail:ex.detail||'',tip:ex.tip||''};
    })
  };
  try{
    var prompt='Translate this fitness training session to natural German. '+
      'Rules:\n'+

// Translate every non-rest session in a week plan in parallel.
async function translateWeekPlanToDE(week, sport, level){
  if(!week||!week.days)return week;
  var lk=levelKey(level);
  var tasks=week.days.map(function(d){
    if(!d||d.type==='rest'||!d.title)return Promise.resolve(d);
    var key=sport+'|'+d.type+'|'+lk;
    return translateSessionToDE(d,key);
  });
  var translated=await Promise.all(tasks);
  return {days:translated, weekNum:week.weekNum, phase:week.phase};
}

// Check if any non-rest session in week still needs DE translation
function weekNeedsTranslation(week, sport, level){
  if(!week||!week.days)return false;
  var lk=levelKey(level);
  var cache=getSesCache();
  return week.days.some(function(d){
    if(!d||d.type==='rest'||!d.title)return false;
    var key=sport+'|'+d.type+'|'+lk;
    return !cache[key];
  });
}

// Find template for sport (case-insensitive, fuzzy)
function getTpl(sport){
  if(!sport)return null;
  if(TPL[sport])return TPL[sport];
  var key=Object.keys(TPL).find(function(k){return k.toLowerCase()===sport.toLowerCase();});
  return key?TPL[key]:null;
}

// Map onboarding level string to template key
function levelKey(level){
  if(!level)return 'int';
  var l=String(level).toLowerCase();
  if(l.indexOf('beg')>=0||l.indexOf('anfäng')>=0||l.indexOf('anfang')>=0)return 'beg';
  if(l.indexOf('adv')>=0||l.indexOf('profi')>=0||l.indexOf('pro')>=0||l.indexOf('elite')>=0)return 'adv';
  return 'int';
}

// Build a sport-specific session from template
// ─── Progression helpers ───
// Week → phase mapping. 12-week cycle with 3 phases.
function weekPhase(week){
  if(week<=4)return 'foundation';
  if(week<=8)return 'build';
  return 'peak';
}

// Multipliers applied to exercise sets/reps based on progression phase AND
// feedback-based adjustment from previous weeks.
function progressionMultiplier(week,feedbackBias){
  // Base phase multiplier
  var base=1.0;
  if(week>=5&&week<=8)base=1.15; // Build: +15%
  if(week>=9)base=1.30;          // Peak: +30%
  // Session-rating bias (rolling, from star-ratings)
  var mult=base+feedbackBias*0.15;
  // Live adjustment bias (explicit 4-step feedback tile) — direct additive
  var adj=(trainState&&trainState.adjustBias)||0;
  mult+=adj;
  // Clamp so progression never explodes or collapses
  return Math.max(0.7,Math.min(1.6,mult));
}

// Calculate feedback bias from stored feedback for previous weeks.
// Returns value between -1 (too hard) and +1 (too easy), rolling 3-week window.
function calcFeedbackBias(){
  var fb=trainState.feedback||{};
  var keys=Object.keys(fb).filter(function(k){return fb[k]!=='perfect';});
  if(keys.length<2)return 0;
  var recent=keys.slice(-6); // last 6 sessions
  var easy=recent.filter(function(k){return fb[k]==='easy';}).length;
  var hard=recent.filter(function(k){return fb[k]==='hard';}).length;
  return (easy-hard)/recent.length;
}

// Apply progression to a single exercise's detail string (sets/reps).
// Example: "4×6 @ 75%" becomes "5×7 @ 78%" in Build phase.
function applyProgression(exercises,mult){
  if(!exercises||mult===1.0)return exercises;
  return exercises.map(function(ex){
    if(typeof ex!=='object'||!ex.detail)return ex;
    var detail=ex.detail;
    // Scale set×rep patterns like "4×6" or "3×10"
    detail=detail.replace(/(\d+)[×x](\d+)/g,function(match,sets,reps){
      var newSets=Math.round(parseInt(sets)*Math.sqrt(mult));
      var newReps=Math.round(parseInt(reps)*Math.sqrt(mult));
      return Math.max(1,newSets)+'×'+Math.max(1,newReps);
    });
    // Scale durations like "30s" "45s" "2min" "10 min"
    detail=detail.replace(/(\d+)\s*s(?!\w)/g,function(m,n){return Math.round(parseInt(n)*mult)+'s';});
    detail=detail.replace(/(\d+)\s*min/g,function(m,n){return Math.round(parseInt(n)*mult)+' min';});
    // Scale percentages like "@ 75%" → "@ 82%"
    detail=detail.replace(/@\s*(\d+)%/g,function(m,pct){
      var newPct=Math.min(95,Math.round(parseInt(pct)+(mult-1)*30));
      return '@ '+newPct+'%';
    });
    return {name:ex.name,detail:detail,tip:ex.tip||''};
  });
}

// Build a week of training via KI for sports not in TPL.
// One API call delivers all sessions — cheaper than one per day.
async function aiBuildWeek(sport,level,sessionsPerWk,duration,typeSequence,weekNum,phase){
  var langInstr=lang==='de'?'Respond entirely in GERMAN.':'Respond entirely in ENGLISH.';
  var phaseInstr={foundation:'Foundation phase: moderate intensity, focus on movement quality.',build:'Build phase: progressively heavier loads and higher volume (+15% vs foundation).',peak:'Peak phase: maximum intensity, sport-specific demands (+30% vs foundation).'}[phase]||'';
  var prompt='You are an expert strength & conditioning coach for '+sport+'.\n'+langInstr+'\nBuild '+sessionsPerWk+' training sessions for a '+level+'-level athlete, week '+weekNum+' of a 12-week program.\n'+phaseInstr+'\nSession types (in order): '+typeSequence.join(', ')+'.\nEach session: '+duration+' minutes. 4-5 exercises with sets/reps/duration and one technique tip.\n\nRespond ONLY with valid JSON:\n{"sessions":[{"type":"<type>","title":"<session title>","focus":"<what this trains>","desc":"<1-2 sentences>","exercises":[{"name":"<exercise>","detail":"<sets/reps/duration>","tip":"<technique tip>"},{"name":"<exercise>","detail":"<detail>","tip":"<tip>"},{"name":"<exercise>","detail":"<detail>","tip":"<tip>"},{"name":"<exercise>","detail":"<detail>","tip":"<tip>"}]}]}';
  try{
    var res=await aiGenJSON(prompt,2000);
    return (res&&res.sessions)||null;
  }catch(e){console.error('aiBuildWeek failed:',e);return null;}
}


function buildSession(tpl,sessionType,level,duration){
  if(!tpl||!tpl.sessions||!tpl.sessions[sessionType])return null;
  var lk=levelKey(level);
  var session=tpl.sessions[sessionType][lk]||tpl.sessions[sessionType].int;
  if(!session)return null;
  return {
    type:sessionType,
    title:session.title,
    focus:session.focus,
    desc:session.desc,
    duration:duration,
    exercises:session.exercises.slice() // copy so templates aren't mutated
  };
}


// Synthesise a 7-day week plan. Uses sport-specific templates where available,
// falls back to generic stubs for sports the KI will handle later.
function synthWeekPlan(sport,level,sessionsPerWk,duration,todayWorkout){
  sessionsPerWk=Math.max(1,Math.min(7,sessionsPerWk||3));
  duration=duration||60;
  // Session distribution: spread evenly, avoid back-to-back for recovery
  var patterns={
    1:[true,false,false,false,false,false,false],
    2:[true,false,false,true,false,false,false],
    3:[true,false,true,false,true,false,false],
    4:[true,false,true,false,true,false,true],
    5:[true,true,false,true,true,false,true],
    6:[true,true,false,true,true,true,true],
    7:[true,true,true,true,true,true,true]
  };
  var pattern=patterns[sessionsPerWk];
  var tpl=getTpl(sport);
  // Determine the sequence of session types
  var typeSequence;
  if(tpl&&tpl.sessionOrder&&tpl.sessionOrder[sessionsPerWk]){
    typeSequence=tpl.sessionOrder[sessionsPerWk];
  }else{
    // Generic fallback: rotate through common types
    var generic=['strength','endurance','mobility','mixed','recovery','speed','technique'];
    typeSequence=[];
    for(var i=0;i<sessionsPerWk;i++)typeSequence.push(generic[i%generic.length]);
  }
  var days=[];
  var sessionIdx=0;
  // Progression: apply based on current training week
  var weekNum=(trainState&&trainState.currentWeek)||1;
  var phase=weekPhase(weekNum);
  var bias=calcFeedbackBias();
  var mult=progressionMultiplier(weekNum,bias);
  pattern.forEach(function(isSession){
    if(!isSession){
      days.push({type:'rest'});
      return;
    }
    var type=typeSequence[sessionIdx%typeSequence.length];
    sessionIdx++;
    // Try template-based session first
    var session=buildSession(tpl,type,level,duration);
    if(session){
      session.exercises=applyProgression(session.exercises,mult);
      days.push(session);
      return;
    }
    // Fallback: first session uses today's workout if provided
    if(days.filter(function(d){return d.type!=='rest';}).length===0&&todayWorkout){
      days.push({
        type:type,
        title:todayWorkout.title||(sport+' Session'),
        focus:todayWorkout.focus||'',
        desc:todayWorkout.desc||'',
        duration:duration,
        exercises:applyProgression(todayWorkout.exercises||[],mult)
      });
    }else{
      // Generic stub — will be replaced by KI-generated content via enrichWeekWithAI
      days.push({
        type:type,
        title:sport+' '+type.charAt(0).toUpperCase()+type.slice(1),
        duration:duration,
        exercises:[{name:'Coming soon',detail:'Details will be AI-generated',tip:''}],
        _needsAI:true
      });
    }
  });
  return {days:days,weekNum:weekNum,phase:phase};
}

// After synthWeekPlan: if any days are AI stubs, fetch real content.
// Fire-and-forget; updates plan.week.days in place, re-renders fitness tab.
async function enrichWeekWithAI(){
  if(!plan||!plan.week||!plan.week.days)return;
  var stubDays=plan.week.days.filter(function(d){return d._needsAI;});
  if(stubDays.length===0)return;
  var typeSequence=stubDays.map(function(d){return d.type;});
  var sport=ud.sport||'Running';
  var level=ud.level||'Intermediate';
  var duration=parseInt(ud.dur||60);
  var sessions=await aiBuildWeek(sport,level,stubDays.length,duration,typeSequence,plan.week.weekNum||1,plan.week.phase||'foundation');
  if(!sessions)return;
  // Apply progression + map AI sessions back into the week's day slots
  var bias=calcFeedbackBias();
  var mult=progressionMultiplier(plan.week.weekNum||1,bias);
  var aiIdx=0;
  plan.week.days.forEach(function(d,i){
    if(!d._needsAI)return;
    var aiSes=sessions[aiIdx];aiIdx++;
    if(!aiSes)return;
    d.title=aiSes.title||d.title;
    d.focus=aiSes.focus||'';
    d.desc=aiSes.desc||'';
    d.exercises=applyProgression(aiSes.exercises||[],mult);
    delete d._needsAI;
  });
  saveSession();
  // If user is on DE, translate the full week now (cached after first run)
  if(lang==='de'&&plan&&plan.week){
    try{
      plan.week=await translateWeekPlanToDE(plan.week, ud.sport||'Running', ud.level||'Intermediate');
      saveSession();
    }catch(e){console.warn('DE week translation failed:',e);}
  }
  // Re-render fitness tab if user is on it
  if(currentView==='dashboard'&&dashTab==='fitness')showTab('fitness');
}

// Validated voucher state for the current checkout session
var __validVoucher=null;

async function checkVoucher(){
  var inp=document.getElementById('vc');
  var msg=document.getElementById('vcMsg');
  var btn=document.getElementById('vcBtn');
  var priceEl=document.getElementById('s7price');
  if(!inp||!msg)return;
  var code=inp.value.trim().toUpperCase();
  if(!code){
    __validVoucher=null;
    msg.style.display='none';
    return;
  }
  var de=lang==='de';
  inp.value=code; // normalise
  btn.textContent=de?'Prüfe...':'Checking...';
  btn.disabled=true;
  msg.style.display='block';
  msg.style.color='var(--dim)';
  msg.textContent=de?'Wird geprüft...':'Validating...';
  try{
    var emailField=document.getElementById('em');
    var currentEmail=(emailField?emailField.value.trim():'')||ud.email||'';
    var res=await fetch(BACKEND+'/voucher/validate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:code,plan:selPlan,tier:selTier,email:currentEmail})
    });
    var data=await res.json();
    btn.textContent=de?'Prüfen':'Check';
    btn.disabled=false;
    if(!data.valid){
      __validVoucher=null;
      msg.style.color='var(--red)';
      msg.textContent='✗ '+(data.error||(de?'Ungültiger Code':'Invalid code'));
      return;
    }
    __validVoucher=data;
    ud.voucherCode=code;
    saveSession();
    msg.style.color='#4ade80';
    var label=data.label||'';
    if(data.type==='trial_extend'){
      msg.textContent='✓ '+(de?(data.trialDays+' Tage kostenlos testen'):(data.trialDays+' days free trial'));
      if(priceEl)priceEl.textContent=(de?data.trialDays+' Tage kostenlos.':data.trialDays+' days free.')+' '+(selPlan==='annual'?(de?'Dann weiter im Jahresabo.':'Then annual plan.'):(de?'Dann monatlich.':'Then monthly.'));
    }else if(data.type==='trial_full'){
      msg.textContent='🎁 '+(de?(data.trialDays+' Tage Premium kostenlos'):(data.trialDays+' days Premium free'));
      if(priceEl)priceEl.textContent=de?(data.trialDays+' Tage Premium kostenlos, dann regulär.'):(data.trialDays+' days Premium free, then standard pricing.');
    }else{
      msg.textContent='✓ '+(de?'Gutschein aktiv: ':'Voucher active: ')+label;
    }
  }catch(err){
    btn.textContent=de?'Prüfen':'Check';
    btn.disabled=false;
    msg.style.color='var(--red)';
    msg.textContent='✗ '+(de?'Fehler beim Prüfen':'Could not verify');
  }
}

async function doPay(){
  var em=document.getElementById('em').value,btn=document.getElementById('pb2');
  var c1=document.getElementById('cc1'),c2=document.getElementById('cc2');
  if(!c1||!c1.checked||!c2||!c2.checked){showE('ep',t('csE'));return;}
  if(!em){showE('ep','Please enter your email.');return;}
  ud.email=em;ud.consentHealthData=true;ud.consentTerms=true;ud.consentAt=new Date().toISOString();saveSession();
  btn.textContent='Loading...';btn.style.opacity='.6';btn.onclick=null;
  document.getElementById('ep').style.display='none';
  try{
    // Logged-in Free user upgrading → skip check-email (account exists, but
    // it's a Free one — we WANT them to checkout). The /create-checkout backend
    // will still block if they already have an active PAID subscription.
    if(!__upgradingExistingFree){
      // First: check if an account already exists for this email
      var chk=await fetch(BACKEND+'/auth/check-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em})});
      var chkData=await chk.json();
      if(chkData.exists){
        // Account exists → show options screen instead of going to Stripe
        showAccountExists(em,chkData.hasSubscription);
        return;
      }
    }
    // No existing account (or logged-in Free upgrade) → proceed to Stripe Checkout
    var voucherCode=document.getElementById('vc')?document.getElementById('vc').value.trim().toUpperCase():'';
    var res=await fetch(BACKEND+'/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,plan:selPlan,tier:selTier,userData:{name:ud.name,age:ud.age,gender:ud.gender,weight:ud.weight,dweight:ud.dweight,height:ud.height,sleep:ud.sleep,job:ud.job,commute:ud.commute,stress:ud.stress,sport:ud.sport,level:ud.level,sessions:ud.sessions,dur:ud.dur,equip:ud.equip,al:ud.al||[],di:ud.di||[],cu:ud.cu||[],cook:ud.cook,budget:ud.budget,goal:ud.goal,goals:ud.goals||[]},consent:{healthData:true,terms:true,at:ud.consentAt},voucher:voucherCode||null,lang:lang})});
    var data=await res.json();
    // Backend detected an existing active subscription → show portal instead
    if(res.status===409&&data.code==='ALREADY_SUBSCRIBED'){
      showAccountExists(em,true);
      return;
    }
    if(data.url){__upgradingExistingFree=false;window.location.href=data.url;}
    else throw new Error(data.error||'Error');
  }catch(err){showE('ep',err.message);btn.textContent='🔒 '+t('tp')+' →';btn.style.opacity='1';btn.onclick=doPay;}
}

// Render weekly training plan with expandable day cards
function renderWeekPlan(week){
  var de=lang==='de';
  var days=week.days||[];
  var weekNum=week.weekNum||1;
  var phase=week.phase||'foundation';
  var phaseLabels={
    foundation:{en:'Foundation',de:'Grundlage'},
    build:{en:'Build Phase',de:'Aufbauphase'},
    peak:{en:'Peak Phase',de:'Leistungsphase'}
  };
  var phaseLabel=(phaseLabels[phase]||phaseLabels.foundation)[lang==='de'?'de':'en'];
  var dayNamesEN=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var dayNamesDE=['Mo','Di','Mi','Do','Fr','Sa','So'];
  var dayNames=de?dayNamesDE:dayNamesEN;

  var sessionCount=days.filter(function(d){return d.type&&d.type!=='rest';}).length;
  var completedCount=days.filter(function(d,i){
    return d.type&&d.type!=='rest'&&trainState.completed['w'+weekNum+'-d'+i];
  }).length;

  var c='<div class="dst" style="margin-top:4px">'+(de?'Wochenplan':'Weekly Plan')+'</div>';
  c+='<div class="wk-meta">'+(de?'Woche':'Week')+' '+weekNum+'/12 · '+phaseLabel+' · '+completedCount+'/'+sessionCount+(de?' abgeschlossen':' done')+'</div>';
  c+='<div class="wk-grid">';
  days.forEach(function(d,i){
    var dayLabel=dayNames[i]||d.day||('D'+(i+1));
    var isRest=!d.type||d.type==='rest';
    var isDone=!isRest&&trainState.completed['w'+weekNum+'-d'+i];
    var fb=trainState.feedback['w'+weekNum+'-d'+i];
    var typeLabel={
      technique:{en:'TECHNIQUE',de:'TECHNIK'},
      strength:{en:'STRENGTH',de:'KRAFT'},
      endurance:{en:'ENDURANCE',de:'AUSDAUER'},
      speed:{en:'SPEED',de:'TEMPO'},
      tempo:{en:'TEMPO',de:'TEMPO'},
      recovery:{en:'RECOVERY',de:'REGENERATION'},
      match:{en:'MATCH',de:'SPIEL'},
      mobility:{en:'MOBILITY',de:'MOBILITÄT'},
      mixed:{en:'MIXED',de:'GEMISCHT'}
    };
    var tl=isRest?(de?'PAUSE':'REST'):(typeLabel[d.type]||{en:d.type.toUpperCase(),de:d.type.toUpperCase()})[de?'de':'en'];
    var cls='wk-day'+(isRest?' rest':'')+(isDone?' done':'');
    c+='<div class="'+cls+'" onclick="'+(isRest?'':'openWkDay('+i+')')+'">';
    c+='<div class="wk-day-lbl">'+dayLabel+(isDone?' ✓':'')+'</div>';
    c+='<div class="wk-day-type">'+tl+'</div>';
    if(!isRest){
      c+='<div class="wk-day-title">'+(d.title||'').toUpperCase()+'</div>';
      if(d.duration)c+='<div class="wk-day-dur">'+d.duration+' '+(de?'Min':'min')+'</div>';
      if(fb){
        var fbIcon={easy:'🟢',perfect:'⚡',hard:'🔴'}[fb]||'';
        c+='<div class="wk-day-fb">'+fbIcon+'</div>';
      }
    }
    c+='</div>';
  });
  c+='</div>';
  // Advance week button — show only if all sessions in current week are done
  if(completedCount>=sessionCount&&sessionCount>0&&weekNum<12){
    c+='<button class="wk-advance" onclick="advanceWeek()">'+(de?'🚀 WOCHE '+(weekNum+1)+' STARTEN':'🚀 START WEEK '+(weekNum+1))+'</button>';
  }else if(completedCount>=sessionCount&&sessionCount>0&&weekNum>=12){
    c+='<div class="wk-done-all">'+(de?'🏆 12-Wochen-Zyklus abgeschlossen!':'🏆 12-week cycle complete!')+'</div>';
  }
  c+='<div id="wkDayDetail"></div>';
  return c;
}

// Expand single day's exercises inline
function openWkDay(i){
  var p=fp();
  if(!p||!p.week||!p.week.days)return;
  var d=p.week.days[i];
  if(!d)return;
  var de=lang==='de';
  var el=document.getElementById('wkDayDetail');
  if(!el)return;
  // Toggle: if same day open, close it
  if(el.getAttribute('data-day')===String(i)){
    el.innerHTML='';
    el.removeAttribute('data-day');
    return;
  }
  el.setAttribute('data-day',String(i));
  var weekNum=(p.week.weekNum||trainState.currentWeek||1);
  var key='w'+weekNum+'-d'+i;
  var isCompleted=!!trainState.completed[key];
  var currentFb=trainState.feedback[key];

  var html='<div class="wk-detail">';
  html+='<div class="wk-detail-t">'+(d.title||'').toUpperCase()+'</div>';
  if(d.focus)html+='<div class="wk-detail-f">'+(de?'FOKUS: ':'FOCUS: ')+d.focus+'</div>';
  if(d.desc)html+='<div class="wk-detail-d">'+d.desc+'</div>';
  (d.exercises||[]).forEach(function(e,idx){
    var nm=typeof e==='string'?e:(e.name||'Exercise');
    var dt=typeof e==='string'?'':(e.detail||'');
    var tip=typeof e==='object'?(e.tip||''):'';
    html+='<div class="ex-row"><div class="ex-num">'+(idx+1)+'</div><div><div class="ex-name">'+nm+'</div>';
    if(dt)html+='<div class="ex-detail">'+dt+'</div>';
    if(tip)html+='<div class="ex-tip">💡 '+tip+'</div>';
    html+='</div></div>';
  });

  // Completion section
  html+='<div class="wk-complete">';
  if(!isCompleted){
    html+='<button class="wk-complete-btn" onclick="completeSession('+i+')">'+(de?'✓ SESSION ABSCHLIESSEN':'✓ COMPLETE SESSION')+'</button>';
  }else{
    html+='<div class="wk-done">'+(de?'✓ Erledigt':'✓ Completed')+'</div>';
    html+='<div class="wk-fb-lbl">'+(de?'Wie war\'s?':'How was it?')+'</div>';
    html+='<div class="wk-fb-btns">';
    html+='<button class="wk-fb '+(currentFb==='easy'?'sel':'')+'" onclick="rateFeedback('+i+',\'easy\')">'+(de?'🟢 Zu leicht':'🟢 Too easy')+'</button>';
    html+='<button class="wk-fb '+(currentFb==='perfect'?'sel':'')+'" onclick="rateFeedback('+i+',\'perfect\')">'+(de?'⚡ Perfekt':'⚡ Perfect')+'</button>';
    html+='<button class="wk-fb '+(currentFb==='hard'?'sel':'')+'" onclick="rateFeedback('+i+',\'hard\')">'+(de?'🔴 Zu schwer':'🔴 Too hard')+'</button>';
    html+='</div>';
  }
  html+='</div></div>';
  el.innerHTML=html;
}

// Mark session as completed
function completeSession(dayIdx){
  if(gateFree('session_complete'))return;
  var p=fp();
  if(!p||!p.week)return;
  var weekNum=p.week.weekNum||trainState.currentWeek||1;
  var key='w'+weekNum+'-d'+dayIdx;
  trainState.completed[key]=true;
  saveSession();
  peakToast(lang==='de'?'Session abgeschlossen ✓':'Session completed ✓',{kind:'success',duration:1500});
  // Re-render detail to show feedback buttons
  var el=document.getElementById('wkDayDetail');
  if(el)el.removeAttribute('data-day'); // force re-open
  openWkDay(dayIdx);
}

// Record feedback for a session
function rateFeedback(dayIdx,rating){
  if(gateFree('session_complete'))return;
  var p=fp();
  if(!p||!p.week)return;
  var weekNum=p.week.weekNum||trainState.currentWeek||1;
  var key='w'+weekNum+'-d'+dayIdx;
  trainState.feedback[key]=rating;
  saveSession();
  // Update UI only — no need to rebuild whole view
  var el=document.getElementById('wkDayDetail');
  if(el)el.removeAttribute('data-day');
  openWkDay(dayIdx);
}

// Advance to next week: regenerate plan with incremented week number
async function advanceWeek(){
  if(gateFree('training_progression'))return;
  var de=lang==='de';
  var current=trainState.currentWeek||1;
  if(current>=12){
    peakToast(de?'🎉 12-Wochen-Zyklus abgeschlossen!':'🎉 12-week cycle complete!',{kind:'success',duration:3000});
    return;
  }
  var ok=await peakConfirm(de?('Weiter zu Woche '+(current+1)+'? Dein Plan wird angepasst.'):('Move to Week '+(current+1)+'? Plan will adjust to your progress.'));
  if(!ok)return;
  trainState.currentWeek=current+1;
  // Decay adjustBias by 50% — last week's feedback still influences, but fades
  if(trainState.adjustBias)trainState.adjustBias=trainState.adjustBias*0.5;
  saveSession();
  // Rebuild week plan with new progression
  if(plan){
    var sport=ud.sport||'Running';
    var level=ud.level||'Intermediate';

// Feedback bias lives in trainState.adjustBias and stacks with the
// auto-progression multiplier. 4 discrete steps:
//   way_too_easy   → +0.30  (significantly harder next time)
//   just_right     → +0.05  (slight upward nudge — you're ready for more)
//   slightly_hard  → -0.10  (small dial-back)
//   way_too_hard   → -0.25  (meaningful dial-back)
async function adjustWorkout(type){
  if(gateFree('workout_adjustment'))return;
  var el=document.getElementById('adj');
  var de=lang==='de';
  var biasMap={
    way_too_easy:  0.30,
    just_right:    0.05,
    slightly_hard:-0.10,
    way_too_hard: -0.25
  };
  var msgMap={
    way_too_easy:{
      en:'Noted — next session will push you harder.',
      de:'Notiert — die nächste Session wird deutlich fordernder.'
    },
    just_right:{
      en:'Perfect. We\'ll add a small challenge next session to keep you progressing.',
      de:'Top. Wir steigern nächste Session leicht, damit du weiter wächst.'
    },
    slightly_hard:{
      en:'Got it — we\'ll dial the next session back a bit.',
      de:'Verstanden — nächste Session wird etwas leichter.'
    },
    way_too_hard:{
      en:'Noted — next session will be noticeably easier so you can rebuild.',
      de:'Notiert — nächste Session wird spürbar leichter zum Auftanken.'
    }
  };
  var bias=biasMap[type];
  if(bias===undefined)return;
  // Store feedback bias (stacks across sessions up to ±0.5 clamp)
  if(!trainState.adjustBias)trainState.adjustBias=0;
  trainState.adjustBias=Math.max(-0.5,Math.min(0.5,(trainState.adjustBias||0)+bias));
  saveSession();
  if(el){
    el.innerHTML='<div class="wc" style="margin-top:6px"><div class="wt">'+(de?'✓ Feedback gespeichert':'✓ Feedback saved')+'</div><div style="font-size:12px;color:var(--ink2);line-height:1.5">'+msgMap[type][lang==='de'?'de':'en']+'</div></div>';
  }
  peakToast(de?'Feedback gespeichert ✓':'Feedback saved ✓',{kind:'success',duration:1600});
}

function addLog(){
  var inp=document.getElementById('li');
  if(!inp||!inp.value.trim())return;
  var v=inp.value.trim();
  var em={beer:'🍺',bier:'🍺',wine:'🍷',wein:'🍷',coffee:'☕',kaffee:'☕',pizza:'🍕',burger:'🍔',salad:'🥗',water:'💧',wasser:'💧',chocolate:'🍫',schokolade:'🍫'};
  var emoji='🍽️';
  Object.keys(em).forEach(function(k){if(v.toLowerCase().includes(k))emoji=em[k];});
  flog.push({text:v,emoji:emoji,kcal:Math.floor(Math.random()*230)+80,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  logEditIdx=-1;
  tLg();
}

function editLog(idx){
  logEditIdx=idx;
  tLg();
}

function cancelLog(){
  logEditIdx=-1;
  tLg();
}

function saveLog(idx){
  var t2=document.getElementById('eTxt'+idx);
  var k=document.getElementById('eKcal'+idx);
  var em=document.getElementById('eEm'+idx);
  if(!t2||!k)return;
  var text=t2.value.trim();
  var kcal=parseInt(k.value)||0;
  var emoji=(em&&em.value.trim())||'🍽️';
  if(!text){peakToast(lang==='de'?'Text darf nicht leer sein.':'Text cannot be empty.');return;}
  if(kcal<0)kcal=0;
  flog[idx].text=text;
  flog[idx].kcal=kcal;
  flog[idx].emoji=emoji;
  logEditIdx=-1;
  tLg();
}

async function deleteLog(idx){
  var de=lang==='de';
  var ok=await peakConfirm(de?'Eintrag wirklich löschen?':'Delete this entry?');
  if(!ok)return;
  flog.splice(idx,1);
  if(logEditIdx===idx)logEditIdx=-1;
  else if(logEditIdx>idx)logEditIdx--;
  tLg();
}

async function doVerifyOtp(){
  var em=ud.pendingLoginEmail;
  var inp=document.getElementById('otpIn');
  if(!inp||!em)return;
  var code=inp.value.replace(/\D/g,'');
  var de=lang==='de';
  if(code.length!==6){
    showE('eotp',de?'Bitte 6 Ziffern eingeben.':'Please enter 6 digits.');
    return;
  }
  var btn=document.getElementById('otpVerifyBtn');
  btn.textContent=de?'Prüfe...':'Verifying...';btn.style.opacity='.6';btn.disabled=true;
  try{
    var res=await fetch(BACKEND+'/auth/verify-otp',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:em,code:code})
    });
    var data=await res.json();
    if(!res.ok){
      var msg=data.error||(de?'Falscher Code':'Wrong code');
      if(data.code==='WRONG_CODE'&&typeof data.attemptsLeft==='number'){
        msg=de?('Falscher Code. Noch '+data.attemptsLeft+' Versuche.'):('Wrong code. '+data.attemptsLeft+' tries left.');
      }else if(data.code==='CODE_EXPIRED'){
        msg=de?'Code abgelaufen. Fordere einen neuen an.':'Code expired. Request a new one.';
      }else if(data.code==='TOO_MANY_ATTEMPTS'){
        msg=de?'Zu viele Versuche. Fordere einen neuen Code an.':'Too many attempts. Request a new code.';
      }
      throw new Error(msg);
    }
    if(!data.session||!data.session.access_token){
      throw new Error(de?'Login-Fehler.':'Login error.');
    }
    // Hand the tokens to the Supabase client — it will persist them and fire
    // the SIGNED_IN event which triggers loadAuthProfile.
    var setRes=await window.sb.auth.setSession({
      access_token:data.session.access_token,
      refresh_token:data.session.refresh_token,
    });
    if(setRes.error)throw new Error(setRes.error.message);
    ud.pendingLoginEmail=null;
    // Load profile + render dashboard
    var ok=await loadAuthProfile();
    if(!ok){
      peakToast(de?'Angemeldet ✓':'Signed in ✓',{kind:'success'});
    }
  }catch(err){
    showE('eotp',err.message);
    btn.textContent=de?'EINLOGGEN →':'SIGN IN →';btn.style.opacity='1';btn.disabled=false;
  }
}

// ── AUTH: profile loader + boot flow ──────────────────────────────────
// Called after Supabase session is established (via magic link, Google,
// or restored from localStorage). Loads profile row from backend and
// routes user into the dashboard (or onboarding if profile not found).

// Prevents double-calls from onAuthStateChange + bootApp racing each other
var __authLoading=false;

async function loadAuthProfile(){
  if(__authLoading)return true;
  __authLoading=true;
  var de=lang==='de';
  try{
    var sess=await window.sb.auth.getSession();
    var token=sess?.data?.session?.access_token;
    if(!token){__authLoading=false;return false;}

    var res=await fetch(BACKEND+'/user/profile',{
      headers:{Authorization:'Bearer '+token}
    });

    if(res.status===404){
      // Auth user exists but no profile row — signed in via Google without
      // going through Stripe. Show a clear "complete your signup" screen.
      var body=await res.json().catch(function(){return {};});
      if(body.email)ud.email=body.email;
      showNeedSubscription(body.email||'');
      __authLoading=false;
      return true;
    }
    if(!res.ok){
      console.error('Profile load failed:',res.status);
      __authLoading=false;
      return false;
    }

    var json=await res.json();
    var p=json.profile||{};

    // Hydrate app state from profile — all editable fields
    ud.email=p.email||'';
    ud.name=p.name||ud.name||'';
    if(p.goal)ud.goal=p.goal;
    if(Array.isArray(p.goals)&&p.goals.length)ud.goals=p.goals;
    else if(p.goal)ud.goals=[p.goal];
    if(p.sport)ud.sport=p.sport;
    if(p.age!==undefined&&p.age!==null)ud.age=p.age;
    if(p.gender)ud.gender=p.gender;
    if(p.weight!==undefined&&p.weight!==null)ud.weight=p.weight;
    if(p.dweight!==undefined&&p.dweight!==null)ud.dweight=p.dweight;
    if(p.height!==undefined&&p.height!==null)ud.height=p.height;
    if(p.sleep!==undefined&&p.sleep!==null)ud.sleep=p.sleep;
    if(p.job)ud.job=p.job;
    if(p.commute)ud.commute=p.commute;
    if(p.stress!==undefined&&p.stress!==null)ud.stress=p.stress;
    if(p.level)ud.level=p.level;
    if(p.sessions!==undefined&&p.sessions!==null)ud.sessions=p.sessions;
    if(p.dur!==undefined&&p.dur!==null)ud.dur=p.dur;
    if(p.equip)ud.equip=p.equip;
    if(Array.isArray(p.al))ud.al=p.al;
    if(Array.isArray(p.di))ud.di=p.di;
    if(Array.isArray(p.cu))ud.cu=p.cu;
    if(p.cook)ud.cook=p.cook;
    if(p.budget!==undefined&&p.budget!==null)ud.budget=p.budget;
    ud.tier=p.tier||'premium';
    ud.plan_generations_used=p.plan_generations_used||0;
    updateAuthUI();

    // Load training state from backend (overrides sessionStorage stub)
    await loadTrainingStateFromBackend();

    // Merge any saved onboarding data from sessionStorage (full profile)
    try{
      var saved=sessionStorage.getItem('pk_ud');
      if(saved){
        var s=JSON.parse(saved);
        Object.keys(s).forEach(function(k){
          if(s[k]&&!ud[k])ud[k]=s[k];
        });
      }
    }catch(e){}

    // Build plan + show dashboard
    document.getElementById('pb').style.width='100%';
    document.getElementById('sl').textContent=de?'Plan wird geladen...':'Loading plan...';
    card('<div class="lw"><div class="spin"></div><div class="lt">'+(de?'Lade dein Dashboard...':'Loading your dashboard...')+'</div></div>');

    if(ud.sport&&ud.goal){
      try{await fetchPlan();}catch(e){console.error('Plan fetch failed:',e);}
    }
    showDash();
    __authLoading=false;
    return true;
  }catch(err){
    console.error('loadAuthProfile error:',err);
    __authLoading=false;
    return false;
  }
}

  card('<div class="lw"><div class="spin"></div><div class="lt">'+(de?'Lade...':'Loading...')+'</div></div>');

  // Ensure clean starting state — prevents stale step from previous flow
  step=0;

  // Restore onboarding draft (so interrupted users resume where they were)
  loadSession();

  // Parse voucher code from URL parameter (?code=MICHI50 or ?voucher=MICHI50)
  try{
    var urlParams=new URLSearchParams(window.location.search);
    var urlCode=urlParams.get('code')||urlParams.get('voucher');
    if(urlCode){
      ud.voucherCode=urlCode.trim().toUpperCase();
      saveSession();
    }
  }catch(e){}

  // Stripe success redirect: session_id in URL means checkout just completed
  // → show success screen (step 8), user will get magic link via email
  if(window.location.search.includes('session_id')){
    step=8;render();return;
  }

  // Check for existing Supabase session (magic link, Google, or persisted)
  try{
    var sess=await window.sb.auth.getSession();
    if(sess?.data?.session){
      // Signed in — load profile and route appropriately
      var ok=await loadAuthProfile();
      if(ok){
        // Clean auth tokens from URL after magic link redirect
        if(window.location.hash||window.location.search.includes('code=')){
          window.history.replaceState({},document.title,window.location.pathname);
        }
        return;
      }
    }
  }catch(e){console.error('Session check error:',e);}

  // No session — show intro screen as entry point
  step=0;render();
}

// Listen for auth state changes (e.g., after OAuth redirect completes).
// bootApp() already handles the initial session, so we only react to
// fresh SIGNED_IN events that happen AFTER initial page load.
// Skip reload if we're already loaded (prevents tab-switch flicker).
var __bootDone=false;
window.sb.auth.onAuthStateChange(function(event,session){
  if(!__bootDone)return; // skip events fired during bootApp
  if(event==='SIGNED_IN'&&session){
    // If we already have the user's email + plan, this is just a token
    // refresh or tab-focus event — don't trigger a full reload.
    if(ud.email&&plan)return;
    loadAuthProfile();
  }
});

function profValue(key){

    commute:{car:['Car','Auto'],bus:['Bus/Train','Bus/Zug'],walk:['Walking','Zu Fuß'],bike:['Cycling','Fahrrad']},
    equip:{gym:['Gym','Fitnessstudio'],hm:['Home','Zuhause'],out:['Outdoors','Draußen']}
  };
  if(ENUMS[key]&&v){
    for(var k in ENUMS[key]){

        return lang==='de'?ENUMS[key][k][1]:ENUMS[key][k][0];

  if(key==='weight'||key==='dweight')return v+' kg';

  if(key==='sleep')return v+' h';
  if(key==='dur')return v+' min';

  if(key==='budget')return v?'€'+v+(lang==='de'?' / Woche':' / week'):'—';

function toggleProfChip(key, value, el){
  var hidden=document.getElementById('pe_'+key);
  if(!hidden)return;
  var arr=hidden.value?hidden.value.split('||').filter(Boolean):[];
  var idx=arr.indexOf(value);
  if(idx>=0){
    arr.splice(idx,1);
    el.classList.remove('sel');
  }else{
    arr.push(value);
    el.classList.add('sel');
  }
  hidden.value=arr.join('||');
}

async function saveProfile(key){
  var inp=document.getElementById('pe_'+key);
  if(!inp)return;
  var raw=inp.value;
  var newVal;
  if(['age','weight','dweight','height','sleep','sessions','dur','stress','budget'].indexOf(key)>=0){
    newVal=raw===''?null:parseFloat(raw);
    if(newVal!==null&&(isNaN(newVal)||newVal<0)){
      peakToast(lang==='de'?'Bitte gültige Zahl eingeben.':'Please enter a valid number.');
      return;
    }
  }else if(key==='al'||key==='di'||key==='cu'){
    var rawArr=raw?raw.split('||').map(function(s){return s.trim();}).filter(Boolean):[];
    // Dedupe case-insensitively: keep first occurrence (normalized casing from chips)
    var seen={};
    newVal=rawArr.filter(function(v){
      var k=v.toLowerCase();
      if(seen[k])return false;
      seen[k]=true;
      return true;
    });
  }else{
    newVal=raw.trim();
  }

  try{
    var sess=await window.sb.auth.getSession();
    var tok=sess?.data?.session?.access_token;
    if(!tok){peakToast(lang==='de'?'Nicht eingeloggt.':'Not logged in.');return;}
    var body={};
    body[key]=newVal;
    var res=await fetch(BACKEND+'/user/update-profile',{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      var err=await res.json().catch(function(){return {};});
      throw new Error(err.error||'Save failed');
    }
    // Update local state
    ud[key]=newVal;
    // If the primary goal changed, keep goals[0] in sync so AI prompts see
    // the updated primary first.
    if(key==='goal'){
      if(!Array.isArray(ud.goals))ud.goals=[];
      if(ud.goals.length===0)ud.goals.push(newVal);
      else ud.goals[0]=newVal;
      // Persist updated goals array to backend
      try{
        await fetch(BACKEND+'/user/update-profile',{
          method:'POST',
          headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok},
          body:JSON.stringify({goals:ud.goals})
        });
      }catch(_){}
    }
    saveSession();
    if(key==='name')updateAuthUI(); // Initials might change
    profEditing=null;
    peakToast(lang==='de'?'Gespeichert ✓':'Saved ✓',{kind:'success',duration:1800});
    showProfile();
  }catch(e){
    console.error('saveProfile error:',e);
    peakToast(lang==='de'?'Fehler beim Speichern.':'Could not save.');
  }
}

async function regenPlan(){

}

// Force-updates the SW on every page load so new deploys reach users

    navigator.serviceWorker.register('/service-worker.js').then(function(reg){
      console.log('[PWA] Service worker registered:',reg.scope);
      // Check for updates on every load
      reg.update();
      // If a new SW is waiting, tell it to activate + reload page
      if(reg.waiting){reg.waiting.postMessage({type:'SKIP_WAITING'});}
      reg.addEventListener('updatefound',function(){
        var newWorker=reg.installing;
        if(!newWorker)return;
        newWorker.addEventListener('statechange',function(){
          if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
            // New SW is ready — activate it
            newWorker.postMessage({type:'SKIP_WAITING'});
          }
        });
      });
    }).catch(function(err){
      console.warn('[PWA] Service worker registration failed:',err);
    });
    // When the new SW takes control, reload once so user sees fresh content
    var refreshed=false;

  });

          '</div>'+
          '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
            '<button id="pkCkSet" style="background:transparent;border:1px solid #555;color:#ddd;padding:10px 14px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">'+t.settings+'</button>'+
            '<button id="pkCkRej" style="background:#2a2a2a;border:1px solid #555;color:#fff;padding:10px 14px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">'+t.rejectOpt+'</button>'+
            '<button id="pkCkAcc" style="background:#E8001A;border:none;color:#fff;padding:10px 16px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">'+t.acceptAll+'</button>'+
          '</div>'+
        '</div>'+
      '</div>';

    // Detailed view
    function row(key,ti,ds,checked,disabled){
      return '<label for="pkCk_'+key+'" style="display:flex;gap:12px;padding:12px;margin-bottom:8px;background:rgba(255,255,255,.04);border:1px solid #333;cursor:'+(disabled?'default':'pointer')+'">'+
        '<input type="checkbox" id="pkCk_'+key+'" '+(checked?'checked':'')+' '+(disabled?'disabled':'')+' style="margin-top:3px;width:18px;height:18px;accent-color:#E8001A;flex-shrink:0">'+
        '<div>'+
          '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#fff;margin-bottom:3px">'+ti+(disabled?' <span style="color:#E8001A;font-size:10px">('+(de?'erforderlich':'required')+')</span>':'')+'</div>'+
          '<div style="font-size:12px;color:#aaa;line-height:1.4">'+ds+'</div>'+
        '</div>'+
      '</label>';
    }
    var detail=
      '<div id="pkCookieDetail" style="display:none;padding:22px;max-width:540px;margin:0 auto">'+
        '<div style="font-family:\'Barlow Condensed\',Arial,sans-serif;font-weight:900;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#E8001A;margin-bottom:12px">🔒 '+t.settings+'</div>'+
        row('es',t.essential,t.essentialDesc,true,true)+
        row('an',t.analytics,t.analyticsDesc,!!existing.analytics,false)+
        row('mk',t.marketing,t.marketingDesc,!!existing.marketing,false)+
        '<div style="display:flex;gap:8px;margin-top:14px">'+
          '<button id="pkCkSave" style="flex:1;background:#E8001A;border:none;color:#fff;padding:12px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">'+t.save+'</button>'+
          '<button id="pkCkAcc2" style="flex:1;background:transparent;border:1px solid #555;color:#ddd;padding:12px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">'+t.acceptAll+'</button>'+
        '</div>'+
      '</div>';

    wrap.innerHTML=compact+detail;
    document.body.appendChild(wrap);

    function close(){if(wrap.parentNode)wrap.parentNode.removeChild(wrap);}
    document.getElementById('pkCkAcc').onclick=function(){setConsent({analytics:true,marketing:true});close();};
    document.getElementById('pkCkRej').onclick=function(){setConsent({analytics:false,marketing:false});close();};
    document.getElementById('pkCkSet').onclick=function(){
      document.getElementById('pkCookieCompact').style.display='none';
      document.getElementById('pkCookieDetail').style.display='block';
    };
    document.getElementById('pkCkSave').onclick=function(){
      setConsent({
        analytics:document.getElementById('pkCk_an').checked,
        marketing:document.getElementById('pkCk_mk').checked
      });
      close();
    };
    document.getElementById('pkCkAcc2').onclick=function(){setConsent({analytics:true,marketing:true});close();};
  }

  // Show on first load if no decision yet
  if(!getConsent()){
    window.addEventListener('load',function(){
      setTimeout(showBanner,800); // Short delay so page paints first
    });
  }
})();

// ── PWA: Install Prompt ──────────────────────────────────────────────────
// Chrome/Edge/Android: fire beforeinstallprompt event → one-tap install
// iOS Safari: no event, show step-by-step visual instructions
// All users: big prominent install button + full instruction modal
// ─────────────────────────────────────────────────────────────────────────
(function(){
  var deferredPrompt=null;
  var ua=navigator.userAgent;
  var isIOS=/iPad|iPhone|iPod/.test(ua)&&!window.MSStream;
  var isAndroid=/Android/i.test(ua);
  var isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  var DISMISS_KEY='peak-install-dismissed';

  // Don't show install UI if already installed
  if(isStandalone)return;

  // Capture Chrome/Android prompt
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    deferredPrompt=e;
    showInstallBadge();
  });

  window.addEventListener('appinstalled',function(){
    deferredPrompt=null;
    hideInstallBadge();
    try{
      if(typeof peakToast==='function'){
        peakToast(
          (typeof lang!=='undefined'&&lang==='de')?'App installiert ✓':'App installed ✓',
          {kind:'success',duration:2500}
        );
      }
    }catch(_){}
  });

  // iOS has no beforeinstallprompt → show badge after short delay
  if(isIOS&&!localStorage.getItem(DISMISS_KEY)){
    setTimeout(function(){
      if(isStandalone)return;
      showInstallBadge();
    },5000);
  }

  // Expose manual trigger (e.g. bindable from a settings menu button)
  window.openInstallPrompt=showInstallModal;

  function showInstallBadge(){
    if(document.getElementById('pwaInstallBadge'))return;
    if(localStorage.getItem(DISMISS_KEY))return;
    var de=typeof lang!=='undefined'&&lang==='de';
    var badge=document.createElement('div');
    badge.id='pwaInstallBadge';
    badge.style.cssText='position:fixed;bottom:88px;right:22px;z-index:9998;background:linear-gradient(135deg,#E8001A 0%,#B80015 100%);color:#fff;padding:14px 18px 14px 14px;font-family:"Barlow Condensed",Arial,sans-serif;font-weight:900;font-size:13px;letter-spacing:1.8px;text-transform:uppercase;cursor:pointer;box-shadow:0 8px 24px rgba(232,0,26,.35),0 2px 8px rgba(0,0,0,.2);display:flex;align-items:center;gap:12px;user-select:none;max-width:calc(100vw - 44px);border:2px solid #fff;border-radius:12px';
    badge.innerHTML=
      '<div style="background:#fff;color:#E8001A;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;border-radius:50%">📲</div>'+
      '<div style="line-height:1.25">'+
        '<div style="font-size:11px;opacity:.85;letter-spacing:2px">PEAK</div>'+
        '<div>'+(de?'App installieren':'Install app')+'</div>'+
      '</div>'+
      '<span id="pwaBadgeClose" style="opacity:.75;margin-left:4px;font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;align-self:flex-start">×</span>';
    badge.onclick=function(e){
      if(e.target&&e.target.id==='pwaBadgeClose')return;
      showInstallModal();
    };
    document.body.appendChild(badge);
    // Close button dismisses permanently
    document.getElementById('pwaBadgeClose').onclick=function(e){
      e.stopPropagation();
      localStorage.setItem(DISMISS_KEY,'1');
      hideInstallBadge();
    };
  }

  function hideInstallBadge(){
    var b=document.getElementById('pwaInstallBadge');
    if(b)b.remove();
  }

  function showInstallModal(){
    if(document.getElementById('pwaInstallModal'))return;
    var de=typeof lang!=='undefined'&&lang==='de';

    var title=de?'PEAK als App installieren':'Install PEAK as an app';
    var sub=de
      ?'Schneller starten, Vollbild-Modus, offline-fähig — wie eine echte App auf deinem Gerät.'
      :'Faster start, full-screen mode, works offline — like a real app on your device.';
    var benefits=de
      ?['⚡ Schnellerer Start','📱 Vollbild ohne Browser','🔔 Push-Benachrichtigungen','💾 Offline verfügbar']
      :['⚡ Faster startup','📱 Full-screen no browser','🔔 Push notifications','💾 Works offline'];

    // Device-specific instruction blocks
    var iosSteps=de?[
      {n:'1',t:'Tippe auf "Teilen"',d:'Das Symbol unten mittig in Safari ⬆︎'},
      {n:'2',t:'Wähle "Zum Home-Bildschirm"',d:'Scroll nach unten im Menü'},
      {n:'3',t:'Tippe "Hinzufügen"',d:'Oben rechts bestätigen'}
    ]:[
      {n:'1',t:'Tap "Share"',d:'The icon at bottom-center in Safari ⬆︎'},
      {n:'2',t:'Pick "Add to Home Screen"',d:'Scroll down in the menu'},
      {n:'3',t:'Tap "Add"',d:'Confirm top-right'}
    ];

    var androidSteps=de?[
      {n:'1',t:'Tippe auf "Installieren"',d:'Der rote Button unten'},
      {n:'2',t:'Bestätige im Dialog',d:'Chrome fragt nach Bestätigung'},
      {n:'3',t:'Fertig!',d:'PEAK erscheint auf deinem Home-Bildschirm'}
    ]:[
      {n:'1',t:'Tap "Install"',d:'The red button below'},
      {n:'2',t:'Confirm in dialog',d:'Chrome will ask for confirmation'},
      {n:'3',t:'Done!',d:'PEAK appears on your home screen'}
    ];

    var desktopSteps=de?[
      {n:'1',t:'Klick auf "Installieren"',d:'Der rote Button unten'},
      {n:'2',t:'Bestätige im Dialog',d:'Der Browser fragt nach Erlaubnis'},
      {n:'3',t:'Fertig!',d:'PEAK erscheint als eigene App'}
    ]:[
      {n:'1',t:'Click "Install"',d:'The red button below'},
      {n:'2',t:'Confirm in dialog',d:'Your browser will ask for permission'},
      {n:'3',t:'Done!',d:'PEAK launches as its own app'}
    ];

    var steps=isIOS?iosSteps:(deferredPrompt||isAndroid?androidSteps:desktopSteps);

    var stepHtml=steps.map(function(s){
      return '<div style="display:flex;gap:14px;margin-bottom:14px;align-items:flex-start">'+
        '<div style="background:#E8001A;color:#fff;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:15px;flex-shrink:0">'+s.n+'</div>'+
        '<div style="flex:1">'+
          '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--white);margin-bottom:3px">'+s.t+'</div>'+
          '<div style="font-size:12px;color:var(--dim);line-height:1.45">'+s.d+'</div>'+
        '</div>'+
      '</div>';
    }).join('');

    var benefitsHtml=benefits.map(function(b){
      return '<div style="background:var(--s0);border-left:2px solid var(--red);padding:9px 12px;font-size:12px;color:var(--white)">'+b+'</div>';
    }).join('');

    // Primary action: one-tap install on Chrome/Android, nothing for iOS
    var primaryBtn='';
    if(deferredPrompt){
      primaryBtn='<button id="pwaModalInstall" style="flex:1;background:#E8001A;color:#fff;border:none;padding:14px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer">'+(de?'📲 Jetzt installieren':'📲 Install now')+'</button>';
    }
    var closeBtn='<button id="pwaModalClose" style="flex:'+(deferredPrompt?'1':'2')+';background:var(--s3);color:var(--dim);border:1px solid var(--border);padding:14px;font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">'+(de?'Schließen':'Close')+'</button>';

    var wrap=document.createElement('div');
    wrap.id='pwaInstallModal';
    wrap.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10003;display:flex;align-items:center;justify-content:center;padding:16px;font-family:Barlow,sans-serif;overflow-y:auto';
    wrap.innerHTML=
      '<div style="background:var(--s1);border-left:3px solid var(--red);padding:26px 24px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;color:var(--white)">'+
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);margin-bottom:6px">📲 PEAK</div>'+
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:22px;letter-spacing:.5px;line-height:1.1;color:var(--white);margin-bottom:8px;text-transform:uppercase">'+title+'</div>'+
        '<div style="font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:18px">'+sub+'</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:20px">'+benefitsHtml+'</div>'+
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">'+(de?'So geht\'s':'How to')+'</div>'+
        stepHtml+
        '<div style="display:flex;gap:8px;margin-top:18px">'+primaryBtn+closeBtn+'</div>'+
      '</div>';
    document.body.appendChild(wrap);

    function close(){if(wrap.parentNode)wrap.parentNode.removeChild(wrap);}
    if(deferredPrompt){
      document.getElementById('pwaModalInstall').onclick=function(){
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(){
          deferredPrompt=null;
          close();
          hideInstallBadge();
        });
      };
    }
    document.getElementById('pwaModalClose').onclick=close;
    wrap.onclick=function(e){if(e.target===wrap)close();};
  }
})();
</script>
</body>
</html>
