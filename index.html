<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEAK — Your AI Life Coach</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F9F9F7;--white:#FFFFFF;--ink:#1C1C1A;--ink-light:#6B6B68;--ink-faint:#BDBDB8;--accent:#2D6A4F;--accent-light:#EAF4EE;--accent-mid:#52B788;--warn:#E76F51;--warn-light:#FEF0EC;--gold:#C8920A;--gold-light:#FDF6E3;--border:#E8E8E3;--shadow:0 4px 32px rgba(0,0,0,0.07);--radius:16px}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;gap:16px}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);flex-shrink:0}.logo span{color:var(--accent)}
.progress-bar-wrap{flex:1;max-width:320px}
.progress-bar-track{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.5s ease}
.topbar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.step-label{font-size:13px;color:var(--ink-light);font-weight:500;white-space:nowrap}
.lang-btn{font-size:12px;color:var(--ink-light);cursor:pointer;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:none;font-family:'DM Sans',sans-serif}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.topbar-login{font-size:13px;color:var(--accent);font-weight:600;cursor:pointer;padding:8px 16px;border:1.5px solid var(--accent);border-radius:10px;background:none;font-family:'DM Sans',sans-serif}
.topbar-login:hover{background:var(--accent-light)}

/* MAIN LAYOUT */
.main{display:flex;align-items:flex-start;justify-content:center;padding:40px 24px;min-height:calc(100vh - 73px)}
.card{background:var(--white);border-radius:24px;box-shadow:var(--shadow);border:1px solid var(--border);width:100%;max-width:640px;overflow:hidden;animation:slideUp 0.4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:36px 44px 0}.card-body{padding:24px 44px}.card-footer{padding:4px 44px 32px;display:flex;align-items:center;gap:12px}

/* TYPOGRAPHY */
.step-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;padding:5px 12px;border-radius:100px;margin-bottom:12px}
.card-title{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.2;margin-bottom:6px}.card-title em{font-style:italic;color:var(--accent)}
.card-sub{font-size:14px;color:var(--ink-light);line-height:1.65}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:10px;margin-top:20px}

/* FORM */
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
input[type="text"],input[type="number"],input[type="email"],input[type="password"],textarea,select{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);background:var(--white);outline:none;transition:border-color 0.2s;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--ink-faint)}
textarea{resize:vertical;min-height:80px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.input-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.unit-input{position:relative;display:flex;align-items:center}.unit-input input{padding-right:48px}
.unit-tag{position:absolute;right:14px;font-size:13px;font-weight:500;color:var(--ink-faint);pointer-events:none}

/* TILES */
.tiles{display:grid;gap:8px}.tiles.cols-2{grid-template-columns:1fr 1fr}.tiles.cols-3{grid-template-columns:1fr 1fr 1fr}.tiles.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
.tile{border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all 0.17s;display:flex;align-items:center;gap:9px;user-select:none}
.tile:hover{border-color:var(--accent-mid);background:var(--accent-light)}.tile.selected{border-color:var(--accent);background:var(--accent-light)}.tile.selected .tile-check{opacity:1}
.tile-icon{font-size:18px;flex-shrink:0}.tile-text{flex:1}.tile-label{font-size:13px;font-weight:600;line-height:1.2}.tile-desc{font-size:11px;color:var(--ink-light);margin-top:2px}
.tile-check{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;opacity:0;transition:opacity 0.2s;flex-shrink:0}
.sport-tile{border:1.5px solid var(--border);border-radius:12px;padding:12px 8px;cursor:pointer;transition:all 0.17s;text-align:center;user-select:none}
.sport-tile:hover{border-color:var(--accent-mid);background:var(--accent-light)}.sport-tile.selected{border-color:var(--accent);background:var(--accent-light)}
.sport-emoji{font-size:24px;display:block;margin-bottom:4px}.sport-name{font-size:11px;font-weight:600}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 13px;border:1.5px solid var(--border);border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.17s;color:var(--ink);user-select:none}
.chip:hover{border-color:var(--accent-mid)}.chip.selected{background:var(--warn);border-color:var(--warn);color:#fff}
.chip.diet-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.cuisine-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.sport-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}

/* SLIDER */
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-light);margin-bottom:5px}
input[type="range"]{width:100%;height:4px;-webkit-appearance:none;background:var(--border);border-radius:4px;outline:none;border:none;padding:0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(45,106,79,.3);border:3px solid #fff}
.slider-value{text-align:center;font-size:20px;font-weight:600;color:var(--accent);margin-top:6px;font-family:'DM Serif Display',serif}

/* BUTTONS */
.btn-back{background:none;border:1.5px solid var(--border);color:var(--ink-light);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:11px 18px;border-radius:11px;cursor:pointer;transition:all 0.17s;flex-shrink:0}
.btn-back:hover{border-color:var(--ink-light);color:var(--ink)}
.btn-next{flex:1;background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:13px 22px;border-radius:11px;cursor:pointer;transition:all 0.17s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-next:hover{background:#235C41;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,106,79,.25)}
.btn-google{width:100%;background:var(--white);color:var(--ink);border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:13px 22px;border-radius:11px;cursor:pointer;transition:all 0.17s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.btn-google:hover{border-color:var(--accent-mid);background:var(--accent-light)}
.btn-secondary{background:var(--accent-light);color:var(--accent);border:1.5px solid var(--accent-mid);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:11px 18px;border-radius:11px;cursor:pointer;transition:all 0.17s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary:hover{background:var(--accent);color:#fff}
.btn-warn{background:var(--warn);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:11px 18px;border-radius:11px;cursor:pointer}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:var(--ink-faint);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* AI BUBBLE */
.ai-bubble{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:14px 14px 14px 4px;padding:14px 18px;margin-bottom:18px}
.ai-bubble-label{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-mid);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-bubble p{font-size:14px;line-height:1.65;color:var(--ink)}

/* GOAL CARDS */
.goal-card{border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;cursor:pointer;transition:all 0.17s;margin-bottom:8px;display:flex;align-items:center;gap:11px}
.goal-card:hover{border-color:var(--accent-mid);background:var(--accent-light)}.goal-card.selected{border-color:var(--accent);background:var(--accent-light)}.goal-card.selected .goal-radio{background:var(--accent);border-color:var(--accent)}.goal-card.selected .goal-radio::after{opacity:1}
.goal-emoji{font-size:22px}.goal-info{flex:1}.goal-title{font-size:14px;font-weight:600}.goal-desc{font-size:12px;color:var(--ink-light);margin-top:2px}
.goal-radio{width:19px;height:19px;border-radius:50%;border:2px solid var(--border);position:relative;transition:all 0.2s;flex-shrink:0}
.goal-radio::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:#fff;opacity:0;transition:opacity 0.2s}

/* LOADING */
.loading-wrap{padding:56px 44px;text-align:center}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);margin-bottom:8px}
.loading-sub{font-size:14px;color:var(--ink-light)}
.loading-step{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--ink-faint);transition:color 0.3s}
.loading-step.done{color:var(--accent)}.loading-step.active{color:var(--ink);font-weight:500}

/* PAYWALL */
.plan-preview{position:relative;margin-bottom:4px}
.plan-preview-blur{filter:blur(5px);pointer-events:none;user-select:none;border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--bg)}
.preview-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}.preview-row:last-child{border-bottom:none}
.preview-label{font-size:12px;color:var(--ink-light)}.preview-val{font-size:14px;font-weight:600}
.preview-meal{background:var(--white);border-radius:9px;padding:10px 12px;margin-top:6px}
.preview-meal-name{font-weight:600;font-size:13px}.preview-meal-macro{font-size:11px;color:var(--ink-light);margin-top:2px}
.paywall-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(249,249,247,0) 0%,rgba(249,249,247,0.92) 30%,rgba(249,249,247,1) 55%);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:18px}
.lock-icon{font-size:26px;margin-bottom:8px}
.paywall-title{font-family:'DM Serif Display',serif;font-size:20px;text-align:center;margin-bottom:5px}
.paywall-sub{font-size:13px;color:var(--ink-light);text-align:center;margin-bottom:16px;line-height:1.5}
.pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;width:100%}
.price-card{border:1.5px solid var(--border);border-radius:13px;padding:14px 12px;cursor:pointer;transition:all 0.2s;text-align:center;position:relative}
.price-card:hover{border-color:var(--accent-mid)}.price-card.selected{border-color:var(--accent);background:var(--accent-light)}
.popular-badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:2px 9px;border-radius:100px;white-space:nowrap}
.price-period{font-size:11px;color:var(--ink-light);font-weight:500;margin-bottom:3px}
.price-amount{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink)}.price-amount span{font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--ink-light)}
.price-saving{font-size:10px;color:var(--accent);font-weight:600;margin-top:3px;min-height:14px}
.trial-badge{background:var(--gold-light);border:1px solid #F0D080;border-radius:9px;padding:9px 13px;display:flex;align-items:center;gap:9px;margin-bottom:12px;width:100%}
.trial-badge-icon{font-size:18px;flex-shrink:0}.trial-badge-text{font-size:12px;color:var(--ink);line-height:1.4}.trial-badge-text strong{color:var(--gold)}
.features-mini{list-style:none;margin-bottom:12px;width:100%}
.features-mini li{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink);padding:3px 0}
.features-mini li::before{content:'✓';color:var(--accent);font-weight:700;font-size:11px;flex-shrink:0}
.btn-pay{width:100%;background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;padding:15px 22px;border-radius:13px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:9px}
.btn-pay:hover{background:#235C41;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,106,79,.3)}
.secure-note{font-size:11px;color:var(--ink-faint);text-align:center}
.error-box{background:#FEF0EC;border:1px solid #F4C5B5;border-radius:11px;padding:12px 14px;font-size:13px;color:#C0392B;margin-bottom:14px;display:none}

/* DASHBOARD */
.dashboard{padding:0}
.dash-header{background:var(--accent);padding:28px 28px 22px;color:#fff}
.dash-greeting{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:3px}
.dash-sub{font-size:13px;opacity:0.8}
.dash-nav{display:flex;gap:4px;padding:12px 20px;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto}
.dash-nav::-webkit-scrollbar{display:none}
.nav-tab{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--ink-light);transition:all 0.17s;border:none;background:none;font-family:'DM Sans',sans-serif}
.nav-tab:hover{background:var(--accent-light);color:var(--accent)}
.nav-tab.active{background:var(--accent);color:#fff}
.dash-body{padding:22px 24px}
.dash-section{margin-bottom:22px}
.dash-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:12px 14px}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:3px}
.stat-value{font-size:16px;font-weight:600;color:var(--ink)}
.meal-card{background:var(--white);border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:11px}
.meal-emoji{font-size:22px}.meal-info{flex:1}.meal-name{font-size:13px;font-weight:600}.meal-meta{font-size:11px;color:var(--ink-light);margin-top:2px}
.meal-kcal{font-size:12px;font-weight:600;color:var(--accent)}
.rating-row{display:flex;gap:4px;margin-top:6px}
.star{font-size:16px;cursor:pointer;opacity:0.3;transition:opacity 0.15s}.star.active{opacity:1}
.workout-card{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:11px;padding:14px 16px;margin-bottom:9px}
.workout-card-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:3px}
.workout-card-desc{font-size:12px;color:var(--ink);line-height:1.5}
.recovery-card{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:9px}
.recovery-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.recovery-desc{font-size:12px;color:var(--ink-light);line-height:1.5}
.btn-logout{width:100%;background:none;border:1.5px solid var(--border);color:var(--ink-light);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:11px;border-radius:11px;cursor:pointer;margin-top:6px}
.btn-logout:hover{border-color:var(--warn);color:var(--warn)}

/* SCANNER */
.scanner-box{background:var(--ink);border-radius:16px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;overflow:hidden}
.scanner-frame{border:3px solid var(--accent-mid);width:60%;height:60%;border-radius:8px;position:relative}
.scanner-frame::before,.scanner-frame::after{content:'';position:absolute;background:var(--accent-mid)}
.scanner-frame::before{height:3px;width:20%;top:-3px;left:50%;transform:translateX(-50%);animation:scan 2s ease-in-out infinite}
@keyframes scan{0%,100%{top:-3px}50%{top:calc(100% + 3px)}}
.scanner-text{color:rgba(255,255,255,0.7);font-size:13px;margin-top:12px;text-align:center}
.scan-result{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:12px;padding:14px 16px;margin-bottom:14px}
.scan-result-name{font-size:15px;font-weight:600;margin-bottom:4px}
.scan-result-macros{font-size:12px;color:var(--ink-light)}
.scan-fit{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;margin-top:6px}
.scan-fit.good{background:#D4EDDA;color:#155724}
.scan-fit.bad{background:#F8D7DA;color:#721C24}

/* RECIPE BUILDER */
.recipe-step{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:9px;display:flex;align-items:flex-start;gap:12px}
.recipe-step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.recipe-step-text{flex:1;font-size:13px;line-height:1.5}
.ingredient-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ingredient-row input{flex:1}
.ingredient-row .qty{width:80px;flex:none}
.ingredient-row .unit{width:80px;flex:none}
.remove-btn{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:18px;padding:0;line-height:1}
.remove-btn:hover{color:var(--warn)}

/* LOG */
.log-entry{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.log-entry-icon{font-size:20px}.log-entry-info{flex:1}.log-entry-text{font-size:13px;font-weight:500}.log-entry-cal{font-size:11px;color:var(--ink-light);margin-top:2px}
.log-entry-kcal{font-size:12px;font-weight:600;color:var(--accent)}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.summary-item{background:var(--bg);border-radius:11px;padding:13px 15px;border:1px solid var(--border)}
.summary-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);margin-bottom:3px}
.summary-value{font-size:15px;font-weight:600;color:var(--ink)}
.plan-revealed{background:var(--accent-light);border:1px solid #C8E6D4;border-radius:14px;padding:18px}
.plan-revealed h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:12px}
.plan-meal{background:var(--white);border-radius:9px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px}.plan-meal:last-child{margin-bottom:0}
.plan-meal-emoji{font-size:20px}.plan-meal-info{flex:1}.plan-meal-name{font-size:13px;font-weight:600}.plan-meal-macro{font-size:11px;color:var(--ink-light);margin-top:2px}
.plan-meal-kcal{font-size:12px;font-weight:600;color:var(--accent)}
.milestone-list{list-style:none}
.milestone-list li{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}.milestone-list li:last-child{border-bottom:none}

  document.getElementById('scannerResult').innerHTML='<div class="scan-result"><div class="scan-result-name">'+food.brand+' — '+food.name+'</div><div class="scan-result-macros">'+food.kcal+' kcal · '+food.protein+'g protein · '+food.carbs+'g carbs · '+food.fat+'g fat</div><div class="scan-fit '+(food.fit?'good':'bad')+'">'+(food.fit?'✓ Fits your plan today':'⚠ High in sugar/calories')+'</div><div style="margin-top:10px;display:flex;gap:8px"><button class="btn-secondary" style="flex:1;font-size:12px;padding:8px" onclick="logFood(\''+food.name+'\','+food.kcal+')">Log it</button><button class="btn-secondary" style="flex:1;font-size:12px;padding:8px" onclick="showRecipeSuggestion(\''+food.name+'\')">Find recipes →</button></div></div>';
}

}

function shopMode(){
  document.getElementById('scannerResult').innerHTML='<div class="ai-bubble"><div class="ai-bubble-label"><div class="ai-dot"></div>Live Shopping Mode</div><p>Scan any item in the store. I\'ll tell you if it fits your plan and suggest recipes you can complete with it.</p></div><div style="text-align:center;padding:16px;background:var(--bg);border-radius:12px;border:1px dashed var(--border)"><div style="font-size:32px;margin-bottom:8px">🛒</div><div style="font-size:13px;color:var(--ink-light)">Tap the scanner below to simulate scanning a product in-store</div></div>';
}

function showRecipeSuggestion(ingredient){
  document.getElementById('scannerResult').innerHTML='<div class="ai-bubble"><div class="ai-bubble-label"><div class="ai-dot"></div>Recipe Suggestions</div><p><strong>Recipes using '+ingredient+':</strong></p><div style="margin-top:8px">'+['Quick stir-fry bowl (20 min)','Protein smoothie (5 min)','Overnight oats with '+ingredient+' (5 min prep)'].map(function(r){return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">🍳 '+r+'</span><button class="btn-secondary" style="font-size:11px;padding:5px 10px">View</button></div>';}).join('')+'</div></div>';

function renderLog(){
  var content='<div class="field"><label>'+t('quickLog')+'</label><textarea id="logInput" placeholder="'+t('logPlaceholder')+'" style="margin-bottom:8px"></textarea><button class="btn-next" style="width:100%" onclick="addLogEntry()">'+t('logBtn')+'</button></div>';
  if(foodLog.length>0){
    content+='<div class="dash-section-title" style="margin-top:16px">Today\'s Log</div>';
    content+=foodLog.map(function(e,i){return '<div class="log-entry"><span class="log-entry-icon">'+e.emoji+'</span><div class="log-entry-info"><div class="log-entry-text">'+e.text+'</div><div class="log-entry-cal">'+e.time+'</div></div><span class="log-entry-kcal">~'+e.kcal+' kcal</span></div>';}).join('');
    var total=foodLog.reduce(function(a,e){return a+e.kcal;},0);
    content+='<div style="text-align:right;font-size:13px;font-weight:600;color:var(--accent);margin-top:8px">Total logged: ~'+total+' kcal</div>';
  } else {
    content+='<div style="text-align:center;padding:24px;color:var(--ink-faint);font-size:13px">Nothing logged yet today.<br>Be honest — even the beers count! 🍺</div>';
  }
  dashShell('log',content);
}

function addLogEntry(){
  var input=document.getElementById('logInput').value;
  if(!input.trim()) return;
  var emojis={'beer':'🍺','bier':'🍺','wine':'🍷','coffee':'☕','kaffee':'☕','pizza':'🍕','burger':'🍔','salad':'🥗','water':'💧','wasser':'💧','snack':'🍿','chocolate':'🍫','schokolade':'🍫'};
  var emoji='🍽️';
  var lwr=input.toLowerCase();
  for(var k in emojis){if(lwr.includes(k)){emoji=emojis[k];break;}}
  var kcal=Math.floor(Math.random()*300)+100;
  foodLog.push({text:input,emoji:emoji,kcal:kcal,time:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})});
  renderLog();
}

function logFood(name,kcal){foodLog.push({text:name,emoji:'📦',kcal:kcal,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});}

function renderRecipes(){
  var content='<div class="ai-bubble" style="margin-bottom:16px"><div class="ai-bubble-label"><div class="ai-dot"></div>'+t('recipeBuilder')+'</div><p>Tell me what you\'re in the mood for and I\'ll build a recipe that fits your macros and taste.</p></div>';
  content+='<div class="field"><label>What are you in the mood for?</label><input id="moodInput" placeholder="e.g. Mexican, something with chicken, quick pasta..."></div>';
  content+='<button class="btn-next" style="width:100%;margin-bottom:16px" onclick="generateMoodRecipe()">'+t('generateRecipe')+'</button>';
  content+='<div id="recipeResult"></div>';
  content+='<div class="dash-section-title" style="margin-top:4px">Quick Recipe Builder</div>';
  content+='<div id="ingredients">';
  content+='<div class="ingredient-row"><input class="ingredient-name" placeholder="'+t('ingredient')+'"><input class="qty" type="number" placeholder="'+t('qty')+'"><input class="unit" placeholder="'+t('unit')+'"><button class="remove-btn" onclick="removeIngredient(this)">×</button></div>';
  content+='</div>';
  content+='<button class="btn-secondary" style="width:100%;margin-top:8px;margin-bottom:12px" onclick="addIngredient()">'+t('addIngredient')+'</button>';
  content+='<button class="btn-next" style="width:100%" onclick="buildRecipe()">🍳 Build Recipe</button>';
  content+='<div id="builtRecipe" style="margin-top:14px"></div>';
  dashShell('recipes',content);
}

function addIngredient(){var row=document.createElement('div');row.className='ingredient-row';row.innerHTML='<input class="ingredient-name" placeholder="'+t('ingredient')+'"><input class="qty" type="number" placeholder="'+t('qty')+'"><input class="unit" placeholder="'+t('unit')+'"><button class="remove-btn" onclick="removeIngredient(this)">×</button>';document.getElementById('ingredients').appendChild(row);}
function removeIngredient(btn){if(document.querySelectorAll('.ingredient-row').length>1)btn.parentElement.remove();}

async function generateMoodRecipe(){
  var mood=document.getElementById('moodInput').value;
  if(!mood.trim()){alert('Please enter a mood or craving.');return;}
  var result=document.getElementById('recipeResult');
  result.innerHTML='<div class="ai-bubble"><div class="ai-bubble-label"><div class="ai-dot"></div>Generating...</div><p>Creating a recipe for "'+mood+'" that fits your macros...</p></div>';
  try{
    var p=aiPlan||{calories:2000,protein:150};
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'Create a recipe matching: "'+mood+'" for someone with goal: '+ud.goal+', needs: '+p.protein+'g protein, '+p.calories+' kcal/day, allergies: '+(ud.allergies||[]).join(',')+', cooking level: '+ud.cook+'. Respond ONLY with JSON: {"name":"<n>","time":<min>,"kcal":<n>,"protein":<g>,"ingredients":["<i1>","<i2>","<i3>","<i4>","<i5>"],"steps":["<s1>","<s2>","<s3>"]}'}]})});
    var d=await res.json();
    var recipe=JSON.parse((d.content[0].text||'{}').replace(/```json|```/g,'').trim());
    result.innerHTML='<div class="scan-result"><div class="scan-result-name">'+recipe.name+'</div><div class="scan-result-macros">'+recipe.kcal+' kcal · '+recipe.protein+'g protein · '+recipe.time+' min</div><div style="margin-top:10px"><strong style="font-size:12px">Ingredients:</strong>'+recipe.ingredients.map(function(i){return '<div style="font-size:12px;padding:3px 0">• '+i+'</div>';}).join('')+'</div><div style="margin-top:8px"><strong style="font-size:12px">Steps:</strong>'+recipe.steps.map(function(s,i){return '<div style="display:flex;gap:8px;padding:4px 0;font-size:12px"><span style="color:var(--accent);font-weight:700;flex-shrink:0">'+(i+1)+'.</span><span>'+s+'</span></div>';}).join('')+'</div></div>';
  }catch(e){result.innerHTML='<div class="error-box" style="display:block">Could not generate recipe. Try again.</div>';}
}

async function buildRecipe(){
  var ingredients=Array.from(document.querySelectorAll('.ingredient-row')).map(function(r){var n=r.querySelector('.ingredient-name').value;var q=r.querySelector('.qty').value;var u=r.querySelector('.unit').value;return n?q+' '+u+' '+n:'';}).filter(Boolean);
  if(!ingredients.length){alert('Please add at least one ingredient.');return;}
  var result=document.getElementById('builtRecipe');
  result.innerHTML='<div class="loading-wrap" style="padding:24px"><div class="spinner"></div><p style="font-size:13px;color:var(--ink-light)">Building recipe...</p></div>';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:'Create a recipe using: '+ingredients.join(', ')+'. User goal: '+ud.goal+', cooking level: '+ud.cook+'. Respond ONLY with JSON: {"name":"<n>","time":<min>,"kcal":<n>,"protein":<g>,"steps":["<s1>","<s2>","<s3>"]}'}]})});
    var d=await res.json();
    var recipe=JSON.parse((d.content[0].text||'{}').replace(/```json|```/g,'').trim());
    result.innerHTML='<div class="plan-revealed"><h4>🍳 '+recipe.name+'</h4><div style="font-size:12px;color:var(--accent);margin-bottom:10px">'+recipe.kcal+' kcal · '+recipe.protein+'g protein · '+recipe.time+' min</div>'+recipe.steps.map(function(s,i){return '<div class="recipe-step"><div class="recipe-step-num">'+(i+1)+'</div><div class="recipe-step-text">'+s+'</div></div>';}).join('')+'</div>';
  }catch(e){result.innerHTML='<div class="error-box" style="display:block">Could not build recipe. Try again.</div>';}
}

function showMoodMeal(){
  var cuisines=['🇲🇽 Mexican','🍝 Italian','🍜 Asian','🥗 Mediterranean','🍔 American','🍛 Indian','🇯🇵 Japanese'];
  var html='<div style="padding:16px;background:var(--bg);border-radius:12px;border:1px solid var(--border);margin-top:12px"><p style="font-size:13px;font-weight:600;margin-bottom:10px">What are you in the mood for?</p><div class="chips">'+cuisines.map(function(c){return '<div class="chip cuisine-chip" onclick="selectMoodCuisine(\''+c+'\')">'+c+'</div>';}).join('')+'</div></div>';
  var dashBody=document.getElementById('dashBody');
  if(dashBody){var extra=document.createElement('div');extra.innerHTML=html;dashBody.appendChild(extra);}
}

async function selectMoodCuisine(cuisine){
  var p=aiPlan||{calories:2000,protein:150};
  var el=document.querySelector('[onclick="showMoodMeal()"]');
  if(el)el.closest('.ai-bubble').innerHTML='<div class="ai-bubble-label"><div class="ai-dot"></div>PEAK AI</div><p>Building a '+cuisine+' meal that fits your macros today...</p>';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:'Suggest one '+cuisine+' recipe for: goal '+ud.goal+', needs ~'+Math.round(p.calories/3)+' kcal and ~'+Math.round(p.protein/3)+'g protein for this meal, allergies: '+(ud.allergies||[]).join(',')+', cooking: '+ud.cook+'. Respond ONLY with JSON: {"name":"<n>","kcal":<n>,"protein":<g>,"macro":"<summary>","time":<min>,"tip":"<one cooking tip>"}'}]})});
    var d=await res.json();
    var meal=JSON.parse((d.content[0].text||'{}').replace(/```json|```/g,'').trim());
    var el2=document.querySelector('[onclick="showMoodMeal()"]');
    if(el2)el2.closest('.ai-bubble').innerHTML='<div class="ai-bubble-label"><div class="ai-dot"></div>PEAK AI</div><p><strong>'+meal.name+'</strong> — '+meal.kcal+' kcal · '+meal.macro+'<br><span style="font-size:12px;color:var(--ink-light)">'+meal.tip+'</span></p>';
  }catch(e){}
}

// ── RATINGS ───────────────────────────────────────────────────────────
function rateMeal(idx,score){
  mealRatings[idx]=score;
  var stars=document.querySelectorAll('.rating-row')[idx];
  if(stars){stars.querySelectorAll('.star').forEach(function(s,i){s.style.opacity=i<score?1:0.3;});}
  if(score<=1&&aiPlan){setTimeout(function(){var bubble=document.createElement('div');bubble.className='ai-bubble';bubble.style.marginTop='8px';bubble.innerHTML='<div class="ai-bubble-label"><div class="ai-dot"></div>PEAK AI</div><p>Noted — I\'ve removed this from future suggestions and found alternatives that might work better for you.</p>';var body=document.getElementById('dashBody');if(body)body.appendChild(bubble);},300);}
}

function rateWorkout(cat,score){
  workoutRatings[cat]=score;
  document.querySelectorAll('[onclick^="rateWorkout(\''+cat+'\'"]').forEach(function(s,i){s.style.opacity=i<score?1:0.3;});
  if(score>=4&&cat==='Effort'){setTimeout(function(){alert('Great effort! I\'ll increase the intensity next session. 💪');},200);}
  if(score<=2&&cat==='Effort'){setTimeout(function(){alert('Noted — I\'ll adjust the difficulty down for your next session.');},200);}
}

function showLoginScreen(){
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('stepLabel').textContent='Login';
  card('<div class="card-header"><div class="step-chip">✦ '+t('loginTitle')+' <em>'+t('loginEm')+'</em></div><h2 class="card-title">'+t('loginTitle')+' <em>'+t('loginEm')+'</em></h2><p class="card-sub">'+t('loginSub')+'</p></div><div class="card-body"><div id="errLogin" class="error-box"></div><button class="btn-google"><svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>'+t('google')+'</button><div class="divider">or</div><div class="field"><label>'+t('email')+'</label><input type="email" id="loginEmail" placeholder="alex@example.com"></div><div class="field"><label>'+t('password')+'</label><input type="password" id="loginPass" placeholder="••••••••"></div></div><div class="card-footer"><button class="btn-next" onclick="loginDemo()" style="flex:1">'+t('loginBtn')+' →</button></div><div style="padding:0 44px 24px;text-align:center;font-size:12px;color:var(--ink-light)">'+t('noAccount')+' <span style="color:var(--accent);cursor:pointer;font-weight:600" onclick="step=1;render()">'+t('startFree')+'</span></div>');
}

function loginDemo(){
  var email=document.getElementById('loginEmail').value;
  if(!email){showErr('errLogin','Please enter your email.');return;}
  ud.email=email;
  if(aiPlan){showDashboard(aiPlan);}else{
    fetchAIPlan().then(function(){showDashboard(aiPlan);});
  }
}

function logout(){step=1;render();}
function showErr(id,msg){var el=document.getElementById(id);if(el){el.textContent='❌ '+msg;el.style.display='block';}}

// ── HELPERS ───────────────────────────────────────────────────────────
function sel(el,key,val){el.closest('.tiles').querySelectorAll('.tile').forEach(function(t){t.classList.remove('selected');});el.classList.add('selected');ud[key]=val;}
function selSport(el,n){el.closest('.tiles').querySelectorAll('.sport-tile').forEach(function(t){t.classList.remove('selected');});el.classList.add('selected');ud.sport=n;}
function selGoal(el,title){document.querySelectorAll('.goal-card').forEach(function(c){c.classList.remove('selected');});el.classList.add('selected');ud.goal=title;}
function toggleChip(el,key,val){if(!ud[key])ud[key]=[];if(ud[key].includes(val)){ud[key]=ud[key].filter(function(v){return v!==val;});el.classList.remove('selected');}else{ud[key].push(val);el.classList.add('selected');}}

if(window.location.search.includes('session_id')){step=8;}
render();
