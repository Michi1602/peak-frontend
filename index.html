<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* ── DARK THEME (default) ── */
:root,
:root[data-theme="dark"]{
  --bg:#0E0E0E;--s1:#161616;--s2:#1E1E1E;--s3:#282828;
  --white:#FFF;--ink:#FFF;--ink2:#CCC;--dim:#888;--faint:#444;
  --red:#E8001A;--rdk:#A50013;--rbg:#1C0005;--rbd:#3D000D;
  --border:#2C2C2C;--b2:#383838;
  --cbg:#1A1A1A;--ibg:#212121;--ibd:#333;
}
/* ── LIGHT THEME ── */
:root[data-theme="light"]{
  --bg:#F5F5F5;--s1:#FFFFFF;--s2:#FAFAFA;--s3:#EEEEEE;
  --white:#0E0E0E;--ink:#0E0E0E;--ink2:#333333;--dim:#666666;--faint:#AAAAAA;

}
/* Smooth transition when toggling */
html,body,.topbar,.card,.tile,input,textarea,button{transition:background-color .25s ease,color .25s ease,border-color .25s ease}
html,body{height:100%;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.topbar{display:flex;align-items:center;gap:12px;padding:0 22px;height:58px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{flex-shrink:0;cursor:pointer}.logo-n{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:23px;letter-spacing:5px;color:var(--white);display:block}.logo-l{height:2px;background:var(--red);margin:1px 0}.logo-b{font-size:7px;font-weight:700;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;display:block}
.pbw{flex:1;max-width:220px}.pbt{height:2px;background:var(--s3)}.pbf{height:2px;background:var(--red);transition:width .5s}
.tr{display:flex;align-items:center;gap:7px;margin-left:auto;flex-shrink:0}

.lbtn{font-size:10px;color:var(--dim);cursor:pointer;padding:5px 8px;border:1px solid var(--border);background:none;font-family:'Barlow',sans-serif;font-weight:700;letter-spacing:1px;transition:all .15s}
.lbtn:hover{border-color:var(--red);color:var(--red)}
.loginbtn{font-size:11px;font-weight:900;cursor:pointer;padding:6px 13px;border:none;background:var(--red);color:var(--white);font-family:'Barlow Condensed',sans-serif;letter-spacing:3px;text-transform:uppercase}
.loginbtn:hover{background:var(--rdk)}
.main{display:flex;align-items:flex-start;justify-content:center;padding:26px 14px;min-height:calc(100vh - 58px)}
.card{background:var(--cbg);border:1px solid var(--border);width:100%;max-width:600px;animation:up .32s ease}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ch{padding:26px 30px 0}.cb{padding:16px 30px}.cf{padding:4px 30px 24px;display:flex;gap:8px}
.chip{display:inline-flex;align-items:center;background:var(--rbg);color:var(--red);font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--rbd);margin-bottom:10px}
.ct{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:29px;line-height:1.05;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;color:var(--white)}
.ct em{font-style:normal;color:var(--red)}

.field{margin-bottom:12px}
label{display:block;font-size:10px;font-weight:700;color:var(--dim);margin-bottom:5px;letter-spacing:2px;text-transform:uppercase}
input[type="text"],input[type="number"],input[type="email"],input[type="password"],textarea{width:100%;padding:12px 13px;border:1.5px solid var(--ibd);background:var(--ibg);color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;font-weight:500;outline:none;transition:border-color .15s;border-radius:0!important;appearance:none;-webkit-appearance:none;-moz-appearance:none}

input:-webkit-autofill,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px var(--ibg) inset!important;-webkit-text-fill-color:var(--white)!important;border-color:var(--ibd)!important}

// AI Helper — routes all Anthropic calls through backend proxy
async function aiGen(prompt, maxTokens){
  var headers={'Content-Type':'application/json'};
  try{
    if(window.sb){
      var sess=await window.sb.auth.getSession();
      var tok=sess?.data?.session?.access_token;
      if(tok)headers.Authorization='Bearer '+tok;
    }
  }catch(_){}
  var r=await fetch(BACKEND+'/ai/generate',{
    method:'POST',headers:headers,
    body:JSON.stringify({prompt:prompt,max_tokens:maxTokens||800})
  });
  if(!r.ok){
    var err=await r.json().catch(function(){return {error:'AI request failed'};});
    throw new Error(err.error||'AI request failed');
  }
  var data=await r.json();
  return data.text||'';
}
async function aiGenJSON(prompt, maxTokens){
  var text=await aiGen(prompt, maxTokens);
  var clean=text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function toggleLang(){

function toggleTheme(){
  var cur=document.documentElement.getAttribute('data-theme')||'dark';
  var next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('peak-theme',next);}catch(e){}
  var btn=document.getElementById('tb');
  if(btn)btn.textContent=next==='dark'?'DARK':'LIGHT';
}
function syncThemeButton(){
  var btn=document.getElementById('tb');
  if(btn){
    var cur=document.documentElement.getAttribute('data-theme')||'dark';
    btn.textContent=cur==='dark'?'DARK':'LIGHT';
  }
}
function rerenderCurrent(){
  // Check if we're in dashboard
  var nav=document.querySelector('.ntab.act');
  if(nav){
    var tabKey=nav.getAttribute('data-tab');
    if(tabKey){showTab(tabKey);return;}
  }
  // Check if we're in login screen
  var loginBtn=document.getElementById('lem');
  if(loginBtn){showLogin();return;}
  // Check if we're in onboarding
  if(step>=1&&step<=8){
    ({1:s1,2:s2,3:s3,4:s4,5:s5,6:s6,7:s7,8:s8})[step]();
  }

async function fetchPlan(){
  var bmr=ud.weight&&ud.height&&ud.age?Math.round(88.362+13.397*parseFloat(ud.weight)+4.799*parseFloat(ud.height)-5.677*parseFloat(ud.age)):1800;
  var mult=1.375;if(parseFloat(ud.sessions||3)>=5)mult=1.55;
  var tdee=Math.round(bmr*mult);
  var kcal=ud.goal===t('g1')||ud.goal===T.de.g1?tdee-400:ud.goal===t('g2')||ud.goal===T.de.g2?tdee+250:tdee;
  var sport=ud.sport||'Running';var level=ud.level||'Intermediate';
  var sportTips={Running:['Interval runs 6×400m at tempo','Hill repeats 5×uphill','Core: Dead bugs 3×12, Bird dogs 3×10','Single-leg deadlifts 3×8 each','Calf raises 3×20'],Football:['Ball control 3×10min','Sprint intervals 6×30m','Core: Plank series 3×45s','Single-leg squats 3×10 each','Lateral agility ladder 3×2min'],Weights:['Compound lifts: Squat/Bench/Deadlift','Progressive overload +2.5kg','Accessory: Face pulls, Band pull-aparts','Core: Hanging leg raises 3×12','Mobility 10min post'],Swimming:['Pull buoy drill 400m','4×100m at race pace','Rotator cuff exercises','Swiss ball rollouts 3×12','Shoulder mobility warm-up 10min'],Cycling:['Threshold 3×10min at FTP','High-cadence drills 100+RPM','Core: Plank variations','Hip flexor stretch post-ride','Single-leg pedalling'],Yoga:['Sun salutation ×10','Balance: Tree, Warrior III','Hip opening: Pigeon series','Shoulder openers','Box breathing 5min'],Tennis:['Footwork: Split-step drills','50 focused serves','Core rotation: Cable woodchops 3×12','Shoulder: External rotation','Agility: T-drill ×6'],Basketball:['100 shot makes','Ball handling: Crossover series','Vertical: Depth jumps 3×8','Core: Medicine ball rotations','Defensive slides 4×1min'],'Martial Arts':['Shadow boxing 4×3min rounds','Stance and footwork drills','Core: Russian twists, Wood chops','Hip flexor, hamstring flexibility','Reaction mirror drills']};
  var exFallback=(sportTips[sport]||['Warm-up 10 min','Main set 35 min','Cool-down 10 min']).map(function(e){return {name:e,detail:''};});
  var prompt='You are PEAK AI by MJ Performance. Language: '+lang+'.\nUser: '+ud.name+', age '+ud.age+', '+ud.weight+'kg→'+ud.dweight+'kg, '+ud.height+'cm, sleep '+ud.sleep+'hrs\nJob: '+ud.job+', stress '+ud.stress+'/10\nSport: '+sport+' ('+level+'), '+ud.sessions+'×/wk, '+ud.dur+'min, at '+ud.equip+'\nAllergies: '+(ud.al||[]).join(',')+'\nDiet: '+(ud.di||[]).join(',')+'\nCuisines: '+(ud.cu||[]).join(',')+'\nCooking: '+ud.cook+'\nGoal: '+ud.goal+', Calories: '+kcal+'\n\nCreate a personalised plan. For workout: create 4-5 SPECIFIC exercises for '+sport+' at '+level+' level that improve performance in '+sport+'. NOT generic gym. Include drills, technique, sport-specific conditioning. Each needs name + sets/reps/duration.\n\nRespond ONLY with valid JSON, no markdown:\n{"headline":"<12 words in '+lang+'>","calories":'+kcal+',"protein":<g>,"carbs":<g>,"fat":<g>,"timeline":"<weeks>","todayMeals":[{"emoji":"🍳","name":"<meal>","time":"Breakfast","kcal":<n>,"macro":"<e.g. 28g protein>"},{"emoji":"🥗","name":"<meal>","time":"Lunch","kcal":<n>,"macro":"<e.g. 42g protein>"},{"emoji":"🍽️","name":"<meal>","time":"Dinner","kcal":<n>,"macro":"<e.g. 38g protein>"},{"emoji":"🍎","name":"<snack>","time":"Snack","kcal":<n>,"macro":"<e.g. 15g protein>"}],"workout":{"title":"<sport-specific title>","focus":"<what this improves in '+sport+'>","desc":"<2 sentences why>","duration":<min>,"exercises":[{"name":"<exercise>","detail":"<sets/reps/duration>"},{"name":"<exercise>","detail":"<sets/reps>"},{"name":"<exercise>","detail":"<sets/reps>"},{"name":"<exercise>","detail":"<duration>"}]},"recovery":{"tip":"<tip>","sleep":"<advice>","hydration":"<target>"},"shopping":["<item1>","<item2>","<item3>","<item4>","<item5>"],"milestones":["<wk2-3>","<wk5-7>","<final>"]}';
  try{
    plan=await aiGenJSON(prompt,1600);
    if(plan.workout&&plan.workout.exercises&&typeof plan.workout.exercises[0]==='string'){plan.workout.exercises=plan.workout.exercises.map(function(e){return{name:e,detail:''};});}
    saveSession();
  }catch(e){
    var k=kcal||2000;
    plan={headline:'Your '+sport+' transformation starts now',calories:k,protein:Math.round(parseFloat(ud.weight||75)*1.8),carbs:Math.round(k*0.4/4),fat:Math.round(k*0.3/9),timeline:'12 weeks',todayMeals:[{emoji:'🍳',name:'Scrambled eggs with avocado',time:'Breakfast',kcal:420,macro:'28g protein'},{emoji:'🥗',name:'Grilled chicken & quinoa',time:'Lunch',kcal:550,macro:'45g protein'},{emoji:'🍽️',name:'Salmon with vegetables',time:'Dinner',kcal:580,macro:'40g protein'},{emoji:'🍎',name:'Greek yoghurt with berries',time:'Snack',kcal:180,macro:'15g protein'}],workout:{title:sport+' Performance Session',focus:'Improving '+sport+' performance',desc:'Sport-specific exercises chosen to make you a better '+sport+' athlete.',duration:parseInt(ud.dur||60),exercises:exFallback},recovery:{tip:'7-8hrs sleep tonight.',sleep:'Consistent bedtime.',hydration:'2.5-3L water today.'},shopping:['Chicken breast','Salmon','Quinoa','Greek yoghurt','Vegetables'],milestones:['Week 3 — Habits forming.','Week 7 — Visible progress.','Week 12 — Goal reached.']};
    saveSession();
  }
}

  if(!c1||!c1.checked||!c2||!c2.checked){showE('ep',t('csE'));return;}
  if(!em){showE('ep','Please enter your email.');return;}
  ud.email=em;ud.consentHealthData=true;ud.consentTerms=true;ud.consentAt=new Date().toISOString();saveSession();
  btn.textContent='Loading...';btn.style.opacity='.6';btn.onclick=null;
  document.getElementById('ep').style.display='none';
  try{
    // First: check if an account already exists for this email
    var chk=await fetch(BACKEND+'/auth/check-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em})});
    var chkData=await chk.json();
    if(chkData.exists){
      // Account exists → show options screen instead of going to Stripe
      showAccountExists(em,chkData.hasSubscription);
      return;
    }
    // No existing account → proceed to Stripe Checkout
    var res=await fetch(BACKEND+'/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,plan:selPlan,tier:selTier,userData:{name:ud.name,goal:ud.goal,sport:ud.sport},consent:{healthData:true,terms:true,at:ud.consentAt}})});

    else throw new Error(data.error||'Error');
  }catch(err){showE('ep',err.message);btn.textContent='🔒 '+t('tp')+' →';btn.style.opacity='1';btn.onclick=doPay;}
}

          '</div>'+
        '</div>';
      }

      return '<div class="le">'+
        '<span class="lei">'+e.emoji+'</span>'+
        '<div class="leinf">'+
          '<div class="let">'+e.text+'</div>'+
          '<div class="leti">'+e.time+'</div>'+
        '</div>'+
        '<span class="lek">~'+e.kcal+' kcal</span>'+
        '<div class="lact">'+
          '<button class="lab" onclick="editLog('+idx+')" title="'+(de?'Bearbeiten':'Edit')+'">✎</button>'+
          '<button class="lab ldel" onclick="deleteLog('+idx+')" title="'+(de?'Löschen':'Delete')+'">✕</button>'+
        '</div>'+
      '</div>';
    }).join('');
    var tot=flog.reduce(function(a,e){return a+e.kcal;},0);
    c+='<div style="text-align:right;font-size:11px;font-weight:700;color:var(--red);margin-top:6px;letter-spacing:.5px">Total: ~'+tot+' kcal</div>';
  }
  else c+='<div style="text-align:center;padding:18px;color:var(--faint);font-size:12px">'+(de?'Noch nichts eingetragen.<br>Sei ehrlich — auch das Bier zählt. 🍺':'Nothing logged yet.<br>Be honest — the beers count. 🍺')+'</div>';
  dshell('log',c);
}

function addLog(){
  var inp=document.getElementById('li');
  if(!inp||!inp.value.trim())return;
  var v=inp.value.trim();
  var em={beer:'🍺',bier:'🍺',wine:'🍷',wein:'🍷',coffee:'☕',kaffee:'☕',pizza:'🍕',burger:'🍔',salad:'🥗',water:'💧',wasser:'💧',chocolate:'🍫',schokolade:'🍫'};
  var emoji='🍽️';
  Object.keys(em).forEach(function(k){if(v.toLowerCase().includes(k))emoji=em[k];});
  flog.push({text:v,emoji:emoji,kcal:Math.floor(Math.random()*230)+80,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  logEditIdx=-1;
  tLg();
}

function editLog(idx){
  logEditIdx=idx;
  tLg();
}

function cancelLog(){
  logEditIdx=-1;
  tLg();
}

function saveLog(idx){
  var t2=document.getElementById('eTxt'+idx);
  var k=document.getElementById('eKcal'+idx);
  var em=document.getElementById('eEm'+idx);
  if(!t2||!k)return;
  var text=t2.value.trim();
  var kcal=parseInt(k.value)||0;
  var emoji=(em&&em.value.trim())||'🍽️';
  if(!text){alert(lang==='de'?'Text darf nicht leer sein.':'Text cannot be empty.');return;}
  if(kcal<0)kcal=0;
  flog[idx].text=text;
  flog[idx].kcal=kcal;
  flog[idx].emoji=emoji;
  logEditIdx=-1;
  tLg();
}

function deleteLog(idx){
  var de=lang==='de';
  if(!confirm(de?'Eintrag wirklich löschen?':'Delete this entry?'))return;
  flog.splice(idx,1);
  if(logEditIdx===idx)logEditIdx=-1;
  else if(logEditIdx>idx)logEditIdx--;
  tLg();
}

      '<svg width="15" height="15" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>'+
      googleBtn+
    '</button>'+
    '<div class="div">'+orText+'</div>'+
    '<div class="field"><label>'+emailLabel+'</label>'+
      '<input type="email" id="lem" placeholder="michael@example.com" autocomplete="email"></div>'+
    '<p style="font-size:10px;color:var(--faint);margin-top:-6px;margin-bottom:12px">'+hint+'</p>'+
    '</div>'+
    '<div class="cf"><button class="bnx" id="loginBtn" onclick="doMagicLink()" style="flex:1;letter-spacing:3px">'+sendBtn+'</button></div>'+
    '<div style="padding:0 30px 18px;text-align:center;font-size:11px;color:var(--faint)">'+noAccount+
      '<span style="color:var(--red);cursor:pointer;font-weight:700" onclick="step=1;render()">'+startFree+'</span>'+
    '</div>'
  );
}

async function doMagicLink(){
  var em=document.getElementById('lem').value.trim();
  var de=lang==='de';
  if(!em){showE('el2',de?'Bitte E-Mail eingeben.':'Please enter your email.');return;}
  var btn=document.getElementById('loginBtn');
  btn.textContent=de?'Wird gesendet...':'Sending...';
  btn.style.opacity='.6';btn.disabled=true;
  try{
    var result=await window.sb.auth.signInWithOtp({
      email:em,
      options:{emailRedirectTo:window.location.origin+'/'}
    });
    if(result.error)throw result.error;
    showInboxCheck(em);
  }catch(err){
    showE('el2',err.message||'Could not send login link.');
    btn.textContent=de?'LOGIN-LINK SENDEN →':'SEND LOGIN LINK →';
    btn.style.opacity='1';btn.disabled=false;
  }
}

async function doGoogleLogin(){
  try{
    var result=await window.sb.auth.signInWithOAuth({
      provider:'google',
      options:{redirectTo:window.location.origin+'/'}
    });
    if(result.error)throw result.error;
    // Supabase handles the redirect automatically
  }catch(err){
    showE('el2',err.message||'Google login failed.');
  }
}

function showInboxCheck(email){
  var de=lang==='de';
  document.getElementById('sl').textContent=de?'E-Mail gesendet':'Email sent';
  var title=de?'Check deine E-Mails':'Check your inbox';
  var sub=de?'Wir haben einen Login-Link an <strong>'+email+'</strong> gesendet. Klick den Link in der E-Mail, um dich anzumelden.':'We sent a login link to <strong>'+email+'</strong>. Click the link in the email to sign in.';
  var resend=de?'E-Mail erneut senden':'Resend email';
  var back=de?'← Zurück':'← Back';
  card(
    '<div class="ch"><div class="chip">✦ '+(de?'Fast geschafft':'Almost there')+'</div>'+
    '<div class="ct">'+title+'</div>'+
    '<p class="cs">'+sub+'</p></div>'+
    '<div class="cb">'+
    '<div style="padding:16px 0;text-align:center;font-size:12px;color:var(--dim);line-height:1.7">'+
    (de?'Keine E-Mail erhalten? Check deinen Spam-Ordner.':'No email? Check your spam folder.')+
    '</div></div>'+
    '<div class="cf" style="gap:8px">'+
    '<button class="bbk" onclick="showLogin()">'+back+'</button>'+
    '<button class="bnx" onclick="showLogin()" style="flex:1">'+resend+'</button>'+
    '</div>'
  );
}
// ── AUTH: profile loader + boot flow ──────────────────────────────────
// Called after Supabase session is established (via magic link, Google,
// or restored from localStorage). Loads profile row from backend and
// routes user into the dashboard (or onboarding if profile not found).

// Prevents double-calls from onAuthStateChange + bootApp racing each other
var __authLoading=false;

async function loadAuthProfile(){
  if(__authLoading)return true;
  __authLoading=true;
  var de=lang==='de';
  try{
    var sess=await window.sb.auth.getSession();
    var token=sess?.data?.session?.access_token;
    if(!token){__authLoading=false;return false;}

    var res=await fetch(BACKEND+'/user/profile',{
      headers:{Authorization:'Bearer '+token}
    });

    if(res.status===404){
      // Auth user exists but no profile row — signed in via Google without
      // going through Stripe. Show a clear "complete your signup" screen.
      var body=await res.json().catch(function(){return {};});
      if(body.email)ud.email=body.email;
      showNeedSubscription(body.email||'');
      __authLoading=false;
      return true;
    }
    if(!res.ok){
      console.error('Profile load failed:',res.status);
      __authLoading=false;
      return false;
    }

    var json=await res.json();
    var p=json.profile||{};

    // Hydrate app state from profile
    ud.email=p.email||'';
    ud.name=p.name||ud.name||'';
    if(p.goal)ud.goal=p.goal;
    if(p.sport)ud.sport=p.sport;
    ud.tier=p.tier||'premium';

    // Merge any saved onboarding data from sessionStorage (full profile)
    try{
      var saved=sessionStorage.getItem('pk_ud');
      if(saved){
        var s=JSON.parse(saved);
        Object.keys(s).forEach(function(k){
          if(s[k]&&!ud[k])ud[k]=s[k];
        });
      }
    }catch(e){}

    // Build plan + show dashboard
    document.getElementById('pb').style.width='100%';
    document.getElementById('sl').textContent=de?'Plan wird geladen...':'Loading plan...';
    card('<div class="lw"><div class="spin"></div><div class="lt">'+(de?'Lade dein Dashboard...':'Loading your dashboard...')+'</div></div>');

    if(ud.sport&&ud.goal){
      try{await fetchPlan();}catch(e){console.error('Plan fetch failed:',e);}
    }
    showDash();
    __authLoading=false;
    return true;
  }catch(err){
    console.error('loadAuthProfile error:',err);
    __authLoading=false;
    return false;
  }
}

// Shown to users who authenticated (e.g. via Google) but don't have a
// PEAK subscription yet. Clear CTA to start the trial via Stripe checkout.
function showNeedSubscription(email){
  var de=lang==='de';
  document.getElementById('pb').style.width='0%';
  document.getElementById('sl').textContent=de?'Abo benötigt':'Subscription needed';
  var chip=de?'✦ Fast geschafft':'✦ Almost there';
  var title=de?'Noch kein Abo':'No subscription yet';
  var sub=email
    ? (de?'Du bist als <strong>'+email+'</strong> angemeldet, aber hast noch kein PEAK-Abo.':'You\'re signed in as <strong>'+email+'</strong>, but you don\'t have a PEAK subscription yet.')
    : (de?'Du bist angemeldet, aber hast noch kein PEAK-Abo.':'You\'re signed in, but you don\'t have a PEAK subscription yet.');
  var body=de?'Starte dein 7-Tage-Trial und schalte deinen personalisierten Plan frei.':'Start your 7-day trial to unlock your personalised plan.';
  var startBtn=de?'TRIAL STARTEN →':'START TRIAL →';
  var logoutBtn=de?'Abmelden':'Sign out';
  card(
    '<div class="ch"><div class="chip">'+chip+'</div>'+
    '<div class="ct">'+title+'</div>'+
    '<p class="cs">'+sub+'</p></div>'+
    '<div class="cb">'+
    '<p style="color:var(--dim);line-height:1.7;font-size:14px;margin-bottom:8px">'+body+'</p>'+
    '<ul style="color:var(--ink2);line-height:2;font-size:13px;margin:8px 0 0;padding-left:20px">'+
    '<li>'+(de?'KI-Ernährungsplan':'AI nutrition plan')+'</li>'+
    '<li>'+(de?'Sportspezifisches Training':'Sport-specific training')+'</li>'+
    '<li>'+(de?'Regenerations-Protokoll':'Recovery protocol')+'</li>'+
    '</ul>'+
    '</div>'+
    '<div class="cf" style="gap:8px">'+
    '<button class="bbk" onclick="logout()">'+logoutBtn+'</button>'+
    '<button class="bnx" onclick="step=1;render()" style="flex:1;letter-spacing:2px">'+startBtn+'</button>'+
    '</div>'
  );
}

// Boot — decides where the user lands based on URL and session state.
async function bootApp(){
  // Restore onboarding draft (so interrupted users resume where they were)
  loadSession();

  // Stripe success redirect: session_id in URL means checkout just completed
  // → show success screen (step 8), user will get magic link via email
  if(window.location.search.includes('session_id')){
    step=8;render();return;
  }

  // Check for existing Supabase session (magic link, Google, or persisted)
  try{
    var sess=await window.sb.auth.getSession();
    if(sess?.data?.session){
      // Signed in — load profile and route appropriately
      var ok=await loadAuthProfile();
      if(ok){
        // Clean auth tokens from URL after magic link redirect
        if(window.location.hash||window.location.search.includes('code=')){
          window.history.replaceState({},document.title,window.location.pathname);
        }
        return;
      }
    }
  }catch(e){console.error('Session check error:',e);}

  // No session — show login as entry point
  showLogin();
}

// Listen for auth state changes (e.g., after OAuth redirect completes).
// bootApp() already handles the initial session, so we only react to
// fresh SIGNED_IN events that happen AFTER initial page load.
var __bootDone=false;
window.sb.auth.onAuthStateChange(function(event,session){
  if(!__bootDone)return; // skip events fired during bootApp
  if(event==='SIGNED_IN'&&session){
    loadAuthProfile();
  }
});

async function logout(){
  try{await window.sb.auth.signOut();}catch(e){}
  plan=null;ud={name:'',age:'',gender:'',weight:'',dweight:'',height:'',sleep:'',job:'',commute:'',stress:'5',sport:'',level:'',sessions:'',dur:'',equip:'',al:[],di:[],cu:[],cook:'',budget:'',goal:''};
  flog=[];mrat={};wrat={};
  try{sessionStorage.clear();}catch(e){}
  step=1;
  showLogin();
}

// ── INIT ──────────────────────────────────────────────────────────────
bootApp().finally(function(){__bootDone=true;});
syncThemeButton();
</script>
